<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEXUS LIFE — Messages</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --cyan:#00f5ff; --cyan-dim:#00a8b5; --gold:#ffd700; --red:#ff003c;
  --green:#44ff88; --purple:#b044ff; --orange:#ff9500;
  --bg:#010a0f; --bg2:#020d14;
  --panel:rgba(0,245,255,0.04); --border:rgba(0,245,255,0.12);
  --text:#c8f0f5; --text-dim:#5a8a90;
}
.cls-warrior{--cls:#ff4444} .cls-mage{--cls:#aa44ff} .cls-explorer{--cls:#44ff88}
.cls-merchant{--cls:#ffaa00} .cls-artist{--cls:#ff66aa} .cls-diplomat{--cls:#00ccff}
*{margin:0;padding:0;box-sizing:border-box} html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;overflow:hidden;cursor:none}
.cursor{position:fixed;width:10px;height:10px;background:var(--cyan);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--cyan)}
.cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(0,245,255,0.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all 0.12s ease}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:1000}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.025) 1px,transparent 1px);background-size:60px 60px;z-index:0}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:var(--bg);z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loading-logo{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;letter-spacing:4px;color:var(--cyan);text-shadow:0 0 20px var(--cyan)}
.loading-bar-wrap{width:200px;height:2px;background:var(--border)}
.loading-bar{height:100%;background:var(--cyan);animation:loadAnim 1.2s ease-in-out infinite}
@keyframes loadAnim{0%{width:0%}50%{width:70%}100%{width:100%}}
.loading-txt{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:3px;color:var(--text-dim)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;z-index:2000;font-family:'Orbitron',monospace;font-size:10px;letter-spacing:1px;padding:14px 20px;border-left:3px solid var(--cyan);background:rgba(1,10,15,0.96);border:1px solid var(--border);border-left:3px solid var(--cyan);color:var(--cyan);transform:translateX(120%);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);max-width:280px}
.toast.show{transform:translateX(0)}
.toast.success{border-left-color:var(--green);color:var(--green)}
.toast.error{border-left-color:var(--red);color:#ff6680}

/* LAYOUT — 3 คอลัมน์: sidebar | inbox | chat */
.app-layout{position:fixed;top:0;left:220px;right:0;bottom:0;display:grid;grid-template-columns:280px 1fr;z-index:1}

/* INBOX PANEL */
.inbox{display:flex;flex-direction:column;border-right:1px solid var(--border);background:rgba(1,10,15,0.8);overflow:hidden}
.inbox-header{padding:20px 18px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.inbox-title{font-family:'Orbitron',monospace;font-size:12px;font-weight:900;letter-spacing:3px;color:var(--cyan)}
.inbox-search{margin-top:10px;position:relative}
.inbox-search input{width:100%;background:rgba(0,245,255,0.04);border:1px solid var(--border);color:var(--text);font-family:'Sarabun',sans-serif;font-size:13px;padding:9px 12px 9px 36px;outline:none;transition:border-color 0.2s}
.inbox-search input:focus{border-color:var(--cyan)}
.inbox-search input::placeholder{color:var(--text-dim)}
.inbox-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:0.4;pointer-events:none}
.inbox-list{flex:1;overflow-y:auto}
.inbox-list::-webkit-scrollbar{width:3px}
.inbox-list::-webkit-scrollbar-track{background:transparent}
.inbox-list::-webkit-scrollbar-thumb{background:var(--border)}

.conv-item{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;border-bottom:1px solid rgba(0,245,255,0.05);transition:all 0.2s;position:relative}
.conv-item:hover{background:rgba(0,245,255,0.04)}
.conv-item.active{background:rgba(0,245,255,0.07);border-right:2px solid var(--cyan)}
.conv-avatar{width:42px;height:42px;border-radius:50%;border:2px solid var(--cls,var(--cyan));overflow:hidden;background:rgba(0,0,0,0.3);flex-shrink:0}
.conv-avatar img{width:100%;height:100%;object-fit:cover}
.conv-info{flex:1;min-width:0}
.conv-name{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-preview{font-size:11px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.conv-time{font-family:'Orbitron',monospace;font-size:8px;color:var(--text-dim);position:absolute;top:14px;right:14px}
.conv-unread{position:absolute;bottom:14px;right:14px;width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 6px var(--cyan)}

.inbox-new-btn{margin:12px;font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;padding:10px;border:1px solid var(--cyan);color:var(--cyan);background:transparent;cursor:pointer;transition:all 0.2s;width:calc(100% - 24px)}
.inbox-new-btn:hover{background:var(--cyan);color:var(--bg)}

.inbox-empty{text-align:center;padding:40px 20px;color:var(--text-dim)}
.inbox-empty-icon{font-size:32px;display:block;margin-bottom:10px;opacity:0.3}
.inbox-empty-txt{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px}

/* CHAT PANEL */
.chat-panel{display:flex;flex-direction:column;background:rgba(1,10,15,0.6);overflow:hidden}
/* CHAT HEADER — centered peer + red challenge */
.chat-header{padding:16px 24px 12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:10px;flex-shrink:0;background:rgba(1,10,15,0.9);position:relative}
.chat-header-top{display:flex;align-items:center;gap:14px;width:100%}
.chat-peer-avatar{width:38px;height:38px;border-radius:50%;border:2px solid var(--cls,var(--cyan));overflow:hidden;background:rgba(0,0,0,0.3);flex-shrink:0}
.chat-peer-avatar img{width:100%;height:100%;object-fit:cover}
.chat-peer-info{flex:1;text-align:center}
.chat-peer-name{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:#fff}
.chat-peer-sub{font-family:'Orbitron',monospace;font-size:9px;color:var(--cls,var(--cyan));letter-spacing:1px;margin-top:2px}
.chat-header-actions{display:flex;gap:8px;align-items:center}
.chat-action-btn{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1px;padding:6px 12px;border:1px solid var(--border);color:var(--text-dim);background:transparent;cursor:pointer;transition:all 0.2s}
.chat-action-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.challenge-btn{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;padding:8px 20px;border:1px solid var(--red);color:var(--red);background:rgba(255,0,60,0.06);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px}
.challenge-btn:hover{background:var(--red);color:#fff;box-shadow:0 0 16px rgba(255,0,60,0.4)}

.chat-messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:12px}
.chat-messages::-webkit-scrollbar{width:3px}
.chat-messages::-webkit-scrollbar-track{background:transparent}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border)}

.msg{display:flex;gap:10px;max-width:75%;animation:msgIn 0.2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.mine{align-self:flex-end;flex-direction:row-reverse}
.msg.theirs{align-self:flex-start}
.msg-avatar{width:32px;height:32px;border-radius:50%;border:1px solid var(--cls,var(--cyan));overflow:hidden;flex-shrink:0;align-self:flex-end}
.msg-avatar img{width:100%;height:100%;object-fit:cover}
.msg-bubble{padding:10px 14px;font-size:13px;line-height:1.6;position:relative;max-width:100%;word-break:break-word}
.msg.mine .msg-bubble{background:rgba(0,245,255,0.12);border:1px solid rgba(0,245,255,0.2);border-radius:12px 12px 2px 12px;color:var(--text)}
.msg.theirs .msg-bubble{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px 12px 12px 2px;color:var(--text)}
.msg-time{font-family:'Orbitron',monospace;font-size:8px;color:var(--text-dim);margin-top:4px;display:flex;align-items:center;gap:4px;justify-content:flex-end}
.msg.theirs .msg-time{justify-content:flex-start}
.msg-sender{font-family:'Orbitron',monospace;font-size:8px;color:var(--cls,var(--cyan));margin-bottom:3px}

.msg-date-divider{text-align:center;margin:8px 0;font-family:'Orbitron',monospace;font-size:8px;letter-spacing:2px;color:var(--text-dim);position:relative}
.msg-date-divider::before,.msg-date-divider::after{content:'';position:absolute;top:50%;width:30%;height:1px;background:var(--border)}
.msg-date-divider::before{left:0} .msg-date-divider::after{right:0}

/* CHAT INPUT */
.chat-input-area{padding:12px 24px 16px;border-top:1px solid var(--border);background:rgba(1,10,15,0.9);flex-shrink:0}
.chat-input-toolbar{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.toolbar-btn{width:32px;height:32px;background:transparent;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-size:16px;flex-shrink:0}
.toolbar-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.chat-input-row{display:flex;gap:10px;align-items:flex-end}
.chat-input{flex:1;background:rgba(0,245,255,0.04);border:1px solid var(--border);color:var(--text);font-family:'Sarabun',sans-serif;font-size:14px;padding:11px 16px;outline:none;resize:none;transition:border-color 0.2s;max-height:100px;min-height:44px;line-height:1.5}
.chat-input:focus{border-color:var(--cyan)}
.chat-input::placeholder{color:var(--text-dim)}
.send-btn{width:44px;height:44px;background:var(--cyan);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.send-btn:hover{background:var(--cyan-dim)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed}
.chat-hint{font-family:'Orbitron',monospace;font-size:8px;color:var(--text-dim);margin-top:6px;letter-spacing:1px}
/* EMOJI PICKER */
.emoji-picker{position:absolute;bottom:110px;left:24px;background:#010d14;border:1px solid var(--border);padding:12px;display:none;z-index:300;width:300px;max-height:220px;overflow-y:auto}
.emoji-picker.open{display:block}
.emoji-picker-tabs{display:flex;gap:4px;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:8px}
.emoji-tab{font-size:18px;background:none;border:none;cursor:pointer;padding:3px 6px;opacity:0.5;transition:opacity 0.2s}
.emoji-tab.active,.emoji-tab:hover{opacity:1}
.emoji-grid{display:flex;flex-wrap:wrap;gap:4px}
.emoji-btn{font-size:22px;background:none;border:1px solid transparent;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:all 0.15s}
.emoji-btn:hover{background:rgba(0,245,255,0.08);border-color:var(--border)}
/* STICKER PICKER */
.sticker-picker{position:absolute;bottom:110px;left:24px;background:#010d14;border:1px solid var(--border);padding:12px;display:none;z-index:300;width:300px}
.sticker-picker.open{display:block}
.sticker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.sticker-btn{background:rgba(0,245,255,0.03);border:1px solid var(--border);cursor:pointer;padding:8px;font-size:32px;text-align:center;transition:all 0.2s;aspect-ratio:1}
.sticker-btn:hover{border-color:var(--cyan);background:rgba(0,245,255,0.08)}
/* IMAGE PREVIEW */
.img-preview{margin-bottom:8px;display:none;position:relative;width:fit-content}
.img-preview img{max-width:200px;max-height:140px;border:1px solid var(--border);display:block}
.img-preview-rm{position:absolute;top:-8px;right:-8px;width:20px;height:20px;background:var(--red);border:none;color:#fff;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;border-radius:50%}
/* MSG IMAGE */
.msg-image{max-width:240px;max-height:180px;border:1px solid var(--border);cursor:pointer;display:block;margin-bottom:4px}
.msg-image:hover{border-color:var(--cyan)}
/* MSG STICKER */
.msg-sticker{font-size:52px;display:block;line-height:1.2}

/* EMPTY CHAT */
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text-dim)}
.chat-empty-icon{font-size:48px;opacity:0.2}
.chat-empty-txt{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px}
.chat-empty-sub{font-size:12px;opacity:0.5;text-align:center;max-width:300px;line-height:1.6}

/* NEW DM MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#010d14;border:1px solid var(--border);width:420px;max-width:92vw;padding:28px;position:relative}
.modal::before{content:'';position:absolute;top:-1px;left:-1px;width:16px;height:16px;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan)}
.modal::after{content:'';position:absolute;bottom:-1px;right:-1px;width:16px;height:16px;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan)}
.modal-title{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:3px;color:var(--cyan);margin-bottom:20px}
.modal-input{width:100%;background:rgba(0,245,255,0.04);border:1px solid var(--border);color:var(--text);font-family:'Sarabun',sans-serif;font-size:14px;padding:11px 14px;outline:none;margin-bottom:10px;transition:border-color 0.2s}
.modal-input:focus{border-color:var(--cyan)}
.modal-input::placeholder{color:var(--text-dim)}
.search-results{max-height:220px;overflow-y:auto;margin-bottom:14px}
.search-result-item{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid transparent;cursor:pointer;transition:all 0.2s}
.search-result-item:hover{border-color:var(--border);background:rgba(0,245,255,0.04)}
.sr-avatar{width:36px;height:36px;border-radius:50%;border:2px solid var(--cls,var(--cyan));overflow:hidden;flex-shrink:0}
.sr-avatar img{width:100%;height:100%;object-fit:cover}
.sr-info{flex:1}
.sr-name{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;color:#fff}
.sr-sub{font-family:'Orbitron',monospace;font-size:8px;color:var(--text-dim);margin-top:2px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}
.modal-cancel{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;padding:10px 18px;border:1px solid var(--border);color:var(--text-dim);background:transparent;cursor:pointer;transition:all 0.2s}
.modal-cancel:hover{border-color:var(--red);color:var(--red)}

/* ONLINE DOT */
.online-wrap{position:relative;flex-shrink:0}
.online-dot{position:absolute;bottom:0;right:0;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg);z-index:2}
.online-dot.on{background:var(--green);box-shadow:0 0 5px var(--green);animation:livePulse 1.4s ease-in-out infinite}
.online-dot.off{background:#3a4a50}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* READ RECEIPT */
.msg-status{font-family:'Orbitron',monospace;font-size:9px;margin-top:2px;text-align:right;display:flex;align-items:center;justify-content:flex-end;gap:3px}
.tick-sent{color:var(--text-dim);display:inline-flex;align-items:center}
.tick-read{color:var(--cyan);display:inline-flex;align-items:center}

/* VOICE MESSAGE */
.voice-bubble{display:flex;align-items:center;gap:10px;padding:8px 12px;min-width:160px}
.voice-play-btn{width:30px;height:30px;border-radius:50%;background:var(--cyan);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s}
.voice-play-btn:hover{background:var(--cyan-dim)}
.voice-waveform{flex:1;display:flex;align-items:center;gap:2px;height:24px}
.voice-bar{width:3px;border-radius:2px;background:var(--cyan);opacity:0.6;transition:height 0.1s}
.voice-duration{font-family:'Orbitron',monospace;font-size:8px;color:var(--text-dim);white-space:nowrap}
.recording-indicator{display:none;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,0,60,0.08);border:1px solid rgba(255,0,60,0.3);margin-bottom:8px;font-family:'Orbitron',monospace;font-size:9px;color:var(--red)}
.recording-indicator.active{display:flex}
.rec-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:livePulse 0.8s ease-in-out infinite}
.toolbar-btn.recording{border-color:var(--red);color:var(--red)}

/* COMPACT CHAT HEADER */
.chat-header{padding:12px 16px 10px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px;flex-shrink:0;background:rgba(1,10,15,0.9);position:relative}
.chat-header-top{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%}
.chat-peer-card{display:flex;align-items:center;gap:10px;flex:1;min-width:0;justify-content:center}
.chat-peer-avatar-wrap{position:relative;flex-shrink:0}
.chat-peer-avatar{width:36px;height:36px;border-radius:50%;border:2px solid var(--cls,var(--cyan));overflow:hidden;background:rgba(0,0,0,0.3)}
.chat-peer-avatar img{width:100%;height:100%;object-fit:cover}
.chat-peer-texts{min-width:0}
.chat-peer-name{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-peer-sub{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1px;margin-top:1px;display:flex;align-items:center;gap:4px}
.chat-header-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.chat-action-btn{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1px;padding:5px 10px;border:1px solid var(--border);color:var(--text-dim);background:transparent;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.chat-action-btn:hover{border-color:var(--cyan);color:var(--cyan)}
/* UNREAD BADGE */
.conv-unread-badge{position:absolute;bottom:12px;right:14px;min-width:18px;height:18px;border-radius:9px;background:var(--cyan);color:var(--bg);font-family:'Orbitron',monospace;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;box-shadow:0 0 8px var(--cyan);animation:badgePulse 2s ease-in-out infinite}
@keyframes badgePulse{0%,100%{box-shadow:0 0 6px var(--cyan)}50%{box-shadow:0 0 14px var(--cyan),0 0 4px rgba(0,245,255,0.4)}}

@media(max-width:900px){.app-layout{grid-template-columns:1fr}.inbox{position:fixed;left:0;right:0;bottom:0;top:0;z-index:100;transform:translateX(0);transition:transform 0.3s ease}.inbox.hidden{transform:translateX(-100%)}.chat-panel{display:flex}}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .topbar{display:flex}
  .app-layout{left:0;top:60px}
  .inbox{position:fixed;inset:60px 0 0 0;z-index:50;transform:translateX(0);transition:transform 0.3s}
  .inbox.slide-out{transform:translateX(-100%)}
  .chat-panel{position:fixed;inset:60px 0 0 0}
}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">NEXUS LIFE</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
  <div class="loading-txt">LOADING MESSAGES...</div>
</div>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="grid-bg"></div>


  <button class="burger" onclick="openSidebar()"><span></span><span></span><span></span></button>
</div>

<div id="sidebar-root"></div>
<!-- APP LAYOUT -->
<div class="app-layout">

  <!-- INBOX -->
  <div class="inbox" id="inboxPanel">
    <div class="inbox-header">
      <div class="inbox-title" id="inboxTitleEl">MESSAGES</div>
      <div class="inbox-search">
        <span id="inboxSearchIconEl" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:0.4;pointer-events:none;line-height:0"></span>
        <input type="text" placeholder="ค้นหาชื่อ..." id="inboxSearch" oninput="filterInbox(this.value)">
      </div>
    </div>
    <button class="inbox-new-btn" onclick="openNewDM()">+ NEW MESSAGE</button>

<script type="module">
import { supabase } from './supabase.js'
import { initSidebar } from './sidebar.js'
import { CLASS_ICONS, CLASS_COLOR, getIcon, injectGlobalDefs } from './icons.js'
injectGlobalDefs()

function classIcon(cls, size=12) { return CLASS_ICONS[cls] ? `<svg width="${size}" height="${size}" viewBox="0 0 20 20" fill="none" style="display:inline-block;vertical-align:middle;flex-shrink:0;color:${CLASS_COLOR[cls]||'#00f5ff'}" stroke="${CLASS_COLOR[cls]||'#00f5ff'}" aria-hidden="true">${CLASS_ICONS[cls]}</svg>` : '' }


let currentUser = null
let myProfile   = null
let activePeer  = null   // { id, username, display_name, class, level, avatar_seed }
let activeChannel = null
let realtimeSub   = null
let allConversations = [] // cache inbox
let lastDateLabel = ''

// ─── INIT ────────────────────────────────────────────────────
async function init() {
  const { user, profile } = await initSidebar('messages')
  if (!user) return
  currentUser = user
  myProfile = profile  // ใช้ profile จาก sidebar.js โดยตรง

  // inject static icons via getIcon
  const inboxTitle = document.getElementById('inboxTitleEl')
  if (inboxTitle) inboxTitle.innerHTML = getIcon('msg', 16) + ' MESSAGES'

  const inboxSearchIcon = document.getElementById('inboxSearchIconEl')
  if (inboxSearchIcon) inboxSearchIcon.innerHTML = getIcon('search', 14)

  const chatEmptyIcon = document.getElementById('chatEmptyIconEl')
  if (chatEmptyIcon) chatEmptyIcon.innerHTML = getIcon('chat', 48)

  const newDMTitle = document.getElementById('newDMTitleEl')
  if (newDMTitle) newDMTitle.innerHTML = getIcon('msg', 16) + ' NEW MESSAGE'

  const challengeBtn = document.getElementById('challengeBtnEl')
  if (challengeBtn) challengeBtn.innerHTML = getIcon('sword', 14) + ' ท้าดวล'

  const toolbarImgBtn = document.getElementById('toolbarImgBtn')
  if (toolbarImgBtn) toolbarImgBtn.innerHTML = getIcon('upload_img', 14)

  const voiceBtn = document.getElementById('voiceBtn')
  if (voiceBtn) { voiceBtn.innerHTML = getIcon('wave', 14); voiceBtn._defaultHtml = voiceBtn.innerHTML }

  const chatEmptyWave = document.getElementById('chatEmptyWave')
  if (chatEmptyWave) chatEmptyWave.innerHTML = getIcon('chat', 36)

  await loadInbox()

  // ถ้า URL มี ?uid= → เปิด DM กับ user นั้นทันที
  const params = new URLSearchParams(window.location.search)
  const uidParam = params.get('uid')
  if (uidParam) {
    const { data: peer } = await supabase.from('users')
      .select('id,username,display_name,class,level,avatar_seed,avatar_url').eq('id', uidParam).single()
    if (peer) openChat(peer)
  }

  document.getElementById('loadingScreen').style.display = 'none'
  initCursor()
}

// ─── LOAD INBOX ──────────────────────────────────────────────
async function loadInbox() {
  // ดึงข้อความล่าสุดของทุก DM channel ที่เกี่ยวข้องกับ currentUser
  // channel format: dm:{smallerId}:{largerId} (เรียง UUID เพื่อ unique key)
  const { data: sent } = await supabase.from('messages')
    .select('channel, content, created_at, sender_id')
    .eq('sender_id', currentUser.id)
    .like('channel', 'dm:%')
    .order('created_at', { ascending: false })

  const { data: recv } = await supabase.from('messages')
    .select('channel, content, created_at, sender_id')
    .neq('sender_id', currentUser.id)
    .like('channel', `dm:%${currentUser.id}%`)
    .order('created_at', { ascending: false })

  // รวม channels unique ล่าสุด
  const channelMap = {}
  ;[...(sent||[]), ...(recv||[])].forEach(m => {
    if (!channelMap[m.channel] || new Date(m.created_at) > new Date(channelMap[m.channel].created_at)) {
      channelMap[m.channel] = m
    }
  })

  // filter เฉพาะ channel ที่เกี่ยวข้องกับตัวเอง
  const myChannels = Object.entries(channelMap)
    .filter(([ch]) => ch.includes(currentUser.id))
    .sort((a,b) => new Date(b[1].created_at) - new Date(a[1].created_at))

  if (!myChannels.length) {
    document.getElementById('inboxList').innerHTML = `
      <div class="inbox-empty">
        <span class="inbox-empty-icon">${getIcon('msg', 32)}</span>
        <div class="inbox-empty-txt">ยังไม่มีข้อความ</div>
      </div>`
    return
  }

  // ดึง peer user info สำหรับแต่ละ channel
  const peerIds = myChannels.map(([ch]) => {
    const parts = ch.replace('dm:','').split(':')
    return parts.find(id => id !== currentUser.id)
  }).filter(Boolean)

  const { data: peers } = await supabase.from('users')
    .select('id,username,display_name,class,level,avatar_seed,avatar_url')
    .in('id', peerIds)

  const peerMap = {}
  ;(peers||[]).forEach(p => { peerMap[p.id] = p })

  allConversations = myChannels.map(([ch, lastMsg]) => {
    const peerId = ch.replace('dm:','').split(':').find(id => id !== currentUser.id)
    return { channel: ch, lastMsg, peer: peerMap[peerId] }
  }).filter(c => c.peer)

  // คำนวณ unread count ต่อ channel (ข้อความจาก peer ที่เราเปิดทีหลัง lastRead)
  const unreadMap = {}
  allConversations.forEach(c => {
    const lastReadKey = `nexus_last_read_${c.channel}`
    const lastRead = localStorage.getItem(lastReadKey)
    if (!lastRead) {
      // ถ้าไม่เคยอ่าน นับข้อความจาก peer ทั้งหมด
      const unread = [...(sent||[]), ...(recv||[])].filter(m =>
        m.channel === c.channel && m.sender_id !== currentUser.id
      ).length
      unreadMap[c.channel] = unread
    } else {
      const unread = [...(sent||[]), ...(recv||[])].filter(m =>
        m.channel === c.channel &&
        m.sender_id !== currentUser.id &&
        new Date(m.created_at) > new Date(lastRead)
      ).length
      unreadMap[c.channel] = unread
    }
  })

  renderInbox(allConversations, unreadMap)
}

// ─── RENDER INBOX ────────────────────────────────────────────
function renderInbox(convs, unreadMap = {}) {
  const el = document.getElementById('inboxList')
  if (!convs.length) {
    el.innerHTML = `<div class="inbox-empty"><span class="inbox-empty-icon">${getIcon('msg', 32)}</span><div class="inbox-empty-txt">ไม่พบบทสนทนา</div></div>`
    return
  }

  el.innerHTML = convs.map(c => {
    const p = c.peer
    const cls = p.class || 'warrior'
    const isMine = c.lastMsg.sender_id === currentUser.id
    const preview = (isMine ? 'คุณ: ' : '') + (c.lastMsg.content || '').substring(0, 35) + (c.lastMsg.content?.length > 35 ? '...' : '')
    const timeStr = formatTime(c.lastMsg.created_at)
    const isActive = activePeer?.id === p.id
    const unread = unreadMap[c.channel] || 0
    const badgeHtml = (!isActive && unread > 0)
      ? `<div class="conv-unread-badge">${unread > 99 ? '99+' : unread}</div>`
      : ''

    return `
    <div class="conv-item cls-${cls} ${isActive ? 'active' : ''}" onclick="openChatConv(${JSON.stringify(p).replace(/"/g,'&quot;')}, '${c.channel}')">
      <div class="online-wrap" style="flex-shrink:0">
        <div class="conv-avatar cls-${cls}" style="border-color:${CLASS_COLOR[cls]}">
          <img src="${getAvatarSrc(p, 42)}" alt="">
        </div>
        <div class="online-dot off conv-online-dot" data-uid="${p.id}"></div>
      </div>
      <div class="conv-info">
        <div class="conv-name">${esc(p.display_name || p.username)}</div>
        <div class="conv-preview">${esc(preview)}</div>
      </div>
      <div class="conv-time">${timeStr}</div>
      ${badgeHtml}
    </div>`
  }).join('')
}

window.filterInbox = function(q) {
  if (!q) { renderInbox(allConversations); return }
  const filtered = allConversations.filter(c =>
    c.peer.username.toLowerCase().includes(q.toLowerCase()) ||
    c.peer.display_name?.toLowerCase().includes(q.toLowerCase())
  )
  renderInbox(filtered)
}

// ─── OPEN CHAT CONV (wrapper จาก inbox — บันทึก lastRead ก่อน) ───────────────
window.openChatConv = function(peer, channel) {
  // บันทึก lastRead ต่อ channel ทันที → clear badge
  const lastReadKey = `nexus_last_read_${channel}`
  localStorage.setItem(lastReadKey, new Date().toISOString())
  // ซ่อน badge บน DOM ทันทีโดยไม่รอ reload
  const items = document.querySelectorAll('.conv-unread-badge')
  items.forEach(b => {
    // เอา badge ของ conv นี้ออก
    if (b.closest('.conv-item')?.querySelector(`[data-uid="${peer.id}"]`)) {
      b.remove()
    }
  })
  openChat(peer)
}

// ─── OPEN CHAT ───────────────────────────────────────────────
window.openChat = async function(peer) {
  activePeer = peer
  activeChannel = getDMChannel(currentUser.id, peer.id)

  // UI peer info
  const cls = peer.class || 'warrior'
  document.getElementById('peerAvatar').src = getAvatarSrc(peer, 38)
  document.getElementById('peerAvatarWrap').className = `chat-peer-avatar cls-${cls}`
  document.getElementById('peerAvatarWrap').style.borderColor = CLASS_COLOR[cls]
  // set cls บน chat-peer-card ด้วย เพื่อให้ --cls cascade ถึง peerSub
  const peerCard = document.querySelector('.chat-peer-card')
  if (peerCard) peerCard.className = `chat-peer-card cls-${cls}`
  document.getElementById('peerName').textContent = esc(peer.display_name || peer.username)
  document.getElementById('peerSub').innerHTML =
    `${classIcon(cls,11)}<span style="color:${CLASS_COLOR[cls]}">${cls.toUpperCase()}</span><span style="color:var(--text-dim)"> · LV.${peer.level||1}</span>`

  // online dot — check last_seen
  checkOnlineStatus(peer.id, 'peerOnlineDot')

  // Show chat panel
  document.getElementById('chatEmpty').style.display = 'none'
  const chatActive = document.getElementById('chatActive')
  chatActive.style.display = 'flex'

  // Mobile: ซ่อน inbox
  if (window.innerWidth <= 768) {
    document.getElementById('inboxPanel').classList.add('slide-out')
    document.getElementById('backBtn').style.display = 'inline-flex'
  }

  // Mark messages as read เมื่อเปิดแชท — ซ่อน badge ทันที
  await markMessagesRead(activeChannel)

  // Unsubscribe channel เก่า
  if (realtimeSub) { supabase.removeChannel(realtimeSub); realtimeSub = null }

  // โหลด history
  await loadChatHistory()

  // Subscribe realtime
  realtimeSub = supabase.channel(`chat:${activeChannel}`)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'messages',
      filter: `channel=eq.${activeChannel}`
    }, async (payload) => {
      const msg = payload.new
      // ดึง sender info ถ้าไม่ใช่ตัวเอง
      if (msg.sender_id !== currentUser.id) {
        const { data: senderData } = await supabase.from('users')
          .select('username,display_name,avatar_seed,avatar_url,class').eq('id', msg.sender_id).single()
        msg.users = senderData
      } else {
        msg.users = myProfile
      }
      appendMessage(msg)
    }).subscribe()

  // Focus input
  document.getElementById('chatInput').focus()

  // Reload inbox เพื่ออัพเดต active state
  renderInbox(allConversations)
}

window.showInbox = function() {
  document.getElementById('inboxPanel').classList.remove('slide-out')
  document.getElementById('backBtn').style.display = 'none'
  // Hide chat panel and reset so old messages don't show through
  const chatActive = document.getElementById('chatActive')
  chatActive.style.display = 'none'
  document.getElementById('chatEmpty').style.display = 'flex'
  document.getElementById('chatMessages').innerHTML = ''
  activePeer = null
  activeChannel = null
  if (realtimeSub) { supabase.removeChannel(realtimeSub); realtimeSub = null }
}

// ─── LOAD CHAT HISTORY ───────────────────────────────────────
async function loadChatHistory() {
  const msgEl = document.getElementById('chatMessages')
  msgEl.innerHTML = `<div style="text-align:center;font-family:'Orbitron',monospace;font-size:9px;color:var(--text-dim);padding:20px">กำลังโหลด...</div>`
  lastDateLabel = ''

  const { data, error } = await supabase.from('messages')
    .select('*, users(username, display_name, avatar_seed, avatar_url, class)')
    .eq('channel', activeChannel)
    .order('created_at', { ascending: true })
    .limit(100)

  if (error) { msgEl.innerHTML = `<div style="color:var(--red);padding:20px">${error.message}</div>`; return }
  if (!data?.length) {
    msgEl.innerHTML = `<div class="chat-empty" style="flex:1">
      <div class="chat-empty-icon" id="chatEmptyWave"></div>
      <div class="chat-empty-txt">เริ่มบทสนทนาใหม่</div>
      <div class="chat-empty-sub">ส่งข้อความแรกเพื่อเริ่มคุยกับ ${esc(activePeer.display_name || activePeer.username)}</div>
    </div>`
    return
  }

  msgEl.innerHTML = ''
  data.forEach(msg => appendMessage(msg, false))
  scrollToBottom()
}

// ─── APPEND MESSAGE ──────────────────────────────────────────
function appendMessage(msg, scroll=true) {
  const msgEl = document.getElementById('chatMessages')
  const isMine = msg.sender_id === currentUser.id
  const sender = msg.users
  const cls = sender?.class || (isMine ? (myProfile?.class||'warrior') : 'warrior')

  // Date divider
  const msgDate = new Date(msg.created_at)
  const dateLabel = msgDate.toLocaleDateString('th-TH', { year:'numeric', month:'short', day:'numeric' })
  if (dateLabel !== lastDateLabel) {
    lastDateLabel = dateLabel
    const div = document.createElement('div')
    div.className = 'msg-date-divider'
    div.textContent = dateLabel
    msgEl.appendChild(div)
  }

  const timeStr = msgDate.toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' })

  // Content by type — ใช้ prefix แทน payload column
  let contentHtml = ''
  const rawContent = msg.content || ''
  if (rawContent.startsWith('[img]')) {
    const imgUrl = esc(rawContent.slice(5))
    contentHtml = `<img class="msg-image" src="${imgUrl}" alt="รูปภาพ" onclick="window.open('${imgUrl}','_blank')">`
  } else if (rawContent.startsWith('[sticker]')) {
    contentHtml = `<span class="msg-sticker">${rawContent.slice(9)}</span>`
  } else if (rawContent.startsWith('[voice]')) {
    const parts = rawContent.slice(7).split('|')
    const audioUrl = esc(parts[0])
    const dur = parseInt(parts[1]||0)
    const mm = String(Math.floor(dur/60)).padStart(2,'0')
    const ss = String(dur%60).padStart(2,'0')
    const bars = Array.from({length:20},(_,i)=>{
      const h = 4 + Math.sin(i*0.8)*8 + Math.random()*8
      return `<div class="voice-bar" style="height:${Math.max(4,h)}px"></div>`
    }).join('')
    contentHtml = `<div class="msg-bubble voice-bubble">
      <button class="voice-play-btn" onclick="playVoice('${audioUrl}',this)">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 1l7 4-7 4z" fill="#010a0f"/></svg>
      </button>
      <div class="voice-waveform">${bars}</div>
      <span class="voice-duration">${mm}:${ss}</span>
    </div>`
  } else {
    contentHtml = `<div class="msg-bubble">${escHtml(rawContent)}</div>`
  }

  const myAvSrc = myProfile?.avatar_url || getAvatarUrl(myProfile?.avatar_seed, 32)
  const theirAvSrc = sender?.avatar_url || getAvatarUrl(sender?.avatar_seed, 32)
  const myCls = myProfile?.class || 'warrior'

  const wrapper = document.createElement('div')
  wrapper.className = `msg ${isMine ? 'mine' : 'theirs'}`
  // SVG tick icons — single when sent, double when read
  const TICK_SVG_SINGLE = `<svg width="14" height="10" viewBox="0 0 14 10" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 5l4 4 8-8" stroke="currentColor" stroke-width="1.6" stroke-linecap="square"/></svg>`
  const TICK_SVG_DOUBLE = `<svg width="18" height="10" viewBox="0 0 18 10" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 5l4 4 8-8" stroke="currentColor" stroke-width="1.6" stroke-linecap="square"/><path d="M5 5l4 4 8-8" stroke="currentColor" stroke-width="1.6" stroke-linecap="square"/></svg>`
  const tickHtml = isMine
    ? `<div class="msg-status"><span class="tick-sent" id="tick-${msg.id||Date.now()}">${TICK_SVG_SINGLE}</span></div>`
    : ''
  wrapper.innerHTML = `
    <div class="online-wrap">
      <div class="msg-avatar cls-${isMine ? myCls : cls}" style="border-color:${isMine ? CLASS_COLOR[myCls] : CLASS_COLOR[cls]}">
        <img src="${isMine ? myAvSrc : theirAvSrc}" alt="">
      </div>
    </div>
    <div>
      ${!isMine ? `<div class="msg-sender" style="color:#fff">${esc(sender?.display_name||sender?.username||'?')}</div>` : ''}
      ${contentHtml}
      <div class="msg-time">${timeStr}${tickHtml}</div>
    </div>`

  msgEl.appendChild(wrapper)
  if (scroll) scrollToBottom()
}


function scrollToBottom() {
  const el = document.getElementById('chatMessages')
  setTimeout(() => { el.scrollTop = el.scrollHeight }, 50)
}

// ─── SEND MESSAGE ────────────────────────────────────────────
window.sendMessage = async function() {
  const input = document.getElementById('chatInput')
  const content = input.value.trim()
  if ((!content && !pendingImageUrl) || !activeChannel) return

  const btn = document.getElementById('sendBtn')
  btn.disabled = true
  if (!pendingImageUrl) { // ถ้ามีรูป ไม่เคลียร์ text input
    input.value = ''
    input.style.height = 'auto'
  }

  const isImage = !!pendingImageUrl
  const msgContent = pendingImageUrl || content
  // prefix content เพื่อระบุ type แทน payload column ที่ไม่มีใน schema
  const dbContent = isImage ? '[img]' + msgContent : msgContent
  const { error } = await supabase.from('messages').insert({
    sender_id: currentUser.id,
    channel: activeChannel,
    content: dbContent
  })
  pendingImageUrl = null
  clearImageUploadUI()

  if (error) {
    showToast('ส่งข้อความไม่สำเร็จ: ' + error.message, 'error')
    input.value = content
  } else {
    // append locally (realtime จะ fire ด้วย แต่ filter ออก sender ตัวเอง)
    appendMessage({
      sender_id: currentUser.id,
      channel: activeChannel,
      content: dbContent,
      created_at: new Date().toISOString(),
      users: myProfile
    })
    // อัพเดต inbox preview
    await loadInbox()
  }

  btn.disabled = false
  input.focus()
}

async function checkOnlineStatus(uid, dotId) {
  try {
    const { data } = await supabase.from('users').select('last_seen').eq('id', uid).single()

    const isOnline = (Date.now() - new Date(data.last_seen).getTime()) < 5 * 60 * 1000 // 5 นาที
    const dot = document.getElementById(dotId)
    if (dot) { dot.className = `online-dot ${isOnline ? 'on' : 'off'}` }
  } catch(e) {}
}

async function refreshInboxOnlineDots() {
  document.querySelectorAll('.conv-online-dot[data-uid]').forEach(async dot => {
    const uid = dot.dataset.uid
    try {
      const { data } = await supabase.from('users').select('last_seen').eq('id', uid).single()

// ─── VOICE RECORDING ─────────────────────────────────────────
let mediaRecorder = null
let audioChunks   = []
let recInterval   = null
let recSeconds    = 0
let isRecording   = false

window.toggleRecording = async function() {
  if (isRecording) { stopRecording(); return }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true })
    // Android Chrome only truly supports webm/opus for MediaRecorder
    // mp4 may report isTypeSupported=true but fails at record time → always try webm first
    const supportedMime = [
      'audio/webm;codecs=opus',
      'audio/webm',
      'audio/ogg;codecs=opus',
      'audio/ogg',
      'audio/mp4'
    ].find(t => {
      try { return MediaRecorder.isTypeSupported(t) } catch(e) { return false }
    })
    const recOpts = supportedMime ? { mimeType: supportedMime } : {}
    try {
      mediaRecorder = new MediaRecorder(stream, recOpts)
    } catch(e) {
      // if chosen mime fails at construction, try without options
      mediaRecorder = new MediaRecorder(stream)
    }
    audioChunks = []
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data) }
    mediaRecorder.start()
    isRecording = true
    recSeconds = 0
    document.getElementById('voiceBtn').classList.add('recording')
    document.getElementById('recordingIndicator').classList.add('active')
    recInterval = setInterval(() => {
      recSeconds++
      const m = String(Math.floor(recSeconds/60)).padStart(2,'0')
      const s = String(recSeconds%60).padStart(2,'0')
      document.getElementById('recTimer').textContent = `${m}:${s}`
      if (recSeconds >= 120) stopRecording() // max 2 นาที
    }, 1000)
  } catch(e) {
    showToast('ไม่สามารถเข้าถึงไมค์ได้', 'error')
  }
}

window.stopRecording = async function() {
  if (!mediaRecorder || !isRecording) return
  isRecording = false
  clearInterval(recInterval)
  document.getElementById('voiceBtn').classList.remove('recording')
  document.getElementById('recordingIndicator').classList.remove('active')

  mediaRecorder.onstop = async () => {
    const mimeType = mediaRecorder.mimeType || 'audio/webm'
    const ext = mimeType.includes('ogg') ? 'ogg' : mimeType.includes('mp4') ? 'mp4' : 'webm'
    const uploadMime = mimeType.split(';')[0] || 'audio/webm' // strip codec params for Supabase
    const blob = new Blob(audioChunks, { type: uploadMime })
    mediaRecorder.stream.getTracks().forEach(t => t.stop())
    if (!activeChannel) return
    // Upload to Supabase storage
    const path = `voice/${currentUser.id}/${Date.now()}.${ext}`
    const { data, error } = await supabase.storage.from('nexuslife').upload(path, blob, { upsert: true, contentType: uploadMime })
    if (error) { showToast('ส่งเสียงไม่สำเร็จ: ' + error.message, 'error'); return }
    const { data: urlData } = supabase.storage.from('nexuslife').getPublicUrl(path)
    const duration = recSeconds
    const content = `[voice]${urlData.publicUrl}|${duration}`
    const { error: e2 } = await supabase.from('messages').insert({
      sender_id: currentUser.id, channel: activeChannel, content
    })
    if (!e2) {
      appendMessage({ sender_id: currentUser.id, channel: activeChannel, content, created_at: new Date().toISOString(), users: myProfile })
      await loadInbox()
    }
  }
  mediaRecorder.stop()
}

window.cancelRecording = function() {
  if (!mediaRecorder) return
  isRecording = false
  clearInterval(recInterval)
  mediaRecorder.stream.getTracks().forEach(t => t.stop())
  mediaRecorder = null
  audioChunks = []
  document.getElementById('voiceBtn').classList.remove('recording')
  document.getElementById('recordingIndicator').classList.remove('active')
}

function getDMChannel(uid1, uid2) {

function getAvatarUrl(avatarUrlOrSeed, size=80) {
  if (!avatarUrlOrSeed) return `https://api.dicebear.com/9.x/pixel-art/svg?seed=nexus&size=${size}`
  if (avatarUrlOrSeed.startsWith('http') || avatarUrlOrSeed.startsWith('/')) return avatarUrlOrSeed
  const [style, s, bg] = avatarUrlOrSeed.split(':')
  return `https://api.dicebear.com/9.x/${style||'pixel-art'}/svg?seed=${encodeURIComponent(s||'nexus')}&backgroundColor=${bg||'0a1628'}&size=${size}`
}
function getAvatarSrc(u, size=80) {
  return u.avatar_url ? u.avatar_url : getAvatarUrl(u.avatar_seed, size)
}

function formatTime(ts) {
  const d = new Date(ts), now = new Date()
  const diff = now - d
  if (diff < 60000) return 'เมื่อกี้'
  if (diff < 3600000) return Math.floor(diff/60000) + ' นาที'
  if (diff < 86400000) return Math.floor(diff/3600000) + ' ชม.'
  if (diff < 604800000) return Math.floor(diff/86400000) + ' วัน'
  return d.toLocaleDateString('th-TH', { day:'numeric', month:'short' })
}

function esc(s) { return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;') }
function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>').replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" style="color:var(--cyan)">$1</a>')
}

window.showToast = function(msg, type='info') {

function initCursor() {
  const cur = document.getElementById('cursor'), ring = document.getElementById('cursorRing')
  let mx=0,my=0,rx=0,ry=0
  document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; cur.style.left=mx+'px'; cur.style.top=my+'px' })
  ;(function animRing(){ rx+=(mx-rx)*.12; ry+=(my-ry)*.12; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(animRing) })()
  document.querySelectorAll('button,a,.conv-item,.search-result-item').forEach(el => {
    el.addEventListener('mouseenter', () => { ring.style.width='44px'; ring.style.height='44px' })
    el.addEventListener('mouseleave', () => { ring.style.width='32px'; ring.style.height='32px' })
  })
}

  document.getElementById('emojiPicker').classList.remove('open')

    sender_id: currentUser.id,
    channel: activeChannel,
    content: '[sticker]' + sticker
  })
  if (!error) {
    appendMessage({
      sender_id: currentUser.id, channel: activeChannel,
      content: '[sticker]' + sticker,
      created_at: new Date().toISOString(), users: myProfile
    })
    await loadInbox()
  }

}

window.handleImageSelect = async function(e) {
  const file = e.target.files[0]
  if (!file) return
  if (file.size > 5 * 1024 * 1024) { showToast('รูปใหญ่เกิน 5MB', 'error'); return }

  // Preview
  const reader = new FileReader()
  reader.onload = ev => {
    document.getElementById('imgPreviewImg').src = ev.target.result
    document.getElementById('imgPreview').style.display = 'block'
  }
  reader.readAsDataURL(file)

  // Upload to Supabase Storage
  const ext = file.name.split('.').pop()
  const path = `chat/${currentUser.id}/${Date.now()}.${ext}`
  const { data, error } = await supabase.storage.from('nexuslife').upload(path, file, { upsert: true })
  if (error) { showToast('อัปโหลดไม่สำเร็จ: ' + error.message, 'error'); clearImageUploadUI(); return }

  const { data: urlData } = supabase.storage.from('nexuslife').getPublicUrl(path)
  pendingImageUrl = urlData.publicUrl
  showToast('เลือกรูปแล้ว — กดส่งเพื่อส่ง', 'success')
  // reset input
  e.target.value = ''
}

window.clearImageUpload = function() {
  pendingImageUrl = null
  clearImageUploadUI()
}

function clearImageUploadUI() {
  document.getElementById('imgPreview').style.display = 'none'
  document.getElementById('imgPreviewImg').src = ''
}

window.playVoice = function(url, btn) {
  const audio = new Audio(url)
  const origHtml = btn.innerHTML
  btn.innerHTML = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="2" y="1" width="2.5" height="8" fill="#010a0f"/><rect x="5.5" y="1" width="2.5" height="8" fill="#010a0f"/></svg>`
  audio.play()
  audio.onended = () => { btn.innerHTML = origHtml }
  audio.onerror = () => { btn.innerHTML = origHtml; showToast('เล่นเสียงไม่ได้', 'error') }
}
