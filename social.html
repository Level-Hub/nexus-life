<!DOCTYPE html>
<html lang="th" data-page="social">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEXUS LIFE — Social</title>
<link rel="stylesheet" href="./theme.css">

<style>

  
  

 

/* MAIN */
.main{margin-left:220px;min-height:100vh;position:relative;z-index:1;padding:32px 28px 60px}

/* LOADING — SPINNING GLOBE */
.loading-screen{position:fixed;inset:0;background:var(--bg);z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px}
.loading-screen.warp-out{animation:socialWarpOut 0.7s cubic-bezier(0.4,0,0.2,1) forwards}
@keyframes socialWarpOut{
  0%  {transform:scale(1);opacity:1;filter:blur(0px)}
  40% {transform:scale(0.95);opacity:1;filter:blur(0px)}
  70% {transform:scale(18);opacity:0.6;filter:blur(4px)}
  100%{transform:scale(40);opacity:0;filter:blur(12px)}
}
/* ── GLOBE WRAP ── */
.globe-wrap{
  position:relative;width:110px;height:110px;
  display:flex;align-items:center;justify-content:center;
}
.globe-glow{
  position:absolute;inset:-24px;
  background:radial-gradient(ellipse,var(--accent-glow) 0%,transparent 70%);
  animation:globeGlowPulse 2s ease-in-out infinite;pointer-events:none;
}
@keyframes globeGlowPulse{0%,100%{opacity:0.5}50%{opacity:1}}
/* ── SVG โลก outer ring ── */
.globe-ring{
  position:absolute;inset:-8px;border-radius:50%;
  border:1px solid var(--accent-glow);
  animation:ringOrbit 4s linear infinite;
}
.globe-ring-dot{
  position:absolute;top:-3px;left:50%;transform:translateX(-50%);
  width:6px;height:6px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 8px var(--accent-glow);
}
@keyframes ringOrbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
/* ── SVG โลกหมุน ── */
.globe-svg-wrap{
  width:90px;height:90px;border-radius:50%;overflow:hidden;
  border:2px solid var(--accent-glow);
  box-shadow:0 0 24px var(--accent-glow),inset 0 0 20px rgba(0,0,0,0.6);
  position:relative;
  background:radial-gradient(circle at 35% 35%, #010a0f 0%, #010a0f 100%);
}
/* ── พื้นน้ำ ── */
.globe-ocean{
  position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #010a0f 0%, #010a0f 60%, #010a0f 100%);
}
/* ── แผ่นดินหมุน ── */
.globe-land{
  position:absolute;inset:0;
  animation:globeSpin 6s linear infinite;
}
@keyframes globeSpin{from{transform:translateX(0%)}to{transform:translateX(-50%)}}
/* ── เส้นกริดลองจิจูด/ละติจูด ── */
.globe-grid{
  position:absolute;inset:0;border-radius:50%;
  animation:globeSpin 6s linear infinite;
  opacity:0.25;
}
/* ── แสงสะท้อน ── */
.globe-shine{
  position:absolute;top:8px;left:14px;
  width:28px;height:20px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(200,180,255,0.25) 0%,transparent 80%);
  pointer-events:none;
}
/* ── atmosphere glow ── */
.globe-atm{
  position:absolute;inset:-4px;border-radius:50%;
  background:radial-gradient(circle at 50% 50%,transparent 42%,var(--border) 55%,var(--panel) 70%,transparent 80%);
  pointer-events:none;
}
/* ── TEXT ── */
.loading-logo{
  font-family:var(--font-display);font-size:24px;font-weight:900;
  letter-spacing:6px;color:var(--accent);
  text-shadow:0 0 24px var(--accent-glow),0 0 48px var(--accent-glow);
}
.loading-bar-wrap{width:160px;height:2px;background:var(--border);border:1px solid var(--accent-glow)}
.loading-bar{
  height:100%;
  background:linear-gradient(90deg,#003a4a,var(--accent),var(--accent));
  animation:loadAnim 1.4s ease-in-out infinite;
}
55%{width:70%}100%{width:100%}}
.loading-txt{font-family:var(--font-display);font-size:9px;letter-spacing:3px;color:var(--text-dim)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;z-index:2000;font-family:var(--font-display);font-size:10px;letter-spacing:1px;padding:14px 20px;border-left:3px solid var(--accent);background:rgba(1,10,15,0.96);border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border);color:var(--accent);transform:translateX(120%);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);max-width:280px;line-height:1.5}
.toast.show{transform:translateX(0)}
.toast.success{border-left-color:var(--accent);color:var(--green)}
.toast.error{border-left-color:var(--accent);color:var(--accent)}

to{opacity:1;transform:translateY(0)}}
to{opacity:1;transform:translateY(0)}}

/* PAGE HEADER */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;animation:fadeInDown 0.5s ease both}
.page-title{font-family:var(--font-display);font-size:22px;font-weight:900;color:#fff;display:flex;align-items:center;gap:12px;letter-spacing:2px}
.page-title .title-icon{display:flex;align-items:center;justify-content:center;flex-shrink:0}
.page-title span{color:var(--accent);text-shadow:0 0 16px var(--accent),0 0 32px rgba(var(--accent-rgb),0.3)}
.page-date{font-family:var(--font-display);font-size:9px;letter-spacing:2px;color:var(--text-dim);margin-top:4px}

/* SEARCH BAR */
.search-bar{display:flex;gap:10px;margin-bottom:24px;animation:fadeInUp 0.5s 0.05s ease both}
.search-wrap{flex:1;position:relative}
.search-input{width:100%;background:rgba(var(--accent-rgb),0.03);border:1px solid var(--border);color:var(--text);font-family:var(--font-ui);font-size:14px;padding:12px 14px 12px 44px;outline:none;transition:all 0.3s}
.search-input:focus{border-color:var(--accent);background:rgba(var(--accent-rgb),0.06)}
.search-input::placeholder{color:var(--text-dim)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:0.4;pointer-events:none}
.search-btn{font-family:var(--font-display);font-size:10px;letter-spacing:2px;padding:12px 20px;background:transparent;border:1px solid var(--accent);color:var(--accent);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.search-btn:hover{background:var(--accent);color:var(--bg)}

/* FILTERS */
.filter-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;animation:fadeInUp 0.5s 0.1s ease both}
.filter-btn{font-family:var(--font-display);font-size:9px;letter-spacing:1px;padding:6px 14px;background:transparent;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px}
.filter-btn.active,.filter-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(var(--accent-rgb),0.06)}
.filter-btn.cls-warrior.active{border-color:var(--stat-str);color:var(--stat-str);background:rgba(var(--danger-rgb),0.06)}
.filter-btn.cls-mage.active{border-color:var(--stat-int);color:var(--stat-int);background:rgba(170,68,255,0.06)}
.filter-btn.cls-explorer.active{border-color:var(--accent);color:var(--accent);background:rgba(var(--accent-rgb),0.06)}
.filter-btn.cls-merchant.active{border-color:var(--cls-merchant);color:var(--cls-merchant);background:rgba(255,170,0,0.06)}
.filter-btn.cls-artist.active{border-color:var(--stat-cre);color:var(--stat-cre);background:rgba(255,102,170,0.06)}
.filter-btn.cls-diplomat.active{border-color:var(--stat-soc);color:var(--stat-soc);background:rgba(0,204,255,0.06)}

/* LAYOUT */
.social-layout{display:grid;grid-template-columns:1fr 300px;gap:20px;animation:fadeInUp 0.5s 0.15s ease both}

/* TAB BAR */
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab-btn{font-family:var(--font-display);font-size:10px;letter-spacing:2px;padding:12px 20px;color:var(--text-dim);background:transparent;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:8px}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn:hover:not(.active){color:var(--text)}
.tab-count{font-family:var(--font-display);font-size:9px;padding:2px 6px;border-radius:8px;background:rgba(var(--accent-rgb),0.1);color:var(--accent)}

/* USER CARDS */
.user-grid{display:flex;flex-direction:column;gap:8px}
.user-card{background:var(--panel);border:1px solid var(--border);padding:14px 16px;display:flex;flex-direction:column;gap:10px;transition:all 0.25s;position:relative;cursor:pointer}
.user-card:hover{border-color:rgba(var(--accent-rgb),0.25);background:rgba(var(--accent-rgb),0.05)}
.user-card-top{display:flex;align-items:flex-start;gap:12px}
.user-card-avatar{width:48px;height:48px;border-radius:50%;border:2px solid var(--cls,var(--accent));overflow:hidden;background:rgba(0,0,0,0.3);flex-shrink:0}
.user-card-avatar img{width:100%;height:100%;object-fit:cover}
.user-card-info{flex:1;min-width:0}
.user-card-name{font-family:var(--font-display);font-size:12px;font-weight:700;color:#fff;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-card-sub{font-family:var(--font-display);font-size:9px;color:var(--cls,var(--accent));letter-spacing:1px;margin-bottom:4px}
.user-card-meta{font-size:11px;color:var(--text-dim);display:flex;gap:8px;flex-wrap:wrap}
.user-card-meta span{display:flex;align-items:center;gap:4px}
.user-card-actions{display:flex;gap:8px;width:100%}
.follow-btn{font-family:var(--font-display);font-size:9px;letter-spacing:1px;padding:8px 10px;border:1px solid var(--accent);color:var(--accent);background:transparent;cursor:pointer;transition:all 0.2s;flex:1}
.follow-btn:hover{background:var(--accent);color:var(--bg)}
.follow-btn.following{border-color:var(--border);color:var(--text-dim)}
.follow-btn.following:hover{border-color:var(--accent);color:var(--red)}
.profile-btn{font-family:var(--font-display);font-size:9px;letter-spacing:1px;padding:8px 10px;border:1px solid var(--border);color:var(--text-dim);background:transparent;cursor:pointer;transition:all 0.2s;flex:1}
.profile-btn:hover{border-color:var(--accent);color:var(--accent)}

@media(max-width:900px){
  .social-layout{grid-template-columns:1fr}
  .main{margin-left:0!important;padding:80px 16px 60px!important}
}
.rank-badge{font-family:var(--font-display);font-size:8px;padding:2px 8px;border:1px solid;letter-spacing:1px}

/* SKELETON */
.skel{background:linear-gradient(90deg,var(--panel) 25%,rgba(var(--accent-rgb),0.06) 50%,var(--panel) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:0;margin-bottom:8px}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:0.3;display:block}
.empty-txt{font-family:var(--font-display);font-size:10px;letter-spacing:2px}
.empty-sub{font-size:12px;margin-top:6px;opacity:0.6}

/* RIGHT COLUMN */
.right-col{display:flex;flex-direction:column;gap:16px}
.box{background:rgba(var(--accent-rgb),0.02);border:1px solid var(--border);position:relative}
.box::before{content:'';position:absolute;top:-1px;left:-1px;width:12px;height:12px;border-top:2px solid var(--accent);border-left:2px solid var(--accent)}
.box::after{content:'';position:absolute;bottom:-1px;right:-1px;width:12px;height:12px;border-bottom:2px solid var(--accent);border-right:2px solid var(--accent)}
.box-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.box-title{font-family:var(--font-display);font-size:10px;letter-spacing:3px;color:var(--accent)}
.box-body{padding:16px 18px}

/* SUGGEST USER (RIGHT) */
.suggest-list{display:flex;flex-direction:column;gap:10px}
.suggest-item{display:flex;align-items:center;gap:10px}
.suggest-avatar{width:36px;height:36px;border-radius:50%;border:2px solid var(--cls,var(--accent));overflow:hidden;background:rgba(0,0,0,0.3);flex-shrink:0}
.suggest-avatar img{width:100%;height:100%;object-fit:cover}

/* ONLINE DOT */
.avatar-wrap{position:relative;flex-shrink:0}
.online-dot{position:absolute;bottom:2px;right:1px;width:11px;height:11px;border-radius:50%;border:2px solid var(--bg2);background:var(--text-dim);z-index:2;transition:background 0.4s}
.online-dot.online{background:var(--accent);box-shadow:0 0 6px rgba(var(--accent-rgb),0.7)}
.suggest-info{flex:1;min-width:0}
.suggest-name{font-family:var(--font-display);font-size:10px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.suggest-sub{font-family:var(--font-display);font-size:8px;color:var(--text-dim);letter-spacing:1px}
.suggest-follow-btn{font-family:var(--font-display);font-size:8px;padding:5px 10px;border:1px solid var(--accent);color:var(--accent);background:transparent;cursor:pointer;transition:all 0.2s;white-space:nowrap;flex-shrink:0}
.suggest-follow-btn:hover{background:var(--accent);color:var(--bg)}
.suggest-follow-btn.following{border-color:var(--border);color:var(--text-dim)}

/* MY STATS */
.my-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.my-stat{background:rgba(var(--accent-rgb),0.03);border:1px solid var(--border);padding:12px;text-align:center}
.my-stat-num{font-family:var(--font-display);font-size:20px;font-weight:900;color:var(--accent);display:block}
.my-stat-label{font-family:var(--font-display);font-size:8px;letter-spacing:1px;color:var(--text-dim);margin-top:2px;display:block}

/* CLASS COLOR */
.cls-warrior .user-card-avatar,.suggest-avatar
.cls-mage .user-card-avatar,.suggest-avatar
.cls-explorer .user-card-avatar,.suggest-avatar
.cls-merchant .user-card-avatar,.suggest-avatar
.cls-artist .user-card-avatar,.suggest-avatar
.cls-diplomat .user-card-avatar,.suggest-avatar

/* RANK COLORS */
.rank-bronze{color:var(--prank-bronze);border-color:var(--prank-bronze)}
.rank-silver{color:var(--prank-silver);border-color:var(--prank-silver)}
.rank-gold{color:var(--accent);border-color:var(--gold)}
.rank-platinum{color:var(--accent);border-color:var(--accent)}
.rank-diamond{color:var(--accent);border-color:var(--accent)}
.rank-legendary{color:var(--accent);border-color:var(--accent)}

/* RESPONSIVE */
@media(max-width:1100px){.social-layout{grid-template-columns:1fr}}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .topbar{display:flex}
  .main{margin-left:0!important;padding:80px 16px 60px!important}
  .social-layout{grid-template-columns:1fr}
  .user-card-meta{gap:6px}
  .filter-row{gap:6px}
  .tab-btn{padding:10px 12px;font-size:9px}
}
</style>
</head>

    <button class="filter-btn cls-mage" onclick="setClassFilter('mage',this)"><span id="filt-icon-mage"></span>MAGE</button>
    <button class="filter-btn cls-explorer" onclick="setClassFilter('explorer',this)"><span id="filt-icon-explorer"></span>EXPLORER</button>

    <div>
      <div class="tab-bar">
        <button class="tab-btn active" id="tab-discover" onclick="switchTab('discover')">ค้นพบ <span class="tab-count" id="cntDiscover">0</span></button>
        <button class="tab-btn" id="tab-following" onclick="switchTab('following')">ติดตาม <span class="tab-count" id="cntFollowing">0</span></button>
        <button class="tab-btn" id="tab-followers" onclick="switchTab('followers')">ผู้ติดตาม <span class="tab-count" id="cntFollowers">0</span></button>
      </div>
      <div class="user-grid" id="userGrid">
        <div class="skel" style="height:84px"></div>
        <div class="skel" style="height:84px"></div>
        <div class="skel" style="height:84px"></div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right-col">

      <!-- MY SOCIAL STATS -->
      <div class="box">
        <div class="box-header"><div class="box-title">MY NETWORK</div></div>
        <div class="box-body">
          <div class="my-stats-grid">
            <div class="my-stat">
              <span class="my-stat-num" id="myFollowing">—</span>
              <span class="my-stat-label">FOLLOWING</span>
            </div>
            <div class="my-stat">
              <span class="my-stat-num" id="myFollowers">—</span>
              <span class="my-stat-label">FOLLOWERS</span>
            </div>
          </div>
        </div>
      </div>

      <!-- SUGGESTED -->
      <div class="box">
        <div class="box-header"><div class="box-title">แนะนำ</div></div>
        <div class="box-body">
          <div class="suggest-list" id="suggestList">
            <div class="skel" style="height:44px"></div>
            <div class="skel" style="height:44px"></div>
            <div class="skel" style="height:44px"></div>
          </div>
        </div>
      </div>

      <!-- CITY RANKING (social context) -->
      <div class="box">
        <div class="box-header"><div class="box-title">TOP CITY</div></div>
        <div class="box-body">
          <div id="cityRankList" style="display:flex;flex-direction:column;gap:8px;font-family:var(--font-display);font-size:9px;color:var(--text-dim)">
            <div class="skel" style="height:24px"></div>
            <div class="skel" style="height:24px"></div>
            <div class="skel" style="height:24px"></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script type="module">
import { supabase } from './supabase.js'
import { initSidebar } from './sidebar.js'
import { CLASS_ICONS, CLASS_COLOR, getIcon, injectGlobalDefs } from './icons.js'

function classIcon(cls, size=12) { return CLASS_ICONS[cls] ? `<svg width="${size}" height="${size}" viewBox="0 0 20 20" fill="none" style="display:inline-block;vertical-align:middle;flex-shrink:0;color:${CLASS_COLOR[cls]||'var(--accent)'}" stroke="${CLASS_COLOR[cls]||'var(--accent)'}" aria-hidden="true">${CLASS_ICONS[cls]}</svg>` : '' }

const RANK_LABEL  = { bronze:'BRONZE', silver:'SILVER', gold:'GOLD', platinum:'PLATINUM', diamond:'DIAMOND', legendary:'LEGENDARY' }
const RANK_CLS    = { bronze:'rank-bronze', silver:'rank-silver', gold:'rank-gold', platinum:'rank-platinum', diamond:'rank-diamond', legendary:'rank-legendary' }

let currentUser = null
let myProfile   = null
let activeTab   = 'discover'
let classFilter = ''
let followingIds = new Set()

// ─── HELPERS ────────────────────────────────────────────────
function getAvatarUrl(avatarUrlOrSeed, size=80) {
  if (!avatarUrlOrSeed) return `https://api.dicebear.com/9.x/pixel-art/svg?seed=nexus&size=${size}`
  if (avatarUrlOrSeed.startsWith('http') || avatarUrlOrSeed.startsWith('/'  )) return avatarUrlOrSeed
  const [style, s, bg] = avatarUrlOrSeed.split(':')
  return `https://api.dicebear.com/9.x/${style||'pixel-art'}/svg?seed=${encodeURIComponent(s||'nexus')}&backgroundColor=${bg||'0a1628'}&size=${size}`
}
function getAvatarSrc(u, size=80) {
  return u.avatar_url ? u.avatar_url : getAvatarUrl(u.avatar_seed, size)
}

function updateDate() {
  const d = new Date(Date.now() + 7*3600000) // UTC+7
  const days = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์']
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.']
  document.getElementById('pageDate').textContent = `วัน${days[d.getUTCDay()]}ที่ ${d.getUTCDate()} ${months[d.getUTCMonth()]} ${d.getUTCFullYear()+543}`
}

// ─── INIT ────────────────────────────────────────────────────
async function init() {
  injectGlobalDefs()

  // inject static icons
  const pageTitleIcon = document.getElementById('pageTitleIcon')
  if (pageTitleIcon) pageTitleIcon.innerHTML = getIcon('users', 22)

  const searchIconEl = document.getElementById('searchIconEl')
  if (searchIconEl) searchIconEl.innerHTML = getIcon('search', 16)

  // class filter icons
  const filterClasses = ['warrior','mage','explorer','merchant','artist','diplomat']
  filterClasses.forEach(cls => {
    const el = document.getElementById(`filt-icon-${cls}`)
    if (el) el.innerHTML = getIcon(`class_${cls}`, 12)
  })

  const { user } = await initSidebar('social')
  if (!user) return
  currentUser = user

  // inject static icons
  const tabDiscover = document.getElementById('tab-discover')
  if (tabDiscover) {
    const cnt = tabDiscover.querySelector('.tab-count')
    tabDiscover.innerHTML = getIcon('globe', 12) + ' ค้นพบ '
    if (cnt) tabDiscover.appendChild(cnt)
  }
  const tabFollowing = document.getElementById('tab-following')
  if (tabFollowing) {
    const cnt = tabFollowing.querySelector('.tab-count')
    tabFollowing.innerHTML = getIcon('check_circle', 12) + ' ติดตาม '
    if (cnt) tabFollowing.appendChild(cnt)
  }
  const tabFollowers = document.getElementById('tab-followers')
  if (tabFollowers) {
    const cnt = tabFollowers.querySelector('.tab-count')
    tabFollowers.innerHTML = getIcon('users', 12) + ' ผู้ติดตาม '
    if (cnt) tabFollowers.appendChild(cnt)
  }
  const socialEmptyIcon = document.getElementById('socialEmptyIcon')
  if (socialEmptyIcon) socialEmptyIcon.innerHTML = getIcon('users', 28)

  // โหลด myProfile เพื่อใช้ city ใน navVerifyBadge
  const { data: _myProf } = await supabase.from('users').select('city').eq('id', currentUser.id).single()
  myProfile = _myProf || null

  await loadFollowingIds()

  // โหลด following/followers count สำหรับ MY NETWORK panel
  const [followingData, followersData] = await Promise.all([
    supabase.from('social_follows').select('*', { count: 'exact', head: true }).eq('follower_id', currentUser.id),
    supabase.from('social_follows').select('*', { count: 'exact', head: true }).eq('following_id', currentUser.id)
  ])
  document.getElementById('myFollowing').textContent = (followingData.count || 0).toLocaleString()
  document.getElementById('myFollowers').textContent = (followersData.count || 0).toLocaleString()

  await Promise.all([
    loadDiscover(),
    loadSuggested(),
    loadCityRank()
  ])

  checkNotifications()

  // ── Globe spin → warp out ──
  const ls = document.getElementById('loadingScreen')
  const loadTxt = document.getElementById('loadingTxt')
  if (loadTxt) loadTxt.textContent = 'ONLINE'
  setTimeout(() => {
    if (ls) ls.classList.add('warp-out')
    setTimeout(() => { if (ls) ls.style.display = 'none' }, 700)
  }, 900)

  updateDate()
  initCursor()
}



// ============================================================
// NAV BADGES (navQuestBadge + navVerifyBadge)
// ============================================================
async function checkNotifications() {
  try {
    const { count: notifCount } = await supabase.from('notifications')
      .select('*', { count:'exact', head:true })
      .eq('user_id', currentUser.id).eq('is_read', false)
    const notifDot = document.getElementById('notifDot')
    if (notifDot && notifCount > 0) notifDot.style.display = 'block'

    const { count: questCount } = await supabase
      .from('user_quests')
      .select('*', { count: 'exact', head: true })
      .eq('user_id', currentUser.id)
      .eq('status', 'in_progress')
    const qb = document.getElementById('navQuestBadge')
    if (qb && questCount > 0) {
      qb.textContent = questCount > 99 ? '99+' : questCount
      qb.style.display = 'inline'
    }

    const cityForVerify = (typeof myProfile !== 'undefined' ? myProfile?.city : null)
      || (typeof userProfile !== 'undefined' ? userProfile?.city : null)
      || 'กรุงเทพมหานคร'
    const { data: pending } = await supabase
      .from('user_quests')
      .select('id, users!inner(city)')
      .eq('status', 'pending_review')
      .eq('users.city', cityForVerify)
      .neq('user_id', currentUser.id)
      .limit(99)
    if (pending?.length) {
      const { data: myVotes } = await supabase
        .from('quest_verifications')
        .select('user_quest_id')
        .eq('voter_id', currentUser.id)
        .in('user_quest_id', pending.map(p => p.id))
      const votedIds = new Set((myVotes||[]).map(v => v.user_quest_id))
      const notVoted = pending.filter(p => !votedIds.has(p.id)).length
      const vb = document.getElementById('navVerifyBadge')
      if (vb && notVoted > 0) {
        vb.textContent = notVoted > 99 ? '99+' : notVoted
        vb.style.display = 'inline'
      }
    }
  } catch (e) {
    console.warn('[checkNotifications]', e)
  }
}

// ─── LOAD FOLLOWING IDS ──────────────────────────────────────
async function loadFollowingIds() {
  const { data } = await supabase.from('social_follows')
    .select('following_id').eq('follower_id', currentUser.id)
  followingIds = new Set((data||[]).map(r => r.following_id))
}

// ─── LOAD DISCOVER ───────────────────────────────────────────
async function loadDiscover() {
  let q = supabase.from('users')
    .select('id,username,display_name,class,level,rank,avatar_seed,avatar_url,followers_count,city,streak_current,last_seen')
    .eq('profile_public', true)
    .neq('id', currentUser.id)
    .order('followers_count', { ascending: false })
    .limit(20)

  if (classFilter) q = q.eq('class', classFilter)

  const { data } = await q
  const users = data || []
  document.getElementById('cntDiscover').textContent = users.length
  if (activeTab === 'discover') renderUserGrid(users)
}

// ─── LOAD FOLLOWING ──────────────────────────────────────────
async function loadFollowing() {
  const { data } = await supabase.from('social_follows')
    .select('following_id, users!social_follows_following_id_fkey(id,username,display_name,class,level,rank,avatar_seed,avatar_url,followers_count,city,streak_current,last_seen)')
    .eq('follower_id', currentUser.id)

  const users = (data||[]).map(r => r.users).filter(Boolean)
  const filtered = classFilter ? users.filter(u => u.class === classFilter) : users
  document.getElementById('cntFollowing').textContent = filtered.length
  document.getElementById('myFollowing').textContent = filtered.length
  if (activeTab === 'following') renderUserGrid(filtered)
}

// ─── LOAD FOLLOWERS ──────────────────────────────────────────
async function loadFollowers() {
  const { data } = await supabase.from('social_follows')
    .select('follower_id, users!social_follows_follower_id_fkey(id,username,display_name,class,level,rank,avatar_seed,avatar_url,followers_count,city,streak_current,last_seen)')
    .eq('following_id', currentUser.id)

  const users = (data||[]).map(r => r.users).filter(Boolean)
  const filtered = classFilter ? users.filter(u => u.class === classFilter) : users
  document.getElementById('cntFollowers').textContent = filtered.length
  document.getElementById('myFollowers').textContent = filtered.length
  if (activeTab === 'followers') renderUserGrid(filtered)
}

// ─── SEARCH USERS ────────────────────────────────────────────
window.searchUsers = async function() {
  const q = document.getElementById('searchInput').value.trim()
  if (!q) { await reloadCurrentTab(); return }

  const grid = document.getElementById('userGrid')
  grid.innerHTML = '<div class="skel" style="height:84px"></div>'.repeat(3)

  let query = supabase.from('users')
    .select('id,username,display_name,class,level,rank,avatar_seed,avatar_url,followers_count,city,streak_current,last_seen')
    .or(`username.ilike.%${q}%,display_name.ilike.%${q}%`)
    .eq('profile_public', true)
    .neq('id', currentUser.id)
    .limit(15)

  if (classFilter) query = query.eq('class', classFilter)

  const { data } = await query
  renderUserGrid(data || [])
}

// ─── ONLINE HELPER ───────────────────────────────────────────
const isOnline = (lastSeen) => !!lastSeen && (Date.now() - new Date(lastSeen).getTime()) <= 10 * 60 * 1000

// ─── RENDER USER GRID ────────────────────────────────────────
function renderUserGrid(users) {
  const grid = document.getElementById('userGrid')
  if (!users.length) {
    grid.innerHTML = `<div class="empty-state">
      <span class="empty-icon" id="socialEmptyIcon"></span>
      <div class="empty-txt">ไม่พบผู้เล่น</div>
      <div class="empty-sub">ลองค้นหาด้วยคำอื่น หรือเปลี่ยน filter</div>
    </div>`
    return
  }

  grid.innerHTML = users.map(u => {
    const cls = u.class || 'warrior'
    const isFollowing = followingIds.has(u.id)
    const rankCls = RANK_CLS[u.rank] || 'rank-bronze'
    const online = isOnline(u.last_seen)
    return `
    <div class="user-card cls-${cls}">
      <div class="user-card-top" onclick="goProfile('${u.id}')">
        <div class="avatar-wrap">
          <div class="user-card-avatar">
            <img src="${getAvatarSrc(u, 52)}" alt="">
          </div>
          <div class="online-dot ${online ? 'online' : ''}"></div>
        </div>
        <div class="user-card-info">
          <div class="user-card-name">${esc(u.display_name || u.username)}</div>
          <div class="user-card-sub">${classIcon(cls)} ${cls.toUpperCase()} <span style="color:var(--text-dim)">· LV.${u.level||1}</span></div>
          <div class="user-card-meta">
            <span><span class="rank-badge ${rankCls}">${(RANK_LABEL[u.rank]||'BRONZE').replace(/.*? /,'')}</span></span>
            <span>${getIcon('city',11)} ${esc(u.city||'—')}</span>
            <span>${getIcon('lightning',11)} Streak ${u.streak_current||0}</span>
            <span>${getIcon('users',11)} ${(u.followers_count||0).toLocaleString()} ผู้ติดตาม</span>
          </div>
        </div>
      </div>
      <div class="user-card-actions" onclick="event.stopPropagation()">
        <button class="follow-btn ${isFollowing ? 'following' : ''}" id="fbtn-${u.id}"
          onclick="toggleFollow('${u.id}','${esc(u.display_name||u.username)}')">
          ${isFollowing ? getIcon('check',11)+' ติดตาม' : getIcon('plus',11)+' ติดตาม'}
        </button>
        <button class="profile-btn" onclick="goProfile('${u.id}')">ดูโปรไฟล์</button>
      </div>
    </div>`
  }).join('')
}

// ─── TOGGLE FOLLOW ───────────────────────────────────────────
window.toggleFollow = async function(userId, displayName) {
  const btn = document.getElementById(`fbtn-${userId}`)
  if (!btn) return
  btn.disabled = true

  const isCurrentlyFollowing = followingIds.has(userId)

  if (isCurrentlyFollowing) {
    const { error } = await supabase.rpc('unfollow_user', {
      p_follower_id: currentUser.id,
      p_following_id: userId
    })
    if (error) { showToast('เกิดข้อผิดพลาด: ' + error.message, 'error'); btn.disabled = false; return }
    followingIds.delete(userId)
    btn.innerHTML = getIcon('plus',11)+' ติดตาม'
    btn.classList.remove('following')
    showToast(`เลิกติดตาม ${displayName} แล้ว`)

    // อัพเดต following count local
    const cur = parseInt(document.getElementById('myFollowing').textContent.replace(/,/g,'')) || 0
    document.getElementById('myFollowing').textContent = Math.max(0, cur - 1).toLocaleString()
  } else {
    const { error } = await supabase.rpc('follow_user', {
      p_follower_id: currentUser.id,
      p_following_id: userId
    })
    if (error) { showToast('เกิดข้อผิดพลาด: ' + error.message, 'error'); btn.disabled = false; return }
    followingIds.add(userId)
    btn.innerHTML = getIcon('check',11) + ' ติดตาม'
    btn.classList.add('following')
    showToast(`ติดตาม ${displayName} แล้ว!`, 'success')

    // notification ถูกสร้างโดย follow_user RPC อัตโนมัติ
    const cur = parseInt(document.getElementById('myFollowing').textContent.replace(/,/g,'')) || 0
    document.getElementById('myFollowing').textContent = (cur + 1).toLocaleString()
  }

  btn.disabled = false
}

// ─── GO PROFILE ──────────────────────────────────────────────
window.goProfile = function(userId) {
  window.location.href = `./profile.html?uid=${userId}`
}

// ─── LOAD SUGGESTED ──────────────────────────────────────────
async function loadSuggested() {
  // แนะนำ: เมืองเดียวกัน, ยังไม่ได้ follow, เรียงตาม followers_count
  const myCity = myProfile?.city || 'กรุงเทพมหานคร'

  const { data } = await supabase.from('users')
    .select('id,username,display_name,class,level,avatar_seed,avatar_url,followers_count,last_seen')
    .eq('city', myCity)
    .eq('profile_public', true)
    .neq('id', currentUser.id)
    .order('followers_count', { ascending: false })
    .limit(10)

  const suggested = (data||[]).filter(u => !followingIds.has(u.id)).slice(0, 5)
  const el = document.getElementById('suggestList')

  if (!suggested.length) {
    el.innerHTML = `<div style="font-family:var(--font-display);font-size:9px;color:var(--text-dim);text-align:center;padding:8px">ติดตามทุกคนในเมืองแล้ว!</div>`
    return
  }

  el.innerHTML = suggested.map(u => {
    const cls = u.class || 'warrior'
    const online = isOnline(u.last_seen)
    return `
    <div class="suggest-item">
      <div class="avatar-wrap">
        <div class="suggest-avatar cls-${cls}" style="border-color:${CLASS_COLOR[cls]}">
          <img src="${getAvatarSrc(u, 36)}" alt="">
        </div>
        <div class="online-dot ${online ? 'online' : ''}"></div>
      </div>
      <div class="suggest-info">
        <div class="suggest-name">${esc(u.display_name || u.username)}</div>
        <div class="suggest-sub" style="display:flex;align-items:center;gap:4px;color:${CLASS_COLOR[cls]}">${classIcon(cls)} ${cls.toUpperCase()} <span style="color:var(--text-dim)">· LV.${u.level||1}</span></div>
      </div>
      <button class="suggest-follow-btn ${followingIds.has(u.id)?'following':''}" id="sfbtn-${u.id}"
        onclick="toggleFollow('${u.id}','${esc(u.display_name||u.username)}')">
        ${followingIds.has(u.id) ? getIcon('check',11)+' ติดตาม' : getIcon('plus',11)+' Follow'}
      </button>
    </div>`
  }).join('')
}

// ─── LOAD CITY RANK ──────────────────────────────────────────
async function loadCityRank() {
  const { data } = await supabase.from('users')
    .select('city')
    .eq('profile_public', true)
    .not('city', 'is', null)

  if (!data) return

  // นับจำนวน user ต่อเมือง
  const cityCount = {}
  data.forEach(u => { cityCount[u.city] = (cityCount[u.city]||0) + 1 })
  const sorted = Object.entries(cityCount).sort((a,b) => b[1]-a[1]).slice(0, 5)

  const MEDAL = ['#1','#2','#3','#4','#5']
  document.getElementById('cityRankList').innerHTML = sorted.map(([city, count], i) => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)">
      <div style="font-family:var(--font-display);font-size:9px;color:var(--text)">${MEDAL[i]} ${esc(city)}</div>
      <div style="font-family:var(--font-display);font-size:9px;color:var(--cyan)">${count.toLocaleString()} คน</div>
    </div>`).join('')
}

// ─── TAB / FILTER ────────────────────────────────────────────
window.switchTab = async function(tab) {
  activeTab = tab
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
  document.getElementById('tab-' + tab).classList.add('active')
  document.getElementById('userGrid').innerHTML = '<div class="skel" style="height:84px"></div>'.repeat(3)
  await reloadCurrentTab()
}

window.setClassFilter = function(cls, btn) {
  classFilter = cls
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  reloadCurrentTab()
}

async function reloadCurrentTab() {
  if (activeTab === 'discover')  await loadDiscover()
  if (activeTab === 'following') await loadFollowing()
  if (activeTab === 'followers') await loadFollowers()
}

// ─── UTILS ───────────────────────────────────────────────────
function esc(s) { return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;') }

window.showToast = function(msg, type='info') {
  const t = document.getElementById('toast')
  t.textContent = msg; t.className = `toast ${type} show`
  setTimeout(() => { t.className = `toast ${type}` }, 3000)
}



function initCursor() {
  const cur = document.getElementById('cursor'), ring = document.getElementById('cursorRing')
  let mx=0,my=0,rx=0,ry=0
  document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; cur.style.left=mx+'px'; cur.style.top=my+'px' })
  ;(function animRing(){ rx+=(mx-rx)*.12; ry+=(my-ry)*.12; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(animRing) })()
  document.querySelectorAll('button,a,.user-card,.suggest-item,.nav-item').forEach(el => {
    el.addEventListener('mouseenter', () => { ring.style.width='44px'; ring.style.height='44px'; ring.style.borderColor='rgba(var(--accent-rgb),0.7)' })
    el.addEventListener('mouseleave', () => { ring.style.width='32px'; ring.style.height='32px'; ring.style.borderColor='rgba(var(--accent-rgb),0.4)' })
  })
}

init()
</script>
</body>
