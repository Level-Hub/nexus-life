<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEXUS LIFE — Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #ffaa00;
  --cyan:#ffaa00;--cyan-dim:#cc7700;--gold:#ffd700;--red:#ff003c;
  --green:#44ff88;--purple:#cc44ff;--bg:#0a0600;--bg2:#0f0800;
  --panel:rgba(255,170,0,0.04);--border:rgba(255,170,0,0.14);
}
* { transition: all var(--t-base, 0.35s) cubic-bezier(0.2,0.9,0.4,1.1); }
.no-transition, .no-transition * { transition: none !important; }
.cls-warrior{--cls:#ff4444}.cls-mage{--cls:#aa44ff}.cls-explorer{--cls:#44ff88}
.cls-merchant{--cls:#ffaa00}.cls-artist{--cls:#ff66aa}.cls-diplomat{--cls:#00ccff}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;overflow-x:hidden;cursor:none;min-height:100vh}
.cursor{position:fixed;width:10px;height:10px;background:var(--cyan);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--cyan)}
.cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(255,170,0,0.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all 0.12s ease}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:1000}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(255,170,0,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,170,0,0.025) 1px,transparent 1px);background-size:60px 60px;z-index:0}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.orb-1{width:500px;height:500px;background:rgba(255,170,0,0.04);top:-150px;right:-100px}
.orb-2{width:300px;height:300px;background:rgba(176,68,255,0.04);bottom:100px;left:-50px}

/* MAIN */
.main{margin-left:220px;min-height:100vh;position:relative;z-index:1;padding:32px 28px 60px}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* PAGE HEADER */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;animation:fadeInDown 0.5s ease both;flex-wrap:wrap;gap:12px}
.page-title{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#fff;display:flex;align-items:center;gap:12px}
.page-title span{color:var(--cyan)}
.page-date{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:var(--text-dim);margin-top:4px}

/* WALLET BAR */
.wallet-bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.currency-chip{display:flex;align-items:center;gap:8px;padding:10px 18px;background:var(--panel);border:1px solid var(--border);font-family:'Orbitron',monospace;font-size:13px;font-weight:700}
.currency-chip.gold-chip{border-color:rgba(255,215,0,0.3);color:var(--gold)}
.currency-chip.crystal-chip{border-color:rgba(255,170,0,0.3);color:var(--cyan)}
.btn-topup{padding:10px 18px;background:linear-gradient(135deg,rgba(255,170,0,0.15),rgba(176,68,255,0.15));border:1px solid var(--cyan);color:var(--cyan);font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;cursor:pointer;transition:all 0.3s;text-decoration:none;display:flex;align-items:center;gap:8px}
.btn-topup:hover{background:rgba(255,170,0,0.2);box-shadow:0 0 20px rgba(255,170,0,0.2)}

/* CATEGORY TABS */
.cat-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;animation:fadeInDown 0.4s ease both}
.cat-tab{padding:8px 16px;background:var(--panel);border:1px solid var(--border);color:var(--text-dim);font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;cursor:pointer;transition:all 0.25s}
.cat-tab:hover{border-color:var(--cyan);color:var(--cyan)}
.cat-tab.active{border-color:var(--cyan);color:var(--cyan);background:rgba(255,170,0,0.08)}

/* FEATURED BANNER */
.featured-banner{background:linear-gradient(135deg,rgba(176,68,255,0.12),rgba(255,170,0,0.08));border:1px solid rgba(176,68,255,0.3);padding:24px 28px;margin-bottom:28px;display:flex;align-items:center;gap:24px;position:relative;overflow:hidden;animation:fadeInDown 0.5s ease both}
.featured-banner::before{content:'FEATURED';position:absolute;top:12px;right:16px;font-family:'Orbitron',monospace;font-size:8px;letter-spacing:4px;color:var(--purple);opacity:0.6}
.featured-banner-icon{font-size:52px;flex-shrink:0;filter:drop-shadow(0 0 20px rgba(176,68,255,0.6))}
.featured-banner-info{flex:1}
.featured-banner-label{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:3px;color:var(--purple);margin-bottom:6px}
.featured-banner-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:#fff;margin-bottom:6px}
.featured-banner-desc{font-size:13px;color:var(--text-dim);line-height:1.6;margin-bottom:14px}
.featured-banner-price{display:flex;align-items:center;gap:12px}
.price-old{font-family:'Orbitron',monospace;font-size:12px;color:var(--text-dim);text-decoration:line-through}
.price-new{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;color:var(--cyan)}
.btn-buy-featured{padding:12px 28px;background:linear-gradient(135deg,var(--purple),var(--cyan));border:none;color:#000;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all 0.3s;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%)}
.btn-buy-featured:hover{transform:scale(1.03);box-shadow:0 0 30px rgba(255,170,0,0.4)}

/* SHOP GRID */
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;animation:fadeInUp 0.5s ease both}

/* ITEM CARD */
.item-card{background:var(--panel);border:1px solid var(--border);padding:20px;transition:all 0.3s;position:relative;display:flex;flex-direction:column;gap:12px}
.item-card:hover{border-color:rgba(255,170,0,0.3);transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,170,0,0.08)}
.item-card.rarity-rare{border-color:rgba(0,100,255,0.3)}
.item-card.rarity-epic{border-color:rgba(176,68,255,0.4)}
.item-card.rarity-legendary{border-color:rgba(255,215,0,0.5);background:rgba(255,215,0,0.03)}
.item-card.rarity-legendary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,215,0,0.04),transparent);pointer-events:none}
.item-rarity{position:absolute;top:10px;right:10px;font-family:'Orbitron',monospace;font-size:7px;letter-spacing:2px;padding:3px 8px;border:1px solid currentColor}
.item-rarity.common{color:var(--text-dim)}
.item-rarity.rare{color:#4488ff}
.item-rarity.epic{color:var(--purple)}
.item-rarity.legendary{color:var(--gold)}
.item-owned-badge{position:absolute;top:10px;left:10px;font-family:'Orbitron',monospace;font-size:7px;letter-spacing:1px;padding:3px 8px;background:rgba(68,255,136,0.15);border:1px solid var(--green);color:var(--green)}
.item-category-tag{font-family:'Orbitron',monospace;font-size:7px;letter-spacing:2px;color:var(--text-dim)}
/* detail button */
.btn-detail{padding:8px 12px;background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;cursor:pointer;transition:all 0.2s;flex-shrink:0}
.btn-detail:hover{border-color:var(--cyan);color:var(--cyan)}
/* detail modal */
.detail-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:600;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
.detail-modal-overlay.open{display:flex}
.detail-modal{background:var(--bg2);border:1px solid var(--border);border-bottom:none;width:100%;max-width:480px;padding:24px 20px 32px;animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.detail-close-row{display:flex;justify-content:flex-end;margin-bottom:16px}
.detail-close{background:transparent;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;line-height:1}
.detail-close:hover{color:var(--red)}
/* preview areas */
.preview-frame{width:100px;height:100px;border-radius:50%;margin:0 auto 16px;border:3px solid var(--gold);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.preview-frame img{width:100%;height:100%;object-fit:cover}
.preview-frame .avatar-placeholder{width:100%;height:100%;background:linear-gradient(135deg,rgba(255,170,0,0.2),rgba(176,68,255,0.2));display:flex;align-items:center;justify-content:center;font-size:36px}
.preview-pet{width:120px;height:120px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;image-rendering:pixelated}
.preview-pet img{width:96px;height:96px;image-rendering:pixelated;object-fit:contain}
.preview-name-color{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;text-align:center;margin-bottom:16px;padding:12px}
.detail-name{font-family:'Orbitron',monospace;font-size:15px;font-weight:700;color:#fff;margin-bottom:6px;text-align:center}
.detail-desc{font-size:13px;color:var(--text-dim);text-align:center;line-height:1.6;margin-bottom:20px}
.detail-footer{display:flex;align-items:center;justify-content:space-between;gap:12px}
.detail-price{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;color:var(--cyan);display:flex;align-items:center;gap:6px}
.item-name{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:#fff;line-height:1.3}
.item-desc{font-size:11px;color:var(--text-dim);line-height:1.5;flex:1}
.item-tags{display:flex;gap:6px;flex-wrap:wrap}
.item-tag{font-family:'Orbitron',monospace;font-size:7px;padding:2px 8px;border:1px solid var(--border);color:var(--text-dim)}
.item-tag.consumable{border-color:rgba(255,170,0,0.4);color:var(--gold)}
.item-tag.duration{border-color:rgba(255,170,0,0.3);color:var(--cyan)}
.item-footer{display:flex;align-items:center;justify-content:space-between;margin-top:4px;gap:8px}
.item-price{display:flex;align-items:center;gap:6px;font-family:'Orbitron',monospace;font-size:15px;font-weight:700;color:var(--cyan)}
.item-price-gold{color:var(--gold)}
.btn-buy{padding:8px 16px;background:rgba(255,170,0,0.08);border:1px solid var(--cyan);color:var(--cyan);font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;cursor:pointer;transition:all 0.25s;flex-shrink:0}
.btn-buy:hover{background:rgba(255,170,0,0.18);box-shadow:0 0 16px rgba(255,170,0,0.2)}
.btn-buy:disabled{opacity:0.4;cursor:not-allowed;border-color:var(--border);color:var(--text-dim);background:transparent}
.btn-buy.owned{border-color:var(--green);color:var(--green);background:rgba(68,255,136,0.06)}
.btn-buy.owned:hover{background:rgba(68,255,136,0.12)}

/* SEASON PASS CARD */
.season-card{background:linear-gradient(135deg,rgba(176,68,255,0.1),rgba(255,170,0,0.06));border:1px solid rgba(176,68,255,0.4);padding:24px;display:flex;flex-direction:column;gap:16px;position:relative;overflow:hidden}
.season-card::after{content:'SEASON PASS';position:absolute;top:14px;right:14px;font-family:'Orbitron',monospace;font-size:7px;letter-spacing:3px;color:var(--purple);opacity:0.7}
.season-features{display:flex;flex-direction:column;gap:6px}
.season-feature{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-dim)}
.season-feature::before{content:'>';color:var(--cyan);font-size:10px;flex-shrink:0}

/* SECTION HEADER */
.section-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.section-hdr-title{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:#fff;letter-spacing:2px}
.section-hdr-line{flex:1;height:1px;background:var(--border)}
.section-hdr-count{font-family:'Orbitron',monospace;font-size:9px;color:var(--text-dim)}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:0.4}
.empty-text{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:2px}

/* TOAST */
.toast-container{position:fixed;top:24px;right:24px;z-index:9000;display:flex;flex-direction:column;gap:8px}
.toast{padding:14px 20px;background:rgba(1,10,15,0.97);border:1px solid var(--border);font-family:'Orbitron',monospace;font-size:10px;letter-spacing:1px;color:#fff;animation:toastIn 0.3s ease both;min-width:220px;display:flex;align-items:center;gap:10px}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.info{border-color:var(--cyan);color:var(--cyan)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* CONFIRM MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);width:100%;max-width:420px;margin:16px}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-title{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:#fff}
.modal-close{background:transparent;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;line-height:1}
.modal-close:hover{color:var(--red)}
.modal-body{padding:24px}
.confirm-item-preview{display:flex;gap:16px;align-items:center;padding:16px;background:var(--panel);border:1px solid var(--border);margin-bottom:20px}
.confirm-item-icon{font-size:36px}
.confirm-item-name{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:#fff;margin-bottom:4px}
.confirm-item-desc{font-size:12px;color:var(--text-dim)}
.confirm-cost{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(255,170,0,0.04);border:1px solid rgba(255,170,0,0.12);margin-bottom:20px}
.confirm-cost-label{font-family:'Orbitron',monospace;font-size:10px;color:var(--text-dim);letter-spacing:2px}
.confirm-cost-amount{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;color:var(--cyan);display:flex;align-items:center;gap:6px}
.confirm-balance{font-family:'Orbitron',monospace;font-size:9px;color:var(--text-dim);margin-bottom:20px;text-align:center}
.confirm-balance span{color:var(--cyan)}
.modal-actions{display:flex;gap:10px}
.btn-confirm{flex:1;padding:14px;background:linear-gradient(135deg,rgba(255,170,0,0.2),rgba(176,68,255,0.1));border:1px solid var(--cyan);color:var(--cyan);font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;cursor:pointer;transition:all 0.3s}
.btn-confirm:hover{background:rgba(255,170,0,0.25);box-shadow:0 0 20px rgba(255,170,0,0.2)}
.btn-confirm:disabled{opacity:0.5;cursor:not-allowed}
.btn-cancel{flex:1;padding:14px;background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;cursor:pointer;transition:all 0.3s}
.btn-cancel:hover{border-color:var(--red);color:var(--red)}
.modal-msg{margin-bottom:12px;font-family:'Orbitron',monospace;font-size:10px;display:none}
.modal-msg.error{color:var(--red);display:block}
.modal-msg.success{color:var(--green);display:block}

@media(max-width:768px){
  .main{margin-left:0;padding:80px 16px 60px}
  .shop-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
  .featured-banner{flex-direction:column;text-align:center}
}

/* ══════════════════════════════════════════
   SHOP LOADING SCREEN — Cart Rush Animation
══════════════════════════════════════════ */
.loading-screen{
  position:fixed;inset:0;background:var(--bg);z-index:9000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;
}
.loading-screen.warp-out{animation:shopWarpOut 0.7s cubic-bezier(0.4,0,0.2,1) forwards}
@keyframes shopWarpOut{
  0%  {transform:scale(1);opacity:1;filter:blur(0px)}
  40% {transform:scale(0.95);opacity:1;filter:blur(0px)}
  70% {transform:scale(18);opacity:0.6;filter:blur(4px)}
  100%{transform:scale(40);opacity:0;filter:blur(12px)}
}

/* ── SCENE WRAPPER ── */
.cart-scene{
  position:relative;width:320px;height:120px;overflow:hidden;
}

/* ── GROUND LINE ── */
.cart-ground{
  position:absolute;bottom:18px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,170,0,0.6),transparent);
}
.cart-ground-glow{
  position:absolute;bottom:14px;left:0;right:0;height:4px;
  background:linear-gradient(90deg,transparent,rgba(255,170,0,0.15),transparent);
  filter:blur(3px);
}

/* ── CART SVG — วิ่งจากซ้ายไปขวา ── */
.cart-wrap{
  position:absolute;bottom:19px;
  animation:cartRun 2.2s cubic-bezier(0.4,0,0.6,1) infinite;
}
@keyframes cartRun{
  0%  {left:-80px;opacity:0}
  8%  {opacity:1}
  85% {opacity:1}
  100%{left:330px;opacity:0}
}

/* ── WHEELS SPIN ── */
.cart-wheel{
  animation:wheelSpin 0.4s linear infinite;
  transform-origin:50% 50%;
}
@keyframes wheelSpin{
  from{transform:rotate(0deg)}
  to  {transform:rotate(360deg)}
}

/* ── SPEED LINES ── */
.speed-lines{
  position:absolute;bottom:28px;left:0;right:0;
  display:flex;flex-direction:column;gap:5px;pointer-events:none;
}
.speed-line{
  height:1px;
  background:linear-gradient(90deg,rgba(255,170,0,0.4),transparent);
  animation:speedLine 0.5s linear infinite;
  transform-origin:left center;
}
.speed-line:nth-child(1){width:60px;left:0;animation-delay:0s}
.speed-line:nth-child(2){width:40px;left:10px;animation-delay:0.15s;opacity:0.6}
.speed-line:nth-child(3){width:50px;left:5px;animation-delay:0.3s;opacity:0.4}
@keyframes speedLine{
  0%  {transform:scaleX(1);opacity:0.6}
  50% {transform:scaleX(0.3);opacity:0.2}
  100%{transform:scaleX(1);opacity:0.6}
}

/* ── CART GLOW ── */
.cart-glow{
  position:absolute;inset:-30px;
  background:radial-gradient(ellipse,rgba(255,170,0,0.15) 0%,transparent 70%);
  animation:cartGlow 1.5s ease-in-out infinite;
  pointer-events:none;
}
@keyframes cartGlow{0%,100%{opacity:0.5}50%{opacity:1}}

/* ── TEXT ── */
.loading-logo{
  font-family:'Orbitron',monospace;font-size:24px;font-weight:900;
  letter-spacing:6px;color:#ffaa00;
  text-shadow:0 0 24px rgba(255,170,0,0.8),0 0 48px rgba(255,170,0,0.3);
}
.loading-bar-wrap{
  width:160px;height:2px;
  background:rgba(255,170,0,0.1);
  border:1px solid rgba(255,170,0,0.2);
}
.loading-bar{
  height:100%;
  background:linear-gradient(90deg,#cc7700,#ffaa00,#ffcc44);
  animation:loadAnim 1.4s ease-in-out infinite;
}
@keyframes loadAnim{0%{width:0}55%{width:70%}100%{width:100%}}
.loading-txt{
  font-family:'Orbitron',monospace;font-size:9px;
  letter-spacing:3px;color:var(--text-dim);
}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="cart-scene">
    <div class="cart-glow"></div>
    <div class="cart-ground"></div>
    <div class="cart-ground-glow"></div>
    <div class="speed-lines">
      <div class="speed-line"></div>
      <div class="speed-line"></div>
      <div class="speed-line"></div>
    </div>
    <!-- รถเข็น -->
    <div class="cart-wrap">
      <svg width="72" height="56" viewBox="0 0 72 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- ตัวตะกร้า -->
        <path d="M8 8 L64 8 L58 38 L14 38 Z" stroke="#ffaa00" stroke-width="2" fill="rgba(255,170,0,0.08)" stroke-linejoin="round"/>
        <!-- ขอบบน -->
        <line x1="4" y1="8" x2="8" y2="8" stroke="#ffaa00" stroke-width="2" stroke-linecap="round"/>
        <!-- แกนล่าง -->
        <line x1="18" y1="38" x2="14" y2="44" stroke="#ffaa00" stroke-width="2" stroke-linecap="round"/>

<script type="module">
import { supabase } from './supabase.js'
import { initSidebar } from './sidebar.js'
import { getIcon, injectGlobalDefs, getStickerIcon } from './icons.js'

// ─── STATE ───────────────────────────────────────────────
let currentUser = null
let userProfile = null
let allItems = []
let myPurchases = []
let selectedItem = null
let currentCat = 'all'

// ─── AVATAR HELPER ───────────────────────────────────────
function getAvatarUrl(avatarSeed, size = 80) {
  if (!avatarSeed) return `https://api.dicebear.com/9.x/pixel-art/svg?seed=nexus&size=${size}`
  const parts = avatarSeed.split(':')
  if (parts.length === 3) {
    const [style, seed, bg] = parts
    return `https://api.dicebear.com/9.x/${style}/svg?seed=${encodeURIComponent(seed)}&backgroundColor=${bg}&size=${size}`
  }
  return `https://api.dicebear.com/9.x/pixel-art/svg?seed=${encodeURIComponent(avatarSeed)}&size=${size}`
}

// ─── CURSOR ──────────────────────────────────────────────
function initCursor() {
  const c = document.getElementById('cursor')
  const r = document.getElementById('cursorRing')
  document.addEventListener('mousemove', e => {
    c.style.left = e.clientX + 'px'; c.style.top = e.clientY + 'px'
    r.style.left = e.clientX + 'px'; r.style.top = e.clientY + 'px'
  })
}

// ─── DATE ────────────────────────────────────────────────
function updateDate() {
  const el = document.getElementById('pageDate')
  if (el) el.textContent = new Date().toLocaleDateString('th-TH', { weekday:'long', year:'numeric', month:'long', day:'numeric' }).toUpperCase()
}

// ─── SIDEBAR ─────────────────────────────────────────────


// ─── TOAST ───────────────────────────────────────────────
function showToast(msg, type = 'info') {
  const t = document.getElementById('toastContainer')
  const el = document.createElement('div')
  el.className = `toast ${type}`
  el.textContent = msg
  t.appendChild(el)
  setTimeout(() => el.remove(), 3500)
}

// ─── ITEM META ───────────────────────────────────────────
const catLabel = { frame:'FRAME', pet:'PET', avatar:'AVATAR', booster:'BOOSTER', utility:'UTILITY', season_pass:'SEASON PASS', bundle:'BUNDLE', limited:'LIMITED', sticker:'STICKER' }
const rarityMap = { common:'COMMON', rare:'RARE', epic:'EPIC', legendary:'LEGENDARY' }

function getRarityFromCost(cost) {
  if (cost >= 200) return 'legendary'
  if (cost >= 80) return 'epic'
  if (cost >= 40) return 'rare'
  return 'common'
}

function getItemIcon(item) {
  const meta = item.metadata || {}
  if (item.category === 'frame') return getIcon('frame', 24)
  if (item.category === 'pet') return getIcon('paw', 24)
  if (item.category === 'booster') return getIcon('quest_challenge', 24)
  if (item.category === 'utility') {
    const u = { streak_shield: getIcon('shield',24), class_change: getIcon('refresh',24), quest_slot: getIcon('plus',24), name_change: getIcon('edit',24), guild_slot: getIcon('group',24) }
    return u[meta.type] || getIcon('wrench', 24)
  }
  if (item.category === 'avatar') return getIcon('camera', 24)
  if (item.category === 'season_pass') return meta.tier === 'premium' ? getIcon('crown', 24) : getIcon('star', 24)
  if (item.category === 'sticker') {
    const firstKey = meta.stickers?.[0]?.key
    return firstKey ? getStickerIcon(firstKey, 26) : getIcon('sticker', 24)
  }
  return getIcon('package', 24)
}

// ─── RENDER FEATURED ─────────────────────────────────────
function renderFeatured() {
  // หา limited/season_pass item ที่ยัง active + ยังไม่หมดอายุ
  const now = new Date()
  const featured = allItems.find(i =>
    (i.category === 'limited' || i.category === 'season_pass') &&
    i.is_active &&
    (!i.available_until || new Date(i.available_until) > now)
  )
  const banner = document.getElementById('featuredBanner')
  if (!featured) { banner.style.display = 'none'; return }

  document.getElementById('featuredIcon').innerHTML = getItemIcon(featured)
  document.getElementById('featuredTitle').textContent = featured.name
  document.getElementById('featuredDesc').textContent = featured.description || ''
  document.getElementById('featuredPrice').innerHTML = `${getIcon('crystal',13)} ${featured.crystal_cost}`
  document.getElementById('featuredBtn').onclick = () => openConfirm(featured.id)
  banner.style.display = 'flex'
}

// ─── RENDER ITEMS ─────────────────────────────────────────
function renderShop() {
  const grid = document.getElementById('shopGrid')
  const filtered = currentCat === 'all' ? allItems : allItems.filter(i => i.category === currentCat)

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon" style="opacity:0.4;margin-bottom:8px"></div><div class="empty-text">NO ITEMS IN THIS CATEGORY</div></div>`
    return
  }

  grid.innerHTML = filtered.map(item => {
    const owned = myPurchases.some(p => p.item_id === item.id && p.is_active)
    const rarity = item.rarity || getRarityFromCost(item.crystal_cost)
    const tags = []
    if (item.is_consumable) tags.push(`<span class="item-tag consumable">CONSUMABLE</span>`)
    if (item.duration_hours) tags.push(`<span class="item-tag duration">${item.duration_hours}H</span>`)

    if (item.category === 'season_pass') {
      const feats = item.description ? item.description.split('+').map(f => f.trim()) : []
      return `
        <div class="item-card season-card rarity-${rarity}" data-cat="${item.category}">
          <div>
            <div class="item-category-tag">${catLabel[item.category] || item.category}</div>
            <div class="item-name">${item.name}</div>
          </div>
          <div class="season-features">
            ${feats.map(f => `<div class="season-feature">${f}</div>`).join('')}
          </div>
          <div class="item-footer">
            <div class="item-price">${getIcon('diamond',11)} ${item.crystal_cost}</div>
            <div style="display:flex;gap:6px">
              <button class="btn-detail" onclick="openDetail(${item.id})">INFO</button>
              <button class="btn-buy${owned?' owned':''}" onclick="openConfirm(${item.id})" ${owned?'disabled':''}>
                ${owned ? 'OWNED' : 'GET &#x2192;'}
              </button>
            </div>
          </div>
        </div>`
    }

    return `
      <div class="item-card rarity-${rarity}" data-cat="${item.category}">
        ${owned ? '<div class="item-owned-badge">OWNED</div>' : ''}
        <div class="item-rarity ${rarity}">${rarityMap[rarity]}</div>
        <div>
          <div class="item-category-tag">${catLabel[item.category] || item.category}</div>
          <div class="item-name">${item.name}</div>
        </div>
        <div class="item-desc">${item.description || '—'}</div>
        <div class="item-footer">
          <div class="item-price">${getIcon('diamond',11)} ${item.crystal_cost}</div>
          <div style="display:flex;gap:6px">
            <button class="btn-detail" onclick="openDetail(${item.id})">INFO</button>
            <button class="btn-buy${owned?' owned':''}" onclick="openConfirm(${item.id})" ${owned&&!item.is_consumable?'disabled':''}>
              ${owned && !item.is_consumable ? 'OWNED' : 'BUY &#x2192;'}
            </button>
          </div>
        </div>
      </div>`
  }).join('')
}

// ─── DETAIL MODAL ────────────────────────────────────────
let detailItemId = null

window.openDetail = function(itemId) {
  const item = allItems.find(i => i.id === itemId)
  if (!item) return
  detailItemId = itemId
  const meta = item.metadata || {}
  const owned = myPurchases.some(p => p.item_id === item.id && p.is_active)
  const rarity = item.rarity || getRarityFromCost(item.crystal_cost)

  // สร้าง preview ตาม category
  let previewHTML = ''
  if (item.category === 'frame') {
    // พรีวิวกรอบโปรไฟล์ — วงกลมพร้อมกรอบ
    const frameClass = meta.css_class || ''
    previewHTML = `
      <div style="display:flex;justify-content:center;margin-bottom:20px">
        <div class="preview-frame ${frameClass}">
          <div class="avatar-placeholder">👤</div>
        </div>
      </div>
      <div style="font-family:monospace;font-size:10px;color:var(--text-dim);text-align:center;margin-bottom:12px;letter-spacing:1px">กรอบโปรไฟล์ — ${item.name}</div>`

  } else if (item.category === 'pet') {
    // พรีวิวเพ็ท — ถ้ามีรูปแสดงรูป ถ้าไม่มีแสดง emoji
    const petImg = item.image_url
    previewHTML = `
      <div class="preview-pet">
        ${petImg
          ? `<img src="${petImg}" alt="${item.name}" />`
          : `<span style="font-size:72px">${meta.emoji || '🐾'}</span>`
        }
      </div>`

  } else if (item.category === 'avatar' && meta.type === 'title_color') {
    // พรีวิวสีชื่อ
    const colorStyle = meta.value === 'rainbow'
      ? 'background:linear-gradient(90deg,#ff0080,#ff8800,#ffff00,#00ff88,#0088ff,#8800ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text'
      : `color:${meta.value}`
    previewHTML = `
      <div class="preview-name-color" style="${colorStyle}">
        ชื่อตัวอย่าง
      </div>`

  } else if (item.category === 'sticker') {
    // พรีวิวสติกเกอร์ — โชว์ของจริงทั้งหมดในแพ็ค ถ้ายังไม่มีรายชื่อ (แพ็คเก่าที่ยังไม่ตั้งค่า) บอกจำนวนไว้ก่อน
    const stickers = meta.stickers || []
    previewHTML = stickers.length
      ? `<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:8px 0">
          ${stickers.map(s => `<div style="display:flex;flex-direction:column;align-items:center;gap:3px">
            ${getStickerIcon(s.key, 40)}
            <span style="font-size:7px;color:var(--text-dim);font-family:'Orbitron',monospace;text-align:center">${s.label||''}</span>
          </div>`).join('')}
        </div>`
      : `<div style="text-align:center;padding:24px 0;font-size:11px;color:var(--text-dim)">แพ็คสติกเกอร์ ${meta.count||'?'} ชิ้น — รายละเอียดเร็วๆนี้</div>`

  } else {
    // default — แสดง rarity badge ใหญ่
    const rarityColors = {common:'var(--text-dim)',rare:'#4488ff',epic:'var(--purple)',legendary:'var(--gold)'}
    previewHTML = `
      <div style="text-align:center;padding:24px 0">
        <div style="font-family:'Orbitron',monospace;font-size:32px;font-weight:900;color:${rarityColors[rarity] || '#fff'};letter-spacing:4px">${rarityMap[rarity] || rarity.toUpperCase()}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:8px">${catLabel[item.category] || item.category}</div>
      </div>`
  }

  document.getElementById('detailPreview').innerHTML = previewHTML
  document.getElementById('detailName').textContent = item.name
  document.getElementById('detailDesc').textContent = item.description || ''
  document.getElementById('detailPrice').innerHTML = `${getIcon('diamond',13)} ${item.crystal_cost}`

  const buyBtn = document.getElementById('detailBuyBtn')
  if (owned && !item.is_consumable) {
    buyBtn.textContent = 'OWNED'
    buyBtn.disabled = true
  } else {
    buyBtn.textContent = 'BUY →'
    buyBtn.disabled = false
    buyBtn.onclick = () => { closeDetail(); openConfirm(itemId) }
  }

  document.getElementById('detailModal').classList.add('open')
}

window.closeDetail = function() {
  document.getElementById('detailModal').classList.remove('open')
  detailItemId = null
}

// ปิด detail modal เมื่อกด overlay
document.getElementById('detailModal').addEventListener('click', function(e) {
  if (e.target === this) closeDetail()
})

// ─── FILTER ──────────────────────────────────────────────
window.filterCat = function(cat, btn) {
  currentCat = cat
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  renderShop()
}

// ─── CONFIRM MODAL ───────────────────────────────────────
window.openConfirm = function(itemId) {
  const item = allItems.find(i => i.id === itemId)
  if (!item) return
  selectedItem = item
  const crystal = userProfile?.crystal || 0
  const after = crystal - item.crystal_cost

  document.getElementById('confirmIcon').innerHTML = getItemIcon(item)
  document.getElementById('confirmName').textContent = item.name
  document.getElementById('confirmDesc').textContent = item.description || ''
  document.getElementById('confirmCost').textContent = item.crystal_cost
  document.getElementById('confirmAfter').innerHTML = after < 0 ? `${getIcon('warning',13)} Crystal ไม่พอ` : `${getIcon('crystal',13)} ${after}`
  document.getElementById('confirmBtn').disabled = after < 0
  document.getElementById('confirmMsg').className = 'modal-msg'
  document.getElementById('confirmMsg').textContent = ''
  document.getElementById('confirmModal').classList.add('open')
}

window.closeConfirm = function() {
  document.getElementById('confirmModal').classList.remove('open')
  selectedItem = null
}

// ─── DO PURCHASE ─────────────────────────────────────────
window.doPurchase = async function() {
  if (!selectedItem || !currentUser) return
  const btn = document.getElementById('confirmBtn')
  const msgEl = document.getElementById('confirmMsg')
  btn.disabled = true; btn.textContent = 'กำลังซื้อ...'
  msgEl.className = 'modal-msg'; msgEl.textContent = ''

  const crystal = userProfile?.crystal || 0
  if (crystal < selectedItem.crystal_cost) {
    msgEl.className = 'modal-msg error'; msgEl.textContent = 'Crystal ไม่เพียงพอ!'
    btn.disabled = false; btn.innerHTML = 'CONFIRM <svg width="12" height="12" viewBox="0 0 16 16" fill="none" style="display:inline-block;vertical-align:middle"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg>'; return
  }

  // FIX: เช็ค limited item หมดอายุหรือยัง
  if (selectedItem.is_limited && selectedItem.available_until) {
    if (new Date(selectedItem.available_until) < new Date()) {
      msgEl.className = 'modal-msg error'; msgEl.textContent = 'สินค้านี้หมดแล้ว!'
      btn.disabled = false; btn.innerHTML = 'CONFIRM <svg width="12" height="12" viewBox="0 0 16 16" fill="none" style="display:inline-block;vertical-align:middle"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg>'; return
    }
  }

  // FIX: เช็ค non-consumable ซื้อแล้วหรือยัง
  if (!selectedItem.is_consumable) {
    const alreadyOwned = myPurchases.some(p => p.item_id === selectedItem.id)
    if (alreadyOwned) {
      msgEl.className = 'modal-msg error'; msgEl.textContent = 'คุณมีสินค้านี้แล้ว!'
      btn.disabled = false; btn.innerHTML = 'CONFIRM <svg width="12" height="12" viewBox="0 0 16 16" fill="none" style="display:inline-block;vertical-align:middle"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg>'; return
    }
  }

  // 1. ✅ BUG FIX: re-fetch crystal จาก DB ก่อนหัก ป้องกัน race condition
  // กรณีที่ user เปิด 2 tab แล้วซื้อพร้อมกัน จะได้ยอดจริงจาก server เสมอ
  const { data: freshUser, error: fetchErr } = await supabase
    .from('users').select('crystal').eq('id', currentUser.id).single()
  if (fetchErr) { msgEl.className = 'modal-msg error'; msgEl.textContent = fetchErr.message; btn.disabled = false; btn.innerHTML = 'CONFIRM <svg width="12" height="12" viewBox="0 0 16 16" fill="none" style="display:inline-block;vertical-align:middle"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg>'; return }
  const freshCrystal = freshUser?.crystal || 0
  if (freshCrystal < selectedItem.crystal_cost) {
    msgEl.className = 'modal-msg error'; msgEl.textContent = 'Crystal ไม่เพียงพอ (ยอดจริงจาก Server)!'
    btn.disabled = false; btn.innerHTML = 'CONFIRM <svg width="12" height="12" viewBox="0 0 16 16" fill="none" style="display:inline-block;vertical-align:middle"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg>'; return
  }
  const { error: e1 } = await supabase.from('users')
    .update({ crystal: freshCrystal - selectedItem.crystal_cost })
    .eq('id', currentUser.id)
  if (e1) { msgEl.className = 'modal-msg error'; msgEl.textContent = e1.message; btn.disabled = false; btn.innerHTML = 'CONFIRM <svg width="12" height="12" viewBox="0 0 16 16" fill="none" style="display:inline-block;vertical-align:middle"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg>'; return }

  // 2. บันทึก transaction
  const { data: tx } = await supabase.from('transactions').insert({
    user_id: currentUser.id,
    type: 'spend',
    crystal_amount: selectedItem.crystal_cost,
    status: 'completed'
  }).select().single()

  // 3. บันทึก purchase
  const expiresAt = selectedItem.duration_hours
    ? new Date(Date.now() + selectedItem.duration_hours * 3600000).toISOString()
    : null

  await supabase.from('user_purchases').insert({
    user_id: currentUser.id,
    item_id: selectedItem.id,
    transaction_id: tx?.id || null,
    crystal_spent: selectedItem.crystal_cost,
    expires_at: expiresAt,
    is_active: true
  })

  // FIX: wallet update — บวกสะสม ไม่ overwrite, ลบ updated_at (ไม่มีใน schema)
  const { data: wData } = await supabase.from('wallet')
    .select('crystal_spent').eq('user_id', currentUser.id).maybeSingle()
  if (wData) {
    await supabase.from('wallet').update({
      crystal_spent: (wData.crystal_spent || 0) + selectedItem.crystal_cost
    }).eq('user_id', currentUser.id)
  }

  showToast(`ซื้อ ${selectedItem.name} สำเร็จ!`, 'success')
  closeConfirm()
  await loadData()
  renderShop()
  btn.innerHTML = 'CONFIRM <svg width="12" height="12" viewBox="0 0 16 16" fill="none" style="display:inline-block;vertical-align:middle"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg>'
}

// ─── LOAD DATA ───────────────────────────────────────────
async function loadData() {
  const [itemsRes, profileRes, purchasesRes] = await Promise.all([
    supabase.from('shop_items').select('*').eq('is_active', true).order('crystal_cost'),
    supabase.from('users').select('*').eq('id', currentUser.id).single(),
    supabase.from('user_purchases').select('*').eq('user_id', currentUser.id).eq('is_active', true)
  ])

  allItems = itemsRes.data || []
  userProfile = profileRes.data
  myPurchases = purchasesRes.data || []

  // อัปเดต wallet UI จาก users.gold / users.crystal
  const goldEl = document.getElementById('goldBalance')
  const crystalEl = document.getElementById('crystalBalance')
  if (goldEl) goldEl.textContent = (userProfile?.gold || 0).toLocaleString()
  if (crystalEl) crystalEl.textContent = (userProfile?.crystal || 0).toLocaleString()
}

// ─── INIT ────────────────────────────────────────────────
async function init() {
  initCursor()
  updateDate()
  injectGlobalDefs()

  // inject static icons
  const shopTitle = document.getElementById('shopPageTitle')
  if (shopTitle) shopTitle.innerHTML = getIcon('cart',18) + ' <span>SHOP</span>'
  document.getElementById('featuredIcon').innerHTML = getIcon('star', 28)
  const confirmTitle = document.getElementById('confirmModalTitle')
  if (confirmTitle) confirmTitle.innerHTML = getIcon('diamond',13) + ' CONFIRM PURCHASE'
  const closeConfirmBtn = document.getElementById('closeConfirmBtn')
  if (closeConfirmBtn) closeConfirmBtn.innerHTML = getIcon('close', 16)
  const confirmCostWrap = document.getElementById('confirmCostWrap')
  if (confirmCostWrap) confirmCostWrap.innerHTML = getIcon('diamond',14) + ' <span id="confirmCost">0</span>'
  const shopEmptyIcon = document.getElementById('shopEmptyIcon')
  if (shopEmptyIcon) shopEmptyIcon.innerHTML = getIcon('package', 28)

  try {
    const { user } = await initSidebar('shop')
    if (!user) return
    currentUser = user

    await loadData()
    renderFeatured()
    renderShop()

    // ✅ BUG FIX: ดึง city จาก DB โดยตรง ไม่ใช้ userProfile?.city ที่อาจยังไม่โหลด
    const { data: myShopUser } = await supabase
      .from('users').select('city').eq('id', currentUser.id).single()
    const myShopCity = myShopUser?.city || 'กรุงเทพมหานคร'

    // navVerifyBadge — นับ quest ของคนอื่นที่รอ verify ในเมืองเดียวกัน และยังไม่เคย vote
    const { data: pendingV } = await supabase
      .from('user_quests')
      .select('id, users!inner(city)')
      .eq('status', 'pending_review')
      .eq('users.city', myShopCity)
      .neq('user_id', currentUser.id)
    const { data: myVotesV } = await supabase
      .from('quest_verifications').select('user_quest_id').eq('voter_id', currentUser.id)
    const votedIdsV = new Set((myVotesV || []).map(v => v.user_quest_id))
    const notVotedCountV = (pendingV || []).filter(p => !votedIdsV.has(p.id)).length
    if (notVotedCountV > 0) {
      const badge = document.getElementById('navVerifyBadge')
      badge.style.display = 'inline'
      badge.textContent = notVotedCountV > 99 ? '99+' : notVotedCountV
    }

    // navQuestBadge — นับ quest ที่ยัง in_progress
    const { count: questCount } = await supabase
      .from('user_quests')
      .select('*', { count: 'exact', head: true })
      .eq('user_id', currentUser.id)
      .eq('status', 'in_progress')
    if (questCount > 0) {
      const qb = document.getElementById('navQuestBadge')
      qb.textContent = questCount > 99 ? '99+' : questCount
      qb.style.display = 'inline'
    }

    document.getElementById('confirmModal').addEventListener('click', e => {
      if (e.target === document.getElementById('confirmModal')) closeConfirm()
    })

    // ── Cart dash → warp out ──
    const ls = document.getElementById('loadingScreen')
    const loadTxt = document.getElementById('loadingTxt')
    if (loadTxt) loadTxt.textContent = 'OPENING SHOP...'
    setTimeout(() => {
      if (ls) ls.classList.add('warp-out')
      setTimeout(() => { if (ls) ls.style.display = 'none' }, 700)
    }, 1800)
  } catch (err) {
    console.error('Shop init error:', err)
    const grid = document.getElementById('shopGrid')
    if (grid) grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon" style="opacity:0.4;margin-bottom:8px"></div><div class="empty-text">ไม่สามารถโหลดข้อมูลได้ในขณะนี้</div></div>'
  }
}

init()
</script>
</body>
</html>
