<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEXUS LIFE — Community Verify</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --cyan:#6644ff; --cyan-dim:#3322aa; --gold:#ffd700; --red:#ff003c;
  --green:#44ff88; --purple:#b044ff; --orange:#ff9500;
  --bg:#06030f; --bg2:#0a0618;
  --panel:rgba(102,68,255,0.04); --border:rgba(102,68,255,0.15);
  --text:#c8c0ff; --text-dim:#5a4888;
}
.cls-warrior{--cls:#ff4444} .cls-mage{--cls:#aa44ff} .cls-explorer{--cls:#44ff88}
.cls-merchant{--cls:#ffaa00} .cls-artist{--cls:#ff66aa} .cls-diplomat{--cls:#00ccff}

*{margin:0;padding:0;box-sizing:border-box} html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;overflow-x:hidden;cursor:none;min-height:100vh}
.cursor{position:fixed;width:10px;height:10px;background:var(--cyan);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--cyan)}
.cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(102,68,255,0.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all 0.12s ease}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:1000}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(102,68,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(102,68,255,0.025) 1px,transparent 1px);background-size:60px 60px;z-index:0}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.orb-1{width:500px;height:500px;background:rgba(102,68,255,0.04);top:-150px;right:-100px}
.orb-2{width:300px;height:300px;background:rgba(176,68,255,0.04);bottom:100px;left:-50px}

/* MAIN */
.main{margin-left:220px;min-height:100vh;position:relative;z-index:1;padding:32px 28px 80px}

/* PAGE HEADER */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;animation:fadeInDown 0.5s ease both;flex-wrap:wrap;gap:12px}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.page-title{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#fff;display:flex;align-items:center;gap:12px}
.page-title span{color:var(--green)}
.page-sub{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:var(--text-dim);margin-top:4px}

/* STATS BAR */
.stats-bar{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;animation:fadeInUp 0.5s 0.05s ease both}
.sbar-item{background:rgba(102,68,255,0.02);border:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;flex:1;min-width:140px}
.sbar-icon{font-size:20px}
.sbar-val{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:var(--cyan)}
.sbar-label{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1px;color:var(--text-dim);margin-top:2px}
.sbar-item.green .sbar-val{color:var(--green)}
.sbar-item.gold .sbar-val{color:var(--gold)}

/* TABS */
.tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--border);animation:fadeInUp 0.5s 0.08s ease both}
.tab-btn{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;padding:12px 20px;background:transparent;border:none;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.25s;display:flex;align-items:center;gap:8px}
.tab-btn:hover{color:var(--cyan)}
.tab-btn.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab-count{font-size:8px;padding:2px 7px;background:rgba(102,68,255,0.1);border:1px solid rgba(102,68,255,0.2);border-radius:10px}
.tab-count.red{background:rgba(255,0,60,0.1);border-color:rgba(255,0,60,0.2);color:var(--red)}
.tab-count.green{background:rgba(68,255,136,0.1);border-color:rgba(68,255,136,0.2);color:var(--green)}

/* VERIFY GRID */
.verify-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;animation:fadeInUp 0.5s 0.1s ease both}

/* VERIFY CARD */
.vcard{background:rgba(102,68,255,0.02);border:1px solid var(--border);position:relative;overflow:hidden;transition:all 0.25s}
.vcard:hover{border-color:rgba(102,68,255,0.25);box-shadow:0 8px 32px rgba(102,68,255,0.06)}
.vcard-accent{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green)}

/* CARD HEADER */
.vcard-header{padding:14px 16px 12px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.vcard-avatar{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);overflow:hidden;flex-shrink:0}
.vcard-avatar img{width:100%;height:100%;object-fit:cover}
.vcard-user-info{flex:1;min-width:0}
.vcard-username{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vcard-meta{font-family:'Orbitron',monospace;font-size:8px;color:var(--text-dim);margin-top:2px}
.vcard-class-badge{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1px;padding:3px 8px;border:1px solid var(--cls,var(--cyan));color:var(--cls,var(--cyan));flex-shrink:0}
.vcard-time{font-family:'Orbitron',monospace;font-size:8px;color:var(--text-dim);flex-shrink:0}

/* QUEST INFO */
.vcard-quest{padding:12px 16px 12px 20px;border-bottom:1px solid var(--border)}
.vcard-quest-type{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:2px;padding:2px 8px;border:1px solid;display:inline-block;margin-bottom:6px}
.vcard-quest-type.daily{color:var(--cyan);border-color:rgba(102,68,255,0.3)}
.vcard-quest-type.weekly{color:var(--orange);border-color:rgba(255,149,0,0.3)}
.vcard-quest-title{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:#fff;line-height:1.4}
.vcard-quest-reward{font-family:'Orbitron',monospace;font-size:9px;color:var(--gold);margin-top:4px}

/* PROOF IMAGE */
.vcard-proof{position:relative;overflow:hidden;background:#000;cursor:pointer}
.vcard-proof img{width:100%;max-height:240px;object-fit:cover;display:block;transition:transform 0.3s ease}
.vcard-proof:hover img{transform:scale(1.02)}
.vcard-proof-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.6) 0%,transparent 50%);pointer-events:none}
.vcard-proof-expand{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:14px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s}
.vcard-proof-expand:hover{background:rgba(102,68,255,0.3);border-color:var(--cyan)}
.vcard-no-proof{padding:20px;text-align:center;background:rgba(0,0,0,0.2);border-bottom:1px solid var(--border)}
.vcard-no-proof-txt{font-family:'Orbitron',monospace;font-size:10px;color:var(--text-dim)}

/* VOTE SECTION */
.vcard-vote{padding:14px 16px 14px 20px}
.vote-progress{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.vote-pips{display:flex;gap:5px}
.vote-pip{width:22px;height:22px;border-radius:50%;border:1px solid rgba(68,255,136,0.25);background:transparent;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all 0.3s}
.vote-pip.approve{background:rgba(68,255,136,0.15);border-color:var(--green);color:var(--green)}
.vote-pip.reject{background:rgba(255,0,60,0.15);border-color:var(--red);color:var(--red)}
.vote-counts{font-family:'Orbitron',monospace;font-size:9px;color:var(--text-dim);flex:1}
.vote-counts .approve-c{color:var(--green)}
.vote-counts .reject-c{color:var(--red)}
.vote-timer{font-family:'Orbitron',monospace;font-size:8px;color:var(--text-dim);margin-left:auto}
.vote-timer.urgent{color:var(--orange)}

.vote-btns{display:flex;gap:8px}
.vote-btn{flex:1;font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;padding:10px;border:1px solid;background:transparent;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;justify-content:center;gap:6px}
.vote-btn.approve-btn{border-color:rgba(68,255,136,0.4);color:var(--green)}
.vote-btn.approve-btn:hover{background:rgba(68,255,136,0.12);border-color:var(--green)}
.vote-btn.reject-btn{border-color:rgba(255,0,60,0.3);color:var(--red)}
.vote-btn.reject-btn:hover{background:rgba(255,0,60,0.08);border-color:var(--red)}
.vote-btn:disabled{opacity:0.35;cursor:not-allowed}
.vote-btn.voted-approve{background:rgba(68,255,136,0.12);border-color:var(--green);opacity:0.7;cursor:default}
.vote-btn.voted-reject{background:rgba(255,0,60,0.08);border-color:var(--red);opacity:0.7;cursor:default}

/* VOTED ALREADY */
.already-voted-badge{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;padding:8px;text-align:center;border:1px solid var(--border);color:var(--text-dim);background:rgba(102,68,255,0.02)}

/* HISTORY CARD (voted) */
.hcard{background:rgba(0,245,255,0.01);border:1px solid var(--border);padding:14px 16px 14px 20px;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden}
.hcard-accent{position:absolute;left:0;top:0;bottom:0;width:3px}
.hcard-accent.approve{background:var(--green)}
.hcard-accent.reject{background:var(--red)}
.hcard-img{width:48px;height:48px;object-fit:cover;flex-shrink:0;border:1px solid var(--border)}
.hcard-info{flex:1;min-width:0}
.hcard-title{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;color:#fff;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hcard-meta{font-family:'Orbitron',monospace;font-size:8px;color:var(--text-dim)}
.hcard-vote{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;flex-shrink:0}
.hcard-vote.approve{color:var(--green)}
.hcard-vote.reject{color:var(--red)}

/* EMPTY */
.empty-state{grid-column:1/-1;text-align:center;padding:64px 20px}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.3}
.empty-txt{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;color:var(--text-dim);margin-bottom:8px}
.empty-sub{font-size:13px;color:var(--text-dim);opacity:0.6}

/* LOADING — CHECKMARK DRAW */
.loading-screen{
  position:fixed;inset:0;background:var(--bg);z-index:9000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  overflow:hidden;
}
.loading-screen.warp-out{animation:verifyWarpOut 0.7s cubic-bezier(0.4,0,0.2,1) forwards}
@keyframes verifyWarpOut{
  0%  {transform:scale(1);opacity:1;filter:blur(0)}
  40% {transform:scale(0.95);opacity:1;filter:blur(0)}
  70% {transform:scale(18);opacity:0.6;filter:blur(4px)}
  100%{transform:scale(40);opacity:0;filter:blur(12px)}
}

/* ── Checkmark wrap ── */
.check-wrap{
  position:relative;width:100px;height:100px;
  display:flex;align-items:center;justify-content:center;
}

/* วงกลมรอบนอก */
.check-circle-svg{
  position:absolute;inset:0;
  animation:circleSpin 3s linear infinite;
}
@keyframes circleSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* glow */
.check-glow{
  position:absolute;inset:-16px;border-radius:50%;
  background:radial-gradient(circle,rgba(102,68,255,0.2) 0%,transparent 70%);
  animation:checkGlow 2s ease-in-out infinite;
}
@keyframes checkGlow{0%,100%{opacity:0.5;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}

/* SVG ติ๊กถูก */
.check-svg{
  position:relative;z-index:2;
  filter:drop-shadow(0 0 12px rgba(102,68,255,0.9));
}
.check-path{
  stroke-dasharray: 60;
  stroke-dashoffset: 60;
  animation:drawCheck 0.8s cubic-bezier(0.4,0,0.2,1) infinite alternate;
}
@keyframes drawCheck{
  0%  {stroke-dashoffset:60;opacity:0.4}
  60% {stroke-dashoffset:0;opacity:1}
  100%{stroke-dashoffset:0;opacity:1}
}

/* sparkles */
.check-spark{
  position:absolute;width:4px;height:4px;border-radius:50%;
  background:#6644ff;animation:sparkPop 1.6s ease-in-out infinite;opacity:0;
}
.check-spark:nth-child(1){top:8px;left:18px;animation-delay:0.2s}
.check-spark:nth-child(2){top:12px;right:14px;animation-delay:0.5s}
.check-spark:nth-child(3){bottom:14px;left:12px;animation-delay:0.9s}
.check-spark:nth-child(4){bottom:8px;right:18px;animation-delay:1.3s}
@keyframes sparkPop{
  0%  {transform:scale(0);opacity:0}
  30% {transform:scale(1.5);opacity:1}
  60% {transform:scale(1);opacity:0.6}
  100%{transform:scale(0);opacity:0}
}

.loading-logo{
  font-family:'Orbitron',monospace;font-size:24px;font-weight:900;
  letter-spacing:6px;color:#8877ff;
  text-shadow:0 0 24px rgba(102,68,255,0.9),0 0 48px rgba(102,68,255,0.3);
}
.loading-bar-wrap{width:160px;height:2px;background:rgba(102,68,255,0.1);border:1px solid rgba(102,68,255,0.2)}
.loading-bar{
  height:100%;
  background:linear-gradient(90deg,#3322aa,#6644ff,#9977ff);
  animation:loadAnim 1.4s ease-in-out infinite;
}
@keyframes loadAnim{0%{width:0}55%{width:70%}100%{width:100%}}
.loading-txt{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:3px;color:var(--text-dim)}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:2000;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px)}
.lightbox.open{display:flex}
.lightbox img{max-width:100%;max-height:90vh;object-fit:contain;border:1px solid var(--border)}
.lightbox-close{position:absolute;top:20px;right:20px;background:none;border:1px solid var(--border);color:var(--text-dim);width:40px;height:40px;font-size:18px;cursor:pointer;transition:all 0.2s}
.lightbox-close:hover{border-color:var(--red);color:var(--red)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;z-index:3000;font-family:'Orbitron',monospace;font-size:10px;letter-spacing:1px;padding:14px 20px;border-left:3px solid var(--cyan);background:rgba(1,10,15,0.97);border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border);color:var(--cyan);transform:translateX(120%);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);max-width:300px;line-height:1.5}
.toast.show{transform:translateX(0)}
.toast.success{border-left-color:var(--green);color:var(--green)}
.toast.error{border-left-color:var(--red);color:#ff6680}
.toast.gold{border-left-color:var(--gold);color:var(--gold)}

@media(max-width:768px){
  .main{margin-left:0;padding:80px 16px 80px}
  .verify-grid{grid-template-columns:1fr}
  .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tab-btn{white-space:nowrap}
  .stats-bar{gap:8px}
  .sbar-item{min-width:120px}
}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="check-wrap">
    <div class="check-glow"></div>
    <div class="check-spark"></div>
    <div class="check-spark"></div>
    <div class="check-spark"></div>
    <div class="check-spark"></div>
    <!-- วงกลมหมุน -->
    <svg class="check-circle-svg" width="100" height="100" viewBox="0 0 100 100" fill="none">
      <circle cx="50" cy="50" r="44" stroke="rgba(102,68,255,0.2)" stroke-width="1.5"/>
      <circle cx="50" cy="50" r="44"
        stroke="url(#circleGrad)" stroke-width="1.5"
        stroke-dasharray="80 196" stroke-linecap="round"/>
      <defs>
        <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#6644ff"/>
          <stop offset="100%" stop-color="transparent"/>
        </linearGradient>
      </defs>
    </svg>
    <!-- ติ๊กถูก -->
    <svg class="check-svg" width="52" height="52" viewBox="0 0 52 52" fill="none">
      <circle cx="26" cy="26" r="22" stroke="#6644ff" stroke-width="1.8" fill="rgba(102,68,255,0.08)"/>
      <polyline class="check-path"
        points="14,27 22,35 38,18"
        stroke="#9977ff" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>
    </svg>
  </div>
  <div class="loading-logo">VERIFY</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
  <div class="loading-txt" id="loadingTxt">LOADING VERIFY...</div>
</div>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="grid-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<!-- SIDEBAR -->
<div id="sidebar-root"></div>

<!-- MAIN -->
<main class="main">
  <div class="page-header">
    <div>
      <div class="page-title" id="pageTitleEl"><span>VERIFY</span></div>
      <div class="page-sub" id="pageSub">COMMUNITY VERIFICATION SYSTEM</div>
    </div>
  </div>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="sbar-item">
      <div class="sbar-icon" id="sbarPending"></div>
      <div>
        <div class="sbar-val" id="statPending">0</div>
        <div class="sbar-label">รอ VERIFY</div>
      </div>
    </div>
    <div class="sbar-item green">
      <div class="sbar-icon" id="sbarApproved"></div>
      <div>
        <div class="sbar-val" id="statVoted">0</div>
        <div class="sbar-label">ที่ฉัน VOTE แล้ว</div>
      </div>
    </div>
    <div class="sbar-item gold">
      <div class="sbar-icon" id="sbarXP"></div>
      <div>
        <div class="sbar-val" id="statXPEarned">+0</div>
        <div class="sbar-label">XP จากการ VERIFY</div>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('pending',this)" id="tabPendingBtn">
      <span id="tabIconPending"></span> รอ VERIFY <span class="tab-count red" id="tcPending">0</span>
    </button>
    <button class="tab-btn" onclick="switchTab('history',this)" id="tabHistoryBtn">
      <span id="tabIconHistory"></span> ประวัติของฉัน <span class="tab-count green" id="tcHistory">0</span>
    </button>
  </div>

  <!-- GRID -->
  <div class="verify-grid" id="verifyGrid">
    <div class="empty-state">
      <div class="empty-icon" id="verifyLoadingIcon"></div>
      <div class="empty-txt">กำลังโหลด...</div>
    </div>
  </div>
</main>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" id="closeLightboxBtn" onclick="closeLightbox()"></button>
  <img id="lightboxImg" src="" alt="">
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { supabase } from './supabase.js'
import { initSidebar } from './sidebar.js'
import { getIcon, injectGlobalDefs } from './icons.js'
injectGlobalDefs()

function clsIcon(cls, size=16) { return getIcon(`class_${cls}`, size) || getIcon('sword', size) }

let currentUser = null
let userProfile = null
let currentTab = 'pending'
let pendingItems = []   // quests รอ verify
let myVotes = {}        // { user_quest_id: 'approve'|'reject' }
let myVoteHistory = []  // ประวัติที่เคย vote
let totalXPEarned = 0

function getAvatarUrl(seed, size=40) {
  if (!seed) return `https://api.dicebear.com/9.x/pixel-art/svg?seed=nexus&size=${size}`
  const [style, s, bg] = seed.split(':')
  return `https://api.dicebear.com/9.x/${style||'pixel-art'}/svg?seed=${encodeURIComponent(s||'nexus')}&backgroundColor=${bg||'0a1628'}&size=${size}`
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime()
  const m = Math.floor(diff / 60000)
  const h = Math.floor(diff / 3600000)
  if (m < 1) return 'เมื่อกี้'
  if (m < 60) return `${m} นาทีที่แล้ว`
  if (h < 24) return `${h} ชม.ที่แล้ว`
  return `${Math.floor(h/24)} วันที่แล้ว`
}

function timeLeft(submittedAt) {
  const deadline = new Date(submittedAt).getTime() + 24 * 3600000
  const diff = deadline - Date.now()
  if (diff <= 0) return { text: 'auto-approve แล้ว', urgent: false }
  const h = Math.floor(diff / 3600000)
  const m = Math.floor((diff % 3600000) / 60000)
  return { text: `auto ใน ${h}ชม.${m}น.`, urgent: h < 6 }
}

// ── INIT ──
async function init() {
  const { user } = await initSidebar('verify')
  if (!user) return
  currentUser = user

  // inject static icons
  const pageTitleEl = document.getElementById('pageTitleEl')
  if (pageTitleEl) pageTitleEl.innerHTML = getIcon('check_circle', 18) + ' <span>VERIFY</span>'

  const tabIconPending = document.getElementById('tabIconPending')
  if (tabIconPending) tabIconPending.innerHTML = getIcon('refresh', 12)
  const tabIconHistory = document.getElementById('tabIconHistory')
  if (tabIconHistory) tabIconHistory.innerHTML = getIcon('scroll', 12)

  const sbarPending = document.getElementById('sbarPending')
  if (sbarPending) sbarPending.innerHTML = getIcon('refresh', 16)
  const sbarApproved = document.getElementById('sbarApproved')
  if (sbarApproved) sbarApproved.innerHTML = getIcon('check_circle', 16)
  const sbarXP = document.getElementById('sbarXP')
  if (sbarXP) sbarXP.innerHTML = getIcon('levelup', 16)
  const verifyLoadingIcon = document.getElementById('verifyLoadingIcon')
  if (verifyLoadingIcon) verifyLoadingIcon.innerHTML = getIcon('refresh', 28)
  const closeLightboxBtn = document.getElementById('closeLightboxBtn')
  if (closeLightboxBtn) closeLightboxBtn.innerHTML = getIcon('close', 18)

  await loadProfile()
  await loadData()

  const ls = document.getElementById('loadingScreen')
  ls.classList.add('warp-out')
  setTimeout(() => ls.style.display = 'none', 700)
  initCursor()
}

async function loadProfile() {
  const { data } = await supabase.from('users').select('*').eq('id', currentUser.id).single()
  userProfile = data
  if (!data) return

  const cls = data.class || 'warrior'

  // navQuestBadge
  const { count: questCount } = await supabase
    .from('user_quests')
    .select('*', { count: 'exact', head: true })
    .eq('user_id', currentUser.id)
    .eq('status', 'in_progress')
  if (questCount > 0) {
    const qb = document.getElementById('navQuestBadge')
    qb.textContent = questCount > 99 ? '99+' : questCount
    qb.style.display = 'inline'
  }

  // navVerifyBadge
  const { data: pending } = await supabase
    .from('user_quests')
    .select('id, users!inner(city)')
    .eq('status', 'pending_review')
    .eq('users.city', data.city)
    .neq('user_id', currentUser.id)
  const { data: profileVotes } = await supabase
    .from('quest_verifications')
    .select('user_quest_id')
    .eq('voter_id', currentUser.id)
  const votedIds = new Set((profileVotes||[]).map(v => v.user_quest_id))
  const notVotedCount = (pending||[]).filter(p => !votedIds.has(p.id)).length
  if (notVotedCount > 0) {
    const vb = document.getElementById('navVerifyBadge')
    vb.textContent = notVotedCount > 99 ? '99+' : notVotedCount
    vb.style.display = 'inline'
  }
}

async function loadData() {
  const myCity = userProfile?.city || 'กรุงเทพมหานคร'

  // ดึง user_quests ที่ pending_review ในเมืองเดียวกัน (ไม่ใช่ของตัวเอง)
  const { data: pending } = await supabase
    .from('user_quests')
    .select(`
      id, user_id, quest_id, status, proof_url, submitted_at,
      quests(id, title, type, xp_reward, gold_reward, class_target),
      users!user_quests_user_id_fkey(id, username, display_name, avatar_seed, class, city)
    `)
    .eq('status', 'pending_review')
    .neq('user_id', currentUser.id)
    .not('proof_url', 'is', null)
    .order('submitted_at', { ascending: true })
    .limit(50)

  // ✅ FIX: กรองเฉพาะเมืองเดียวกันเท่านั้น
  // ลบ || !item.users?.city ออก เพราะ city=null จะเข้า queue ทุกเมือง ซึ่งผิด design
  const cityFiltered = (pending || []).filter(item =>
    item.users?.city === myCity
  )

  // ดึง votes ทั้งหมดของ quests พวกนี้
  const uqIds = cityFiltered.map(i => i.id)
  let allVotes = []
  if (uqIds.length > 0) {
    const { data: votes } = await supabase
      .from('quest_verifications')
      .select('user_quest_id, voter_id, vote')
      .in('user_quest_id', uqIds)
    allVotes = votes || []
  }

  // map votes
  const voteMap = {}
  allVotes.forEach(v => {
    if (!voteMap[v.user_quest_id]) voteMap[v.user_quest_id] = { approve: 0, reject: 0 }
    if (v.vote === 'approve') voteMap[v.user_quest_id].approve++
    else voteMap[v.user_quest_id].reject++
  })

  // votes ของตัวเอง
  myVotes = {}
  allVotes.filter(v => v.voter_id === currentUser.id).forEach(v => {
    myVotes[v.user_quest_id] = v.vote
  })

  // ซ่อน quest ที่ตัวเองเคย vote แล้ว
  pendingItems = cityFiltered
    .filter(item => !myVotes[item.id])
    .map(item => ({ ...item, votes: voteMap[item.id] || { approve: 0, reject: 0 } }))

  // ประวัติที่เคย vote (ดึง quest ที่ myVotes มี)
  const votedIds = Object.keys(myVotes).map(Number)
  myVoteHistory = cityFiltered
    .filter(item => myVotes[item.id])
    .map(item => ({ ...item, votes: voteMap[item.id] || { approve: 0, reject: 0 }, myVote: myVotes[item.id] }))

  // XP ที่ได้จากการ vote (10 XP ต่อ vote)
  totalXPEarned = Object.keys(myVotes).length * 10

  updateStats()
  renderTab()
}

function updateStats() {
  document.getElementById('statPending').textContent = pendingItems.length
  document.getElementById('statVoted').textContent = Object.keys(myVotes).length
  document.getElementById('statXPEarned').textContent = '+' + totalXPEarned
  document.getElementById('tcPending').textContent = pendingItems.length
  document.getElementById('tcHistory').textContent = myVoteHistory.length
}

// ── RENDER ──
function renderTab() {
  if (currentTab === 'pending') renderPending()
  else renderHistory()
}

function renderPending() {
  const grid = document.getElementById('verifyGrid')
  if (!pendingItems.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${getIcon('check_circle', 48)}</div>
        <div class="empty-txt">ไม่มี Quest รอ Verify</div>
        <div class="empty-sub">ในเมืองของคุณไม่มีหลักฐานรอตรวจสอบ หรือ vote ครบหมดแล้ว</div>
      </div>`
    return
  }
  grid.innerHTML = pendingItems.map(item => renderVerifyCard(item)).join('')
}

function renderVerifyCard(item) {
  const q = item.quests
  const u = item.users
  if (!q || !u) return ''
  const cls = u.class || 'warrior'
  const av = getAvatarUrl(u.avatar_seed)
  const { text: tLeft, urgent } = timeLeft(item.submitted_at)
  const vc = item.votes
  const approveCount = vc.approve
  const rejectCount = vc.reject

  const pips = [0,1,2].map(i => {
    if (i < approveCount) return `<div class="vote-pip approve">${getIcon('check',8)}</div>`
    if (i < rejectCount) return `<div class="vote-pip reject">${getIcon('close',8)}</div>`
    return `<div class="vote-pip"></div>`
  }).join('')

  const proofHtml = item.proof_url
    ? `<div class="vcard-proof" onclick="openLightbox('${item.proof_url}')">
        <img src="${item.proof_url}" alt="proof" loading="lazy" onerror="this.parentElement.style.display='none'">
        <div class="vcard-proof-overlay"></div>
        <div class="vcard-proof-expand">${getIcon('zoom', 14)}</div>
       </div>`
    : `<div class="vcard-no-proof"><div class="vcard-no-proof-txt">หลักฐานข้อความ</div></div>`

  return `
  <div class="vcard cls-${cls}" id="vcard-${item.id}">
    <div class="vcard-accent"></div>
    <div class="vcard-header">
      <div class="vcard-avatar"><img src="${av}" alt=""></div>
      <div class="vcard-user-info">
        <div class="vcard-username">${u.display_name || u.username}</div>
        <div class="vcard-meta">${clsIcon(cls,13)} ${cls.toUpperCase()} · ${u.city || myCity}</div>
      </div>
      <div class="vcard-time">${timeAgo(item.submitted_at)}</div>
    </div>
    <div class="vcard-quest">
      <div class="vcard-quest-type ${q.type}">${q.type.toUpperCase()}</div>
      <div class="vcard-quest-title">${q.title}</div>
      <div class="vcard-quest-reward">+${q.xp_reward} XP ${q.gold_reward ? `· +${q.gold_reward} Gold` : ''}</div>
    </div>
    ${proofHtml}
    <div class="vcard-vote">
      <div class="vote-progress">
        <div class="vote-pips">${pips}</div>
        <div class="vote-counts">
          <span class="approve-c">${approveCount} approve</span> · <span class="reject-c">${rejectCount} reject</span>
        </div>
        <div class="vote-timer ${urgent ? 'urgent' : ''}">${tLeft}</div>
      </div>
      <div class="vote-btns">
        <button class="vote-btn approve-btn" onclick="castVote(${item.id},'approve',this)">
          ${getIcon('check_circle', 13)} APPROVE
        </button>
        <button class="vote-btn reject-btn" onclick="castVote(${item.id},'reject',this)">
          ${getIcon('x_circle', 13)} REJECT
        </button>
      </div>
    </div>
  </div>`
}

function renderHistory() {
  const grid = document.getElementById('verifyGrid')
  if (!myVoteHistory.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${getIcon('scroll', 48)}</div>
        <div class="empty-txt">ยังไม่มีประวัติ</div>
        <div class="empty-sub">Vote หลักฐาน Quest ของผู้เล่นคนอื่นเพื่อสะสม XP</div>
      </div>`
    return
  }
  grid.innerHTML = myVoteHistory.map(item => {
    const q = item.quests
    const u = item.users
    if (!q || !u) return ''
    const mv = item.myVote
    return `
    <div class="hcard">
      <div class="hcard-accent ${mv}"></div>
      ${item.proof_url ? `<img class="hcard-img" src="${item.proof_url}" alt="" onerror="this.style.display='none'">` : ''}
      <div class="hcard-info">
        <div class="hcard-title">${q.title}</div>
        <div class="hcard-meta">${u.display_name || u.username} · ${timeAgo(item.submitted_at)}</div>
        <div class="hcard-meta" style="margin-top:3px">${item.votes.approve}/3 approve · ${item.votes.reject}/3 reject</div>
      </div>
      <div class="hcard-vote ${mv}">${mv === 'approve' ? 'APPROVE' : 'REJECT'}</div>
    </div>`
  }).join('')
}

// ── CAST VOTE ──
window.castVote = async function(uqId, vote, btn) {
  const card = document.getElementById('vcard-' + uqId)
  const btns = card.querySelectorAll('.vote-btn')
  btns.forEach(b => b.disabled = true)

  try {
    const { data, error } = await supabase.rpc('cast_verification_vote', {
      p_user_quest_id: uqId,
      p_voter_id: currentUser.id,
      p_vote: vote
    })

    if (error) throw error

    const result = data
    if (!result.success) {
      if (result.error === 'already_voted') showToast('โหวตไปแล้ว', 'error')
      else if (result.error === 'cannot_vote_own') showToast('ไม่สามารถโหวตตัวเองได้', 'error')
      else showToast('เกิดข้อผิดพลาด', 'error')
      btns.forEach(b => b.disabled = false)
      return
    }

    // บันทึก vote ของตัวเอง
    myVotes[uqId] = vote
    totalXPEarned += 10

    if (result.result === 'approved') {
      showToast('Quest ผ่านแล้ว! Community approved', 'success')
    } else if (result.result === 'rejected') {
      showToast('Quest ถูก reject โดย Community', 'error')
    } else {
      showToast(vote === 'approve' ? 'Vote Approve! +10 XP' : 'Vote Reject! +10 XP', 'success')
    }

    // อนิเมชัน fade out การ์ด
    card.style.transition = 'opacity 0.5s, transform 0.5s'
    card.style.opacity = '0'
    card.style.transform = 'scale(0.95)'
    setTimeout(async () => {
      await loadData()
    }, 500)

  } catch(e) {
    showToast(e.message || 'เกิดข้อผิดพลาด', 'error')
    btns.forEach(b => b.disabled = false)
  }
}

// ── TAB ──
window.switchTab = function(tab, btn) {
  currentTab = tab
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  renderTab()
}

// ── LIGHTBOX ──
window.openLightbox = function(url) {
  document.getElementById('lightboxImg').src = url
  document.getElementById('lightbox').classList.add('open')
}
window.closeLightbox = function() {
  document.getElementById('lightbox').classList.remove('open')
}

// ── HELPERS ──
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.className = `toast ${type} show`
  setTimeout(() => { t.className = `toast ${type}` }, 3500)
}

function initCursor() {
  const cur = document.getElementById('cursor'), ring = document.getElementById('cursorRing')
  let mx=0,my=0,rx=0,ry=0
  document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; cur.style.left=mx+'px'; cur.style.top=my+'px' })
  ;(function loop(){ rx+=(mx-rx)*.12; ry+=(my-ry)*.12; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(loop) })()
  document.querySelectorAll('button,a,.vcard,.vcard-proof').forEach(el => {
    el.addEventListener('mouseenter', () => { ring.style.width='44px'; ring.style.height='44px' })
    el.addEventListener('mouseleave', () => { ring.style.width='32px'; ring.style.height='32px' })
  })
}

init()
</script>
