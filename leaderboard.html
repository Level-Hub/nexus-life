<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEXUS LIFE — Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --cyan: #00f5ff;
  --cyan-dim: #00a8b5;
  --gold: #ffd700;
  --red: #ff003c;
  --green: #44ff88;
  --purple: #b044ff;
  --bg: #010a0f;
  --bg2: #020d14;
  --panel: rgba(0,245,255,0.04);
  --border: rgba(0,245,255,0.12);
  --text: #c8f0f5;
  --text-dim: #5a8a90;
}

.cls-warrior  { --cls:#ff4444; }
.cls-mage     { --cls:#aa44ff; }
.cls-explorer { --cls:#44ff88; }
.cls-merchant { --cls:#ffaa00; }
.cls-artist   { --cls:#ff66aa; }
.cls-diplomat { --cls:#00ccff; }

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background:var(--bg);
  color:var(--text);
  font-family:'Sarabun',sans-serif;
  overflow-x:hidden;
  cursor:none;
  min-height:100vh;
}

/* CURSOR */
.cursor { position:fixed;width:10px;height:10px;background:var(--cyan);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--cyan); }
.cursor-ring { position:fixed;width:32px;height:32px;border:1px solid rgba(0,245,255,0.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all 0.12s ease; }

/* SCANLINE */
body::before { content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:1000; }

/* GRID BG */
.grid-bg { position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.025) 1px,transparent 1px);background-size:60px 60px;z-index:0; }

.orb { position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0; }
.orb-1 { width:500px;height:500px;background:rgba(0,245,255,0.04);top:-150px;right:-100px; }
.orb-2 { width:300px;height:300px;background:rgba(176,68,255,0.04);bottom:100px;left:-50px; }
.orb-3 { width:200px;height:200px;background:rgba(255,215,0,0.03);top:40%;left:40%; }

/* ===================== MAIN ===================== */
.main {
  margin-left:220px;
  min-height:100vh;
  position:relative;z-index:1;
  padding:32px 28px 60px;
}

@keyframes fadeInDown { from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:translateY(0);} }
@keyframes fadeInUp { from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);} }
@keyframes slideIn { from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:translateX(0);} }
@keyframes shimmer { 0%{background-position:-200% center;} 100%{background-position:200% center;} }
@keyframes rankGlow { 0%,100%{box-shadow:0 0 12px rgba(255,215,0,0.3);}50%{box-shadow:0 0 28px rgba(255,215,0,0.7);} }
@keyframes countUp { from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);} }
@keyframes barFill { from{width:0;} to{width:var(--bar-w); } }
@keyframes flicker { 0%,100%{opacity:1;} 92%{opacity:1;} 93%{opacity:0.7;} 94%{opacity:1;} 97%{opacity:0.85;} }

/* PAGE HEADER */
.page-header {
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:28px;
  animation:fadeInDown 0.5s ease both;
}
.page-title {
  font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#fff;
  display:flex;align-items:center;gap:12px;
}
.page-title span { color:var(--gold);text-shadow:0 0 16px var(--gold); }
.page-date { font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:var(--text-dim);margin-top:4px; }

.notif-btn {
  position:relative;width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  background:var(--panel);border:1px solid var(--border);cursor:pointer;transition:all 0.3s;
}
.notif-btn:hover { border-color:var(--cyan); }
.notif-dot { position:absolute;top:8px;right:8px;width:8px;height:8px;background:var(--red);border-radius:50%;animation:pulse 1.5s infinite; }

/* ===================== SEASON BANNER ===================== */
.season-banner {
  background:linear-gradient(135deg, rgba(255,215,0,0.06) 0%, rgba(176,68,255,0.06) 50%, rgba(0,245,255,0.06) 100%);
  border:1px solid rgba(255,215,0,0.2);
  padding:20px 24px;
  margin-bottom:24px;
  position:relative;overflow:hidden;
  animation:fadeInUp 0.5s 0.05s ease both;
}
.season-banner::before { content:'';position:absolute;top:-1px;left:-1px;width:16px;height:16px;border-top:2px solid var(--gold);border-left:2px solid var(--gold); }
.season-banner::after  { content:'';position:absolute;bottom:-1px;right:-1px;width:16px;height:16px;border-bottom:2px solid var(--gold);border-right:2px solid var(--gold); }
.season-banner-inner { display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px; }
.season-info { display:flex;align-items:center;gap:16px; }
.season-icon { font-size:28px;animation:flicker 4s infinite; }
.season-label { font-family:'Orbitron',monospace;font-size:8px;letter-spacing:3px;color:var(--gold);margin-bottom:4px; }
.season-title { font-family:'Orbitron',monospace;font-size:16px;font-weight:900;color:#fff;text-shadow:0 0 12px rgba(255,215,0,0.4); }
.season-sub { font-size:12px;color:var(--text-dim);margin-top:2px; }
.season-timer { text-align:right; }
.season-timer-label { font-family:'Orbitron',monospace;font-size:8px;letter-spacing:2px;color:var(--text-dim); }
.season-timer-value { font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:var(--gold);text-shadow:0 0 12px var(--gold);margin-top:4px; }

/* ===================== MY RANK CARD ===================== */
.my-rank-card {
  background:var(--panel);
  border:1px solid var(--border);
  padding:20px 24px;
  margin-bottom:24px;
  display:flex;align-items:center;gap:20px;
  position:relative;overflow:hidden;
  animation:fadeInUp 0.5s 0.1s ease both;
}
.my-rank-card::before { content:'MY RANK';position:absolute;top:10px;right:16px;font-family:'Orbitron',monospace;font-size:8px;letter-spacing:3px;color:var(--text-dim);opacity:0.4; }
.my-rank-badge {
  width:56px;height:56px;display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',monospace;font-size:20px;font-weight:900;
  background:rgba(255,215,0,0.08);border:2px solid var(--gold);
  color:var(--gold);flex-shrink:0;
  position:relative;
}
.my-rank-avatar { width:52px;height:52px;border-radius:50%;overflow:hidden;border:2px solid var(--cls,var(--cyan));flex-shrink:0; }
.my-rank-avatar img { width:100%;height:100%;object-fit:cover; }
.my-rank-info { flex:1; }
.my-rank-name { font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:#fff; }
.my-rank-class { font-family:'Orbitron',monospace;font-size:9px;color:var(--cls,var(--cyan));letter-spacing:2px;margin-top:2px; }
.my-rank-xp { display:flex;align-items:center;gap:8px;margin-top:8px; }
.my-rank-xp-val { font-family:'Orbitron',monospace;font-size:16px;font-weight:900;color:var(--cyan); }
.my-rank-xp-label { font-size:11px;color:var(--text-dim); }
.my-rank-stats { display:flex;gap:20px; }
.my-stat { text-align:center; }
.my-stat-val { font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:#fff; }
.my-stat-label { font-size:10px;color:var(--text-dim);margin-top:2px; }

/* ===================== TABS ===================== */
.tab-row {
  display:flex;align-items:center;gap:0;
  margin-bottom:24px;
  border-bottom:1px solid var(--border);
  animation:fadeInUp 0.5s 0.15s ease both;
}
.tab-btn {
  display:flex;align-items:center;gap:8px;
  padding:14px 24px;
  font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;
  color:var(--text-dim);background:transparent;border:none;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  cursor:pointer;transition:all 0.25s;position:relative;
}
.tab-btn:hover { color:var(--text); }
.tab-btn.active { color:var(--gold);border-bottom-color:var(--gold); }
.tab-btn.active svg { opacity:1; }
.tab-btn svg { opacity:0.5;transition:opacity 0.25s; }
.tab-btn:hover svg { opacity:0.8; }

/* filters */
.filter-row {
  display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;
  animation:fadeInUp 0.5s 0.2s ease both;
}
.filter-label { font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:var(--text-dim); }
.filter-chip {
  padding:6px 14px;font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;
  background:transparent;border:1px solid var(--border);color:var(--text-dim);
  cursor:pointer;transition:all 0.2s;
}
.filter-chip:hover { border-color:var(--cyan-dim);color:var(--text); }
.filter-chip.active { border-color:var(--cyan);color:var(--cyan);background:rgba(0,245,255,0.06); }
.filter-right { margin-left:auto;display:flex;align-items:center;gap:8px; }
.class-filter {
  padding:6px 12px;font-family:'Orbitron',monospace;font-size:9px;
  background:var(--panel);border:1px solid var(--border);color:var(--text-dim);
  cursor:pointer;transition:all 0.2s;
}
.class-filter:focus { outline:none;border-color:var(--cyan); }
.class-filter option { background:#010a0f; }

/* ===================== PODIUM ===================== */
.podium-section {
  display:flex;align-items:flex-end;justify-content:center;gap:16px;
  margin-bottom:32px;padding:0 20px;
  animation:fadeInUp 0.6s 0.2s ease both;
}
.podium-item { display:flex;flex-direction:column;align-items:center;gap:10px; }
.podium-rank-1 { order:2; }
.podium-rank-2 { order:1; }
.podium-rank-3 { order:3; }

.podium-avatar-wrap { position:relative; }
.podium-avatar {
  border-radius:50%;overflow:hidden;border:3px solid;
  background:var(--panel);
}
.podium-rank-1 .podium-avatar { width:88px;height:88px;border-color:var(--gold);box-shadow:0 0 24px rgba(255,215,0,0.5);animation:rankGlow 2s ease infinite; }
.podium-rank-2 .podium-avatar { width:72px;height:72px;border-color:#c0c0c0;box-shadow:0 0 14px rgba(192,192,192,0.3); }
.podium-rank-3 .podium-avatar { width:64px;height:64px;border-color:#cd7f32;box-shadow:0 0 10px rgba(205,127,50,0.3); }
.podium-avatar img { width:100%;height:100%;object-fit:cover; }

.podium-crown { position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:20px;filter:drop-shadow(0 0 6px var(--gold)); }
.podium-rank-num {
  position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
  font-family:'Orbitron',monospace;font-size:10px;font-weight:900;
  padding:2px 8px;border-radius:10px;
}
.podium-rank-1 .podium-rank-num { background:var(--gold);color:#000; }
.podium-rank-2 .podium-rank-num { background:#c0c0c0;color:#000; }
.podium-rank-3 .podium-rank-num { background:#cd7f32;color:#000; }

.podium-name { font-family:'Orbitron',monospace;font-size:10px;font-weight:700;color:#fff;text-align:center;max-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.podium-class { font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1px;text-align:center; }
.podium-xp { font-family:'Orbitron',monospace;font-size:12px;font-weight:700;text-align:center; }
.podium-rank-1 .podium-xp { color:var(--gold); }
.podium-rank-2 .podium-xp { color:#c0c0c0; }
.podium-rank-3 .podium-xp { color:#cd7f32; }

.podium-stand { width:100%; border-top:2px solid; }
.podium-rank-1 .podium-stand { height:80px;background:linear-gradient(180deg,rgba(255,215,0,0.12),rgba(255,215,0,0.02));border-color:var(--gold); }
.podium-rank-2 .podium-stand { height:56px;background:linear-gradient(180deg,rgba(192,192,192,0.1),rgba(192,192,192,0.02));border-color:#c0c0c0; }
.podium-rank-3 .podium-stand { height:40px;background:linear-gradient(180deg,rgba(205,127,50,0.1),rgba(205,127,50,0.02));border-color:#cd7f32; }

/* ===================== LEADERBOARD TABLE ===================== */
.lb-table-wrap {
  position:relative;
  animation:fadeInUp 0.5s 0.25s ease both;
}
.lb-table-header {
  display:grid;
  grid-template-columns: 48px 1fr 120px 100px 80px;
  gap:12px;
  padding:10px 20px;
  background:rgba(0,245,255,0.02);
  border:1px solid var(--border);
  border-bottom:2px solid var(--border);
  font-family:'Orbitron',monospace;font-size:8px;letter-spacing:2px;color:var(--text-dim);
  margin-bottom:4px;
}
.lb-row {
  display:grid;
  grid-template-columns: 48px 1fr 120px 100px 80px;
  gap:12px;
  padding:12px 20px;
  border:1px solid transparent;
  border-bottom:1px solid rgba(0,245,255,0.05);
  transition:all 0.2s;
  position:relative;
  cursor:pointer;
  animation:slideIn 0.4s both;
}
.lb-row:hover {
  background:rgba(0,245,255,0.04);
  border-color:var(--border);
}
.lb-row.me {
  background:rgba(0,245,255,0.06);
  border-color:rgba(0,245,255,0.2);
}
.lb-row.me::before {
  content:'YOU';position:absolute;right:16px;top:50%;transform:translateY(-50%);
  font-family:'Orbitron',monospace;font-size:8px;letter-spacing:2px;
  color:var(--cyan);opacity:0.5;
}
.lb-row-rank {
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',monospace;font-size:13px;font-weight:900;
}
.lb-row-rank.r1 { color:var(--gold);text-shadow:0 0 10px var(--gold); }
.lb-row-rank.r2 { color:#c0c0c0;text-shadow:0 0 8px #c0c0c0; }
.lb-row-rank.r3 { color:#cd7f32;text-shadow:0 0 8px #cd7f32; }
.lb-row-rank.rother { color:var(--text-dim); }

.lb-row-user { display:flex;align-items:center;gap:12px;overflow:hidden; }
.lb-avatar { width:36px;height:36px;border-radius:50%;overflow:hidden;border:2px solid var(--cls,var(--border));flex-shrink:0; }
.lb-avatar img { width:100%;height:100%;object-fit:cover; }
.lb-user-info { overflow:hidden; }
.lb-username { font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.lb-title { font-size:10px;color:var(--text-dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px; }

.lb-row-xp {
  display:flex;align-items:center;gap:8px;
}
.lb-xp-bar-wrap { flex:1;height:4px;background:rgba(0,245,255,0.08);position:relative;overflow:hidden; }
.lb-xp-bar { height:100%;background:linear-gradient(90deg,var(--cyan),var(--purple));width:0%;transition:width 1.2s cubic-bezier(0.4,0,0.2,1); }
.lb-xp-val { font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:var(--cyan);white-space:nowrap; }

.lb-row-level { display:flex;align-items:center;justify-content:center; }
.lb-level-badge {
  font-family:'Orbitron',monospace;font-size:11px;font-weight:700;
  padding:4px 10px;border:1px solid var(--cls,var(--border));
  color:var(--cls,var(--text));background:rgba(var(--cls-rgb,0,245,255),0.08);
}

.lb-row-class { display:flex;align-items:center;justify-content:center; }
.lb-class-tag {
  font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1px;
  padding:3px 8px;border:1px solid var(--cls,var(--border));
  color:var(--cls,var(--text-dim));
  text-transform:uppercase;
}

/* ===================== CITY TAB ===================== */
.city-grid {
  display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;
  animation:fadeInUp 0.5s 0.2s ease both;
}
.city-card {
  background:var(--panel);border:1px solid var(--border);
  padding:20px;position:relative;overflow:hidden;
  transition:all 0.3s;cursor:pointer;
}
.city-card:hover { border-color:var(--cyan-dim);transform:translateY(-2px); }
.city-card::before { content:'';position:absolute;top:-1px;left:-1px;width:12px;height:12px;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan); }
.city-rank-badge {
  position:absolute;top:16px;right:16px;
  font-family:'Orbitron',monospace;font-size:20px;font-weight:900;
}
.city-rank-badge.r1 { color:var(--gold);text-shadow:0 0 12px var(--gold); }
.city-rank-badge.r2 { color:#c0c0c0; }
.city-rank-badge.r3 { color:#cd7f32; }
.city-rank-badge.rother { color:var(--text-dim); }

.city-name { font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:#fff;margin-bottom:4px; }
.city-province { font-size:11px;color:var(--text-dim);margin-bottom:12px; }

.city-prosperity { display:flex;align-items:center;gap:8px;margin-bottom:10px; }
.prosperity-label { font-family:'Orbitron',monospace;font-size:8px;letter-spacing:2px;color:var(--text-dim); }
.prosperity-stars { display:flex;gap:3px; }
.pstar { font-size:10px; }
.pstar.on { color:var(--gold);text-shadow:0 0 6px var(--gold); }
.pstar.off { color:var(--text-dim);opacity:0.3; }

.city-stat-row { display:flex;gap:16px;margin-bottom:12px; }
.city-stat { text-align:center;flex:1; }
.city-stat-val { font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:var(--cyan); }
.city-stat-lbl { font-size:9px;color:var(--text-dim);margin-top:2px; }

.city-xp-bar-wrap { height:4px;background:rgba(0,245,255,0.08);overflow:hidden;margin-bottom:8px; }
.city-xp-bar { height:100%;background:linear-gradient(90deg,var(--cyan),var(--purple));width:0%;transition:width 1.2s cubic-bezier(0.4,0,0.2,1); }
.city-xp-label { display:flex;justify-content:space-between;font-family:'Orbitron',monospace;font-size:8px;color:var(--text-dim); }

.city-buff { display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border:1px solid rgba(68,255,136,0.2);font-family:'Orbitron',monospace;font-size:8px;color:var(--green);margin-top:8px; }

/* ===================== CITY MODAL ===================== */
.modal-overlay {
  position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);
  z-index:600;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.modal-overlay.open { opacity:1;pointer-events:all; }
.modal-box {
  background:#010d14;border:1px solid var(--border);
  width:min(520px,94vw);max-height:80vh;display:flex;flex-direction:column;
  position:relative;
  transform:translateY(20px);transition:transform 0.3s;
}
.modal-overlay.open .modal-box { transform:translateY(0); }
.modal-box::before { content:'';position:absolute;top:-1px;left:-1px;width:16px;height:16px;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan); }
.modal-box::after  { content:'';position:absolute;bottom:-1px;right:-1px;width:16px;height:16px;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan); }
.modal-header {
  padding:20px 24px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.modal-title { font-family:'Orbitron',monospace;font-size:14px;font-weight:900;color:#fff; }
.modal-subtitle { font-family:'Orbitron',monospace;font-size:9px;color:var(--text-dim);letter-spacing:2px;margin-top:3px; }
.modal-close {
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  background:transparent;border:1px solid var(--border);color:var(--text-dim);
  cursor:pointer;font-size:16px;transition:all 0.2s;
}
.modal-close:hover { border-color:var(--red);color:var(--red); }
.modal-body { overflow-y:auto;flex:1;padding:16px 24px; }
.modal-player-row {
  display:flex;align-items:center;gap:12px;
  padding:12px 0;border-bottom:1px solid rgba(0,245,255,0.05);
  cursor:pointer;transition:background 0.15s;
}
.modal-player-row:hover { padding-left:8px; }
.modal-player-rank { width:28px;font-family:'Orbitron',monospace;font-size:12px;font-weight:900;color:var(--text-dim);flex-shrink:0; }
.modal-player-rank.r1 { color:var(--gold); }
.modal-player-rank.r2 { color:#c0c0c0; }
.modal-player-rank.r3 { color:#cd7f32; }
.modal-player-avatar { width:36px;height:36px;border-radius:50%;overflow:hidden;border:2px solid var(--cls,var(--border));flex-shrink:0; }
.modal-player-avatar img { width:100%;height:100%;object-fit:cover; }
.modal-player-info { flex:1;overflow:hidden; }
.modal-player-name { font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.modal-player-class { font-family:'Orbitron',monospace;font-size:9px;color:var(--cls,var(--text-dim));letter-spacing:1px;margin-top:2px; }
.modal-player-xp { font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--cyan);flex-shrink:0; }


/* ===================== GUILD TAB ===================== */
.guild-lb-list { animation:fadeInUp 0.5s 0.2s ease both; }
.guild-row {
  display:grid;
  grid-template-columns: 48px 1fr 120px 100px 80px;
  gap:12px;
  padding:14px 20px;
  border:1px solid transparent;
  border-bottom:1px solid rgba(0,245,255,0.05);
  transition:all 0.2s;cursor:pointer;
  animation:slideIn 0.4s both;
}
.guild-row:hover { background:rgba(0,245,255,0.04);border-color:var(--border); }
.guild-rank-num { display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:13px;font-weight:900; }
.guild-rank-num.r1 { color:var(--gold);text-shadow:0 0 10px var(--gold); }
.guild-rank-num.r2 { color:#c0c0c0; }
.guild-rank-num.r3 { color:#cd7f32; }
.guild-rank-num.rother { color:var(--text-dim); }
.guild-info { display:flex;align-items:center;gap:12px;overflow:hidden; }
.guild-emblem {
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  font-size:18px;border:2px solid var(--border);background:var(--panel);flex-shrink:0;
}
.guild-texts { overflow:hidden; }
.guild-name { font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.guild-tag { font-family:'Orbitron',monospace;font-size:8px;color:var(--cyan);letter-spacing:1px;margin-top:2px; }
.guild-xp-col { display:flex;align-items:center;gap:8px; }
.guild-xp-bar-wrap { flex:1;height:4px;background:rgba(0,245,255,0.08);overflow:hidden; }
.guild-xp-bar { height:100%;background:linear-gradient(90deg,var(--purple),var(--cyan));width:0%;transition:width 1.2s cubic-bezier(0.4,0,0.2,1); }
.guild-xp-val { font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:var(--purple);white-space:nowrap; }
.guild-members { display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:11px;color:var(--text-dim); }
.guild-level { display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:var(--gold); }

/* ===================== SKELETON / LOADING ===================== */
.lb-loading {
  display:flex;flex-direction:column;gap:8px;padding:16px 0;
}
.lb-skel {
  height:56px;background:linear-gradient(90deg,var(--panel) 25%,rgba(0,245,255,0.08) 50%,var(--panel) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;
}

/* ===================== EMPTY STATE ===================== */
.empty-state {
  text-align:center;padding:60px 20px;
}
.empty-icon { font-size:48px;margin-bottom:16px;opacity:0.4; }
.empty-title { font-family:'Orbitron',monospace;font-size:14px;color:var(--text-dim);margin-bottom:8px; }
.empty-sub { font-size:12px;color:var(--text-dim);opacity:0.6; }

/* ===================== TAB CONTENT ===================== */
.tab-content { display:none; }
.tab-content.active { display:block; }

/* ===================== TOAST ===================== */
.toast {
  position:fixed;bottom:24px;right:24px;z-index:500;
  font-family:'Orbitron',monospace;font-size:11px;letter-spacing:1px;
  padding:14px 20px;border:1px solid var(--border);
  background:rgba(1,10,15,0.96);color:var(--text);
  transform:translateY(100px);opacity:0;transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
  backdrop-filter:blur(20px);pointer-events:none;
}
.toast.show { transform:translateY(0);opacity:1; }
.toast.success { border-color:var(--green);color:var(--green); }
.toast.error { border-color:var(--red);color:var(--red); }

/* ===================== RESPONSIVE ===================== */
@media(max-width:900px){
  .topbar { display:flex; }
  .main { margin-left:0;padding:90px 16px 60px; }
  .lb-table-header { display:none; }
  .lb-row { grid-template-columns:40px 1fr auto;gap:8px; }
  .lb-row-xp { display:none; }
  .lb-row-class { display:none; }
  .guild-row { grid-template-columns:40px 1fr auto; }
  .guild-xp-col { display:none; }
  .guild-members { display:none; }
  .podium-section { gap:8px; }
  .podium-rank-1 .podium-avatar { width:72px;height:72px; }
  .podium-rank-2 .podium-avatar { width:60px;height:60px; }
  .podium-rank-3 .podium-avatar { width:52px;height:52px; }
  .my-rank-stats { display:none; }
  .filter-right { display:none; }
  .season-timer { display:none; }
}
</style>
</head>

<script type="module">
import { supabase } from './supabase.js'
import { initSidebar } from './sidebar.js'
import { CLASS_ICONS, SYSTEM_ICONS, getIcon } from './icons.js'
import { renderTitleBadge, injectTitleStyles } from './titles.js'

// ============================================================
// STATE
// ============================================================
let currentUser = null
let userProfile = null
let allGlobalData = []
let citySortKey = 'xp'
let globalPeriod = 'monthly'
let selectedClass = 'all'
let activeTab = 'global'
let titlesMap = {}   // id → title def (สำหรับ resolve equipped_title_id)

// ============================================================
// AVATAR URL HELPER
// ============================================================
function getAvatarUrl(avatarSeed, size = 80) {
  if (!avatarSeed) return `https://api.dicebear.com/9.x/pixel-art/svg?seed=nexus&size=${size}`
  const parts = avatarSeed.split(':')
  if (parts.length === 3) {
    const [style, seed, bg] = parts
    return `https://api.dicebear.com/9.x/${style}/svg?seed=${encodeURIComponent(seed)}&backgroundColor=${bg}&size=${size}`
  }
  return `https://api.dicebear.com/9.x/pixel-art/svg?seed=${encodeURIComponent(avatarSeed)}&size=${size}`
}

// ============================================================
// INIT
// ============================================================
async function init() {
  initCursor()
  updateDate()
  startSeasonTimer()

  const { user } = await initSidebar('leaderboard')
  if (!user) return
  currentUser = user

  injectTitleStyles()

  // inject static icons
  const closeLbModalBtn = document.getElementById('closeLbModalBtn')
  if (closeLbModalBtn) closeLbModalBtn.innerHTML = getIcon('close', 16)

  const { data: profile } = await supabase.from('users').select('*').eq('id', currentUser.id).single()
  userProfile = profile

  if (profile) {
    renderMyRankCard(profile)
  }

  // โหลด titles ทั้งหมดล่วงหน้า เพื่อ resolve equipped_title_id ใน rows
  const { data: allTitles } = await supabase.from('titles').select('id, name, icon, category, rarity')
  ;(allTitles || []).forEach(t => { titlesMap[t.id] = t })

  await Promise.all([loadGlobal(), loadCities(), loadGuilds()])
  checkNotifications()
}

// ============================================================
// SIDEBAR
// ============================================================

// ============================================================
// MY RANK CARD
// ============================================================
function renderMyRankCard(p) {
  document.getElementById('myRankCard').style.display = 'flex'
  document.getElementById('myRankAvatar').src = getAvatarUrl(p.avatar_seed || p.username)
  document.getElementById('myRankAvatarWrap').className = `my-rank-avatar cls-${p.class||'warrior'}`
  document.getElementById('myRankName').textContent = p.display_name || p.username
  document.getElementById('myRankClass').textContent = (p.class||'—').toUpperCase()
  document.getElementById('myRankXP').textContent = fmtNum(p.xp_this_month||0)
  document.getElementById('myRankLv').textContent = p.level||1
  document.getElementById('myRankStreak').innerHTML = (p.streak_current||0) + '<svg width="12" height="12" viewBox="0 0 16 16" fill="none" style="vertical-align:middle;margin-left:2px"><path d="M8 14c-3 0-5-2-5-5 0-1.5.5-3 2-4.5 0 2 1 3 1 3s.5-2.5 2-4.5c.5 2 2 3.5 2 3.5s1-1 .5-2.5c2 2 2.5 3.5 2.5 5 0 3-2 5-5 5z" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>'
  document.getElementById('myRankTotal').textContent = fmtNum(p.xp_total||0)
}

function updateMyRankPosition(data) {
  const idx = data.findIndex(u => u.id === currentUser.id)
  if (idx >= 0) {
    document.getElementById('myRankNum').textContent = `#${idx+1}`
  } else {
    document.getElementById('myRankNum').textContent = '#—'
  }
}

// ============================================================
// GLOBAL LEADERBOARD
// ============================================================
async function loadGlobal() {
  let sorted = []

  if (globalPeriod === 'alltime') {
    // alltime: query users ตรง เรียง xp_total ถูกต้อง 100%
    let query = supabase.from('users')
      .select('id,username,display_name,class,level,rank,xp_total,xp_this_month,streak_current,avatar_seed,avatar_url,city,equipped_title_id')
      .eq('profile_public', true)
      .order('xp_total', { ascending: false })
      .limit(100)
    if (selectedClass !== 'all') query = query.eq('class', selectedClass)
    const { data, error } = await query
    if (error) { console.error(error); return }
    sorted = (data || []).map(u => ({ ...u, position: null }))
  } else {
    // monthly: ใช้ leaderboard_monthly view — มี title join + profile_public filter แล้ว
    let query = supabase.from('leaderboard_monthly')
      .select('*')
      .order('xp_this_month', { ascending: false })
      .limit(100)
    if (selectedClass !== 'all') query = query.eq('class', selectedClass)
    const { data, error } = await query
    if (error) { console.error(error); return }
    sorted = data || []
  }

  allGlobalData = sorted
  renderGlobal(allGlobalData)
  updateMyRankPosition(allGlobalData)
}

function renderGlobal(data) {
  // data ถูก filter class จาก DB แล้ว ไม่ต้อง filter ซ้ำใน JS
  const filtered = data
  const maxXP = filtered[0] ? (globalPeriod==='monthly' ? filtered[0].xp_this_month : filtered[0].xp_total||0) : 1

  // PODIUM (top 3)
  const podium = document.getElementById('podiumSection')
  if (filtered.length === 0) {
    podium.innerHTML = '<div class="empty-state"><div class="empty-icon"><svg width="32" height="32" viewBox="0 0 16 16" fill="none"><path d="M4 2h8v7a4 4 0 01-8 0z" stroke="currentColor" stroke-width="1.2" fill="none" opacity="0.35"/><path d="M2 4H4M12 4h2M8 13v2M5 15h6" stroke="currentColor" stroke-width="1.2" stroke-linecap="square" opacity="0.35"/><path d="M2 4c0 3 2 4 2 4M14 4c0 3-2 4-2 4" stroke="currentColor" stroke-width="1.2" opacity="0.35"/></svg></div><div class="empty-title">ยังไม่มีข้อมูล</div></div>'
  } else {
    const top3 = filtered.slice(0,3)
    // reorder: 2nd, 1st, 3rd
    const order = [top3[1], top3[0], top3[2]].filter(Boolean)
    const ranks = top3[1] ? [2,1,3] : [1,3]
    podium.innerHTML = order.map((u,i) => {
      const rank = top3[1] ? [2,1,3][i] : i+1
      const xp = globalPeriod==='monthly' ? u.xp_this_month : u.xp_total
      const cls = u.class||'warrior'
      const crown = rank===1 ? '<div class="podium-crown"><svg width="20" height="20" viewBox="0 0 16 16" fill="none"><path d="M2 12L4 5l4 4 4-4 2 7z" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linejoin="round"/><path d="M2 12h12" stroke="currentColor" stroke-width="1.2"/><circle cx="2" cy="5" r="1" fill="currentColor"/><circle cx="8" cy="3" r="1" fill="currentColor"/><circle cx="14" cy="5" r="1" fill="currentColor"/></svg></div>' : ''
      return `
        <div class="podium-item podium-rank-${rank}">
          <div class="podium-name">${esc(u.display_name||u.username)}</div>
          <div class="podium-class cls-${cls}" style="color:var(--cls)">${cls.toUpperCase()}</div>
          ${u.equipped_title_id && titlesMap[u.equipped_title_id] ? `<div style="margin-top:3px;display:flex;justify-content:center">${renderTitleBadge(titlesMap[u.equipped_title_id], {showIcon:false})}</div>` : ''}
          <div class="podium-avatar-wrap">
            ${crown}
            <div class="podium-avatar cls-${cls}">
              <img src="${getAvatarUrl(u.avatar_seed||u.username, 88)}" alt="">
            </div>
            <div class="podium-rank-num">#${rank}</div>
          </div>
          <div class="podium-xp">${fmtNum(xp)} XP</div>
          <div class="podium-stand"></div>
        </div>`
    }).join('')
  }

  // LIST (rank 4+)
  const list = document.getElementById('globalList')
  const rest = filtered.slice(3)
  if (rest.length === 0 && filtered.length > 0) {
    list.innerHTML = ''
    return
  }
  if (rest.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg width="32" height="32" viewBox="0 0 16 16" fill="none"><path d="M4 2h8v7a4 4 0 01-8 0z" stroke="currentColor" stroke-width="1.2" fill="none" opacity="0.35"/><path d="M2 4H4M12 4h2M8 13v2M5 15h6" stroke="currentColor" stroke-width="1.2" stroke-linecap="square" opacity="0.35"/><path d="M2 4c0 3 2 4 2 4M14 4c0 3-2 4-2 4" stroke="currentColor" stroke-width="1.2" opacity="0.35"/></svg></div><div class="empty-title">ไม่พบข้อมูล</div><div class="empty-sub">ยังไม่มีผู้เล่นในหมวดนี้</div></div>`
    return
  }

  list.innerHTML = rest.map((u, i) => {
    const rank = i + 4
    const xp = globalPeriod==='monthly' ? u.xp_this_month : u.xp_total
    const pct = Math.round((xp/maxXP)*100)
    const isMe = u.id === currentUser?.id
    const cls = u.class||'warrior'
    const rankClass = rank<=3 ? `r${rank}` : 'rother'
    const delay = (i*0.04).toFixed(2)
    const streakBadge = (u.streak_current||0) >= 7 ? `<span style="color:var(--gold);font-size:9px;margin-left:4px"><svg width="10" height="10" viewBox="0 0 16 16" fill="none" style="vertical-align:middle"><path d="M8 14c-3 0-5-2-5-5 0-1.5.5-3 2-4.5 0 2 1 3 1 3s.5-2.5 2-4.5c.5 2 2 3.5 2 3.5s1-1 .5-2.5c2 2 2.5 3.5 2.5 5 0 3-2 5-5 5z" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>${u.streak_current}</span>` : ''
    return `
      <div class="lb-row ${isMe?'me':''} cls-${cls}" style="animation-delay:${delay}s" onclick="goProfile('${u.id}')">
        <div class="lb-row-rank ${rankClass}">${rank}</div>
        <div class="lb-row-user">
          <div class="lb-avatar cls-${cls}">
            <img src="${getAvatarUrl(u.avatar_seed||u.username, 36)}" alt="">
          </div>
          <div class="lb-user-info">
            <div class="lb-username">${esc(u.display_name||u.username)}${streakBadge}</div>
            <div class="lb-title">Lv.${u.level||1} · ${(u.rank||'bronze').toUpperCase()}${u.equipped_title_id && titlesMap[u.equipped_title_id] ? ' &nbsp;' + renderTitleBadge(titlesMap[u.equipped_title_id], {showIcon:false}) : ''}</div>
          </div>
        </div>
        <div class="lb-row-xp">
          <div class="lb-xp-bar-wrap"><div class="lb-xp-bar" data-pct="${pct}"></div></div>
          <div class="lb-xp-val">${fmtNum(xp)}</div>
        </div>
        <div class="lb-row-level">
          <div class="lb-level-badge cls-${cls}">LV ${u.level||1}</div>
        </div>
        <div class="lb-row-class">
          <div class="lb-class-tag cls-${cls}">${cls.toUpperCase()}</div>
        </div>
      </div>`
  }).join('')

  // Animate XP bars after DOM paint
  requestAnimationFrame(() => {
    document.querySelectorAll('#globalList .lb-xp-bar').forEach(el => {
      el.style.width = (el.dataset.pct || 0) + '%'
    })
  })
}

// ============================================================
// CITY LEADERBOARD
// ============================================================
async function loadCities() {
  const { data, error } = await supabase.from('city_stats')
    .select('*')
    .order('xp_contributed_weekly', { ascending: false })

  if (error) { console.error(error); return }

  // get user counts per city
  const { data: userCounts } = await supabase.from('users')
    .select('city')

  const countMap = {}
  ;(userCounts||[]).forEach(u => {
    if (u.city) countMap[u.city] = (countMap[u.city]||0) + 1
  })

  const cities = (data||[]).map(c => ({ ...c, population: countMap[c.city_name]||0 }))
  renderCities(cities)
}

function renderCities(cities) {
  let sorted = [...cities]
  if (citySortKey === 'prosperity') sorted.sort((a,b) => b.prosperity_level - a.prosperity_level)
  else if (citySortKey === 'population') sorted.sort((a,b) => b.population - a.population)
  else sorted.sort((a,b) => b.xp_contributed_weekly - a.xp_contributed_weekly)

  const maxXP = sorted[0]?.xp_contributed_weekly || 1

  document.getElementById('cityGrid').innerHTML = sorted.map((c, i) => {
    const rank = i + 1
    const rankClass = rank <= 3 ? `r${rank}` : 'rother'
    const pct = Math.round((c.xp_contributed_weekly / maxXP)*100)
    const stars = Array.from({length:10}, (_,si) =>
      `<span class="pstar ${si < (c.prosperity_level||1) ? 'on' : 'off'}">${getIcon('star_filled',10)}</span>`
    ).join('')
    const buff = c.active_buffs?.xp_bonus ? `+${Math.round(c.active_buffs.xp_bonus*100)}% XP BUFF` : ''
    const isMyCity = userProfile?.city === c.city_name
    return `
      <div class="city-card" style="${isMyCity?'border-color:rgba(0,245,255,0.3);':''}" onclick="filterCityPlayers('${esc(c.city_name)}')">
        <div class="city-rank-badge ${rankClass}">#${rank}</div>
        <div class="city-name">${esc(c.city_name)}${isMyCity?' <svg width="12" height="12" viewBox="0 0 16 16" fill="none" style="vertical-align:middle"><path d="M8 1a4 4 0 014 4c0 3-4 8-4 8S4 8 4 5a4 4 0 014-4z" stroke="currentColor" stroke-width="1.2" fill="none"/><circle cx="8" cy="5" r="1.5" fill="currentColor"/></svg>':''}</div>
        <div class="city-province">${esc(c.province||'')}</div>
        <div class="city-prosperity">
          <span class="prosperity-label">PROSPERITY</span>
          <div class="prosperity-stars">${stars}</div>
        </div>
        <div class="city-stat-row">
          <div class="city-stat">
            <div class="city-stat-val">${fmtNum(c.xp_contributed_weekly)}</div>
            <div class="city-stat-lbl">XP สัปดาห์นี้</div>
          </div>
          <div class="city-stat">
            <div class="city-stat-val">${c.population||0}</div>
            <div class="city-stat-lbl">ผู้เล่น</div>
          </div>
          <div class="city-stat">
            <div class="city-stat-val">${c.city_streak_days||0}</div>
            <div class="city-stat-lbl">Streak</div>
          </div>
        </div>
        <div class="city-xp-bar-wrap">
          <div class="city-xp-bar" data-pct="${pct}"></div>
        </div>
        <div class="city-xp-label">
          <span>0</span>
          <span>${fmtNum(c.xp_threshold_next||1000)} target</span>
        </div>
        ${buff ? `<div class="city-buff">${getIcon('lightning',11)} ${buff}</div>` : ''}
      </div>`
  }).join('') || `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon" style="opacity:0.4;margin-bottom:8px"></div><div class="empty-title">ยังไม่มีข้อมูลเมือง</div></div>`

  // Animate bars after DOM paint
  requestAnimationFrame(() => {
    document.querySelectorAll('.city-xp-bar').forEach(el => {
      el.style.width = (el.dataset.pct || 0) + '%'
    })
  })
}

// ============================================================
// GUILD LEADERBOARD
// ============================================================
async function loadGuilds() {
  const { data, error } = await supabase.from('guilds')
    .select('id,name,tag,guild_xp,guild_level,is_public')
    .eq('is_public', true)
    .order('guild_xp', { ascending: false })
    .limit(50)

  if (error) { console.error(error); return }

  // get member counts
  const { data: members } = await supabase.from('guild_members').select('guild_id')
  const memberMap = {}
  ;(members||[]).forEach(m => { memberMap[m.guild_id] = (memberMap[m.guild_id]||0) + 1 })

  const guilds = (data||[]).map(g => ({ ...g, member_count: memberMap[g.id]||0 }))
  renderGuilds(guilds)
}

function renderGuilds(guilds) {
  const maxXP = guilds[0]?.guild_xp || 1
  const shieldSvg = `<svg width="20" height="20" viewBox="0 0 16 16" fill="none"><path d="M8 2L2 5v5c0 2.8 2.3 5 6 6 3.7-1 6-3.2 6-6V5z" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linejoin="round"/></svg>`

  document.getElementById('guildList').innerHTML = guilds.map((g, i) => {
    const rank = i + 1
    const rankClass = rank <= 3 ? `r${rank}` : 'rother'
    const pct = Math.round((g.guild_xp/maxXP)*100)
    const delay = (i*0.04).toFixed(2)
    return `
      <div class="guild-row" style="animation-delay:${delay}s">
        <div class="guild-rank-num ${rankClass}">${rank}</div>
        <div class="guild-info">
          <div class="guild-emblem">${shieldSvg}</div>
          <div class="guild-texts">
            <div class="guild-name">${esc(g.name)}</div>
            <div class="guild-tag">[${esc(g.tag)}]</div>
          </div>
        </div>
        <div class="guild-xp-col">
          <div class="guild-xp-bar-wrap"><div class="guild-xp-bar" data-pct="${pct}"></div></div>
          <div class="guild-xp-val">${fmtNum(g.guild_xp)}</div>
        </div>
        <div class="guild-members">${g.member_count} คน</div>
        <div class="guild-level">LV ${g.guild_level||1}</div>
      </div>`
  }).join('') || `<div class="empty-state"><div class="empty-icon">${shieldSvg}</div><div class="empty-title">ยังไม่มี Guild</div><div class="empty-sub">สร้าง Guild เป็นคนแรก!</div></div>`

  requestAnimationFrame(() => {
    document.querySelectorAll('#guildList .guild-xp-bar').forEach(el => {
      el.style.width = (el.dataset.pct || 0) + '%'
    })
  })
}

// ============================================================
// NOTIFICATIONS
// ============================================================
async function checkNotifications() {
  const { count } = await supabase.from('notifications')
    .select('*', { count:'exact',head:true })
    .eq('user_id', currentUser.id)
    .eq('is_read', false)
  if (count > 0) document.getElementById('notifDot').style.display = 'block'

  // navQuestBadge
  const { count: questCount } = await supabase
    .from('user_quests')
    .select('*', { count: 'exact', head: true })
    .eq('user_id', currentUser.id)
    .eq('status', 'in_progress')
  if (questCount > 0) {
    const qb = document.getElementById('navQuestBadge')
    qb.textContent = questCount > 99 ? '99+' : questCount
    qb.style.display = 'inline'
  }

  // ✅ FIX: ใช้ profile.city ที่โหลดมาแล้ว + fallback แทน userProfile?.city
  // เหตุผล: if (userProfile?.city) จะ skip ทั้งบล็อกถ้า city เป็น null/undefined
  const lbCity = userProfile?.city || 'กรุงเทพมหานคร'
  // navVerifyBadge
  const { data: pendingLB } = await supabase
    .from('user_quests')
    .select('id, users!inner(city)')
    .eq('status', 'pending_review')
    .eq('users.city', lbCity)
    .neq('user_id', currentUser.id)
  const { data: myVotesLB } = await supabase
    .from('quest_verifications')
    .select('user_quest_id')
    .eq('voter_id', currentUser.id)
  const votedIdsLB = new Set((myVotesLB||[]).map(v => v.user_quest_id))
  const notVotedCountLB = (pendingLB||[]).filter(p => !votedIdsLB.has(p.id)).length
  if (notVotedCountLB > 0) {
    const vb = document.getElementById('navVerifyBadge')
    vb.textContent = notVotedCountLB > 99 ? '99+' : notVotedCountLB
    vb.style.display = 'inline'
  }
}

// ============================================================
// SEASON TIMER
// ============================================================
function startSeasonTimer() {
  function update() {
    const now = new Date()
    const endOfMonth = new Date(now.getFullYear(), now.getMonth()+1, 1, 0, 0, 0)
    const diff = endOfMonth - now
    const days = Math.floor(diff/86400000)
    const hrs  = Math.floor((diff%86400000)/3600000)
    const mins = Math.floor((diff%3600000)/60000)
    document.getElementById('seasonTimer').textContent = `${days}D ${hrs}H ${mins}M`
  }
  update()
  setInterval(update, 60000)
}

// ============================================================
// TABS
// ============================================================
window.switchTab = function(tab) {
  activeTab = tab
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'))
  document.getElementById(`tab-${tab}`).classList.add('active')
  document.getElementById(`content-${tab}`).classList.add('active')

  // Re-trigger bar animations for newly visible tab
  requestAnimationFrame(() => {
    document.querySelectorAll(`#content-${tab} [data-pct]`).forEach(el => {
      el.style.width = '0%'
      requestAnimationFrame(() => { el.style.width = (el.dataset.pct || 0) + '%' })
    })
  })
}

// ============================================================
// FILTERS
// ============================================================
window.setFilter = function(key, val, btn) {
  btn.closest('.filter-row').querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  if (key === 'period') { globalPeriod = val; loadGlobal() }
}

window.applyClassFilter = function(val) {
  selectedClass = val
  // FIX: re-fetch จาก DB เพราะ filter อยู่ที่ DB แล้ว
  loadGlobal()
}

window.setCitySort = function(key, btn) {
  citySortKey = key
  btn.closest('.filter-row').querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  loadCities()
}

// ============================================================
// NAVIGATION
// ============================================================
window.goProfile = function(uid) {
  window.location.href = `./profile.html?id=${uid}`
}

// ============================================================
// CITY PLAYERS MODAL
// ============================================================
window.filterCityPlayers = async function(cityName) {
  document.getElementById('cityModalTitle').textContent = cityName
  document.getElementById('cityModalSub').textContent = 'TOP PLAYERS IN CITY'
  document.getElementById('cityModalBody').innerHTML = `
    <div class="lb-loading">
      <div class="lb-skel"></div><div class="lb-skel"></div><div class="lb-skel"></div>
    </div>`
  document.getElementById('cityModal').classList.add('open')

  const { data, error } = await supabase.from('users')
    .select('id,username,display_name,class,level,xp_this_month,xp_total,avatar_seed')
    .eq('city', cityName)
    .eq('profile_public', true)
    .order('xp_this_month', { ascending: false })
    .limit(20)

  if (error || !data?.length) {
    document.getElementById('cityModalBody').innerHTML =
      `<div class="empty-state"><div class="empty-icon" style="opacity:0.4;margin-bottom:8px"></div><div class="empty-title">ยังไม่มีผู้เล่นในเมืองนี้</div></div>`
    return
  }

  document.getElementById('cityModalSub').textContent = `${data.length} ผู้เล่น · เรียงตาม XP เดือนนี้`
  document.getElementById('cityModalBody').innerHTML = data.map((u, i) => {
    const rank = i + 1
    const rankClass = rank <= 3 ? `r${rank}` : ''
    const cls = u.class || 'warrior'
    return `
      <div class="modal-player-row cls-${cls}" onclick="goProfile('${u.id}')">
        <div class="modal-player-rank ${rankClass}">${rank}</div>
        <div class="modal-player-avatar cls-${cls}">
          <img src="${getAvatarUrl(u.avatar_seed||u.username, 36)}" alt="">
        </div>
        <div class="modal-player-info">
          <div class="modal-player-name">${esc(u.display_name||u.username)}</div>
          <div class="modal-player-class">${cls.toUpperCase()} · LV ${u.level||1}</div>
        </div>
        <div class="modal-player-xp">${fmtNum(u.xp_this_month)} XP</div>
      </div>`
  }).join('')
}

window.closeCityModal = function(e) {
  if (e && e.target !== document.getElementById('cityModal')) return
  document.getElementById('cityModal').classList.remove('open')
}


// ============================================================
// HELPERS
// ============================================================
function fmtNum(n) { return (n||0).toLocaleString() }
function esc(s) { return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function updateDate() {
  const d = new Date()
  const days = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์']
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.']
  document.getElementById('pageDate').textContent = `วัน${days[d.getDay()]}ที่ ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()+543}`
}

window.showToast = function(msg, type='success') {
  const t = document.getElementById('toast')
  t.textContent = msg; t.className = `toast ${type} show`
  setTimeout(() => { t.className = `toast ${type}` }, 3500)
}

// ============================================================
// CURSOR
// ============================================================
function initCursor() {
  const cur = document.getElementById('cursor')
  const ring = document.getElementById('cursorRing')
  let mx=0,my=0,rx=0,ry=0
  document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; cur.style.left=mx+'px'; cur.style.top=my+'px' })
  ;(function animRing(){ rx+=(mx-rx)*.12; ry+=(my-ry)*.12; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(animRing) })()
  document.querySelectorAll('button,a,.lb-row,.guild-row,.city-card,.nav-item').forEach(el => {
    el.addEventListener('mouseenter', () => { ring.style.width='48px'; ring.style.height='48px'; ring.style.borderColor='rgba(255,215,0,0.6)' })
    el.addEventListener('mouseleave', () => { ring.style.width='32px'; ring.style.height='32px'; ring.style.borderColor='rgba(0,245,255,0.4)' })
  })
}

init()
