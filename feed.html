<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEXUS LIFE — Social Feed</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --cyan:#00f5ff; --cyan-dim:#00a8b5; --gold:#ffd700; --red:#ff003c;
  --green:#44ff88; --purple:#b044ff; --orange:#ff9500;
  --bg:#010a0f; --bg2:#020d14;
  --panel:rgba(0,245,255,0.04); --border:rgba(0,245,255,0.12);
  --text:#c8f0f5; --text-dim:#5a8a90;
}
.cls-warrior{--cls:#ff4444} .cls-mage{--cls:#aa44ff} .cls-explorer{--cls:#44ff88}
.cls-merchant{--cls:#ffaa00} .cls-artist{--cls:#ff66aa} .cls-diplomat{--cls:#00ccff}

*{margin:0;padding:0;box-sizing:border-box} html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;overflow-x:hidden;cursor:none;min-height:100vh}
.cursor{position:fixed;width:10px;height:10px;background:var(--cyan);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--cyan)}
/* LOADING */
.loading-screen{position:fixed;inset:0;background:var(--bg);z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loading-logo{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;letter-spacing:4px;color:var(--cyan);text-shadow:0 0 20px var(--cyan)}
.loading-bar-wrap{width:200px;height:2px;background:var(--border)}
.loading-bar{height:100%;background:var(--cyan);animation:loadAnim 1.2s ease-in-out infinite}
@keyframes loadAnim{0%{width:0%}50%{width:70%}100%{width:100%}}
.loading-txt{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:3px;color:var(--text-dim)}
.cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(0,245,255,0.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all 0.12s ease}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:1000}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.025) 1px,transparent 1px);background-size:60px 60px;z-index:0}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.orb-1{width:500px;height:500px;background:rgba(0,245,255,0.04);top:-150px;right:-100px}
.orb-2{width:300px;height:300px;background:rgba(176,68,255,0.04);bottom:100px;left:-50px}

/* ===== MAIN ===== */
.main{margin-left:220px;min-height:100vh;position:relative;z-index:1;padding:24px}
@media(max-width:768px){.main{margin-left:0;padding:72px 16px 24px}}

.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.page-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;letter-spacing:2px;color:var(--text)}
.page-title span{color:var(--cyan);text-shadow:0 0 20px var(--cyan)}
.page-sub{font-size:12px;color:var(--text-dim);margin-top:4px;font-family:'Orbitron',monospace;letter-spacing:1px}

/* ===== CITY BUFF BANNER ===== */
.city-buff{background:linear-gradient(135deg,rgba(0,245,255,0.06),rgba(176,68,255,0.04));border:1px solid rgba(0,245,255,0.15);padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.city-buff-left{display:flex;align-items:center;gap:12px}
.city-buff-icon{font-size:22px}
.city-buff-name{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--cyan);letter-spacing:1px}
.city-buff-sub{font-size:11px;color:var(--text-dim);margin-top:2px}
.city-buff-xp{text-align:right}
.city-buff-bonus{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;color:var(--green)}
.city-buff-label{font-size:10px;color:var(--text-dim);font-family:'Orbitron',monospace;letter-spacing:1px}
.city-buff-bar-wrap{flex:1;min-width:120px}
.city-buff-bar-track{height:4px;background:rgba(0,245,255,0.1);position:relative;overflow:hidden}
.city-buff-bar-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--purple));transition:width 1s ease;box-shadow:0 0 8px var(--cyan)}
.city-buff-bar-label{font-size:10px;color:var(--text-dim);margin-top:4px;text-align:right}

/* ===== LAYOUT ===== */
.feed-layout{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
@media(max-width:1100px){.feed-layout{grid-template-columns:1fr}}

/* ===== FILTER TABS ===== */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;padding:7px 14px;background:transparent;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;transition:all 0.2s}
.filter-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.filter-btn.active{background:rgba(0,245,255,0.08);border-color:var(--cyan);color:var(--cyan)}

/* ===== FEED CARD ===== */
.feed-list{display:flex;flex-direction:column;gap:10px}
.feed-card{background:var(--panel);border:1px solid var(--border);padding:14px 16px;transition:border-color 0.2s;position:relative;overflow:hidden}
.feed-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cls,var(--cyan))}
.feed-card:hover{border-color:rgba(0,245,255,0.25)}
.feed-top{display:flex;align-items:flex-start;gap:12px}
.feed-avatar{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--cls,var(--cyan));background:rgba(0,245,255,0.1);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden}
.feed-avatar img{width:100%;height:100%;object-fit:cover}
.feed-body{flex:1;min-width:0}
.feed-user-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.feed-username{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:var(--text);letter-spacing:1px}
.feed-class-badge{font-family:'Orbitron',monospace;font-size:8px;padding:2px 6px;border:1px solid var(--cls,var(--cyan));color:var(--cls,var(--cyan));letter-spacing:1px}
.feed-rank{font-family:'Orbitron',monospace;font-size:8px;color:var(--text-dim)}
.feed-time{font-size:10px;color:var(--text-dim);margin-left:auto}
.feed-content{font-size:13px;color:var(--text);line-height:1.6}
.feed-content .highlight{color:var(--cyan);font-weight:600}
.feed-content .xp-gain{font-family:'Orbitron',monospace;font-size:11px;color:var(--green);font-weight:700}
.feed-proof{margin-top:10px;border-radius:2px;overflow:hidden;max-height:160px}
.feed-proof img{width:100%;height:160px;object-fit:cover;display:block;filter:brightness(0.85)}
.feed-actions{display:flex;align-items:center;gap:12px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.feed-action-btn{display:flex;align-items:center;gap:5px;background:transparent;border:none;color:var(--text-dim);font-size:11px;cursor:pointer;transition:color 0.2s;font-family:'Sarabun',sans-serif;padding:0}
.feed-action-btn:hover{color:var(--cyan)}
.feed-action-btn.liked{color:var(--red)}
.feed-action-btn.cheered{color:var(--gold) !important}
.feed-action-btn.cheer-btn{
  margin-left:auto;
  padding:4px 12px;
  border:1px solid rgba(255,215,0,0.25);
  color:var(--text-dim);
  border-radius:0;
  font-family:'Orbitron',monospace;
  font-size:9px;
  letter-spacing:1px;
  transition:all 0.2s;
}
.feed-action-btn.cheer-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,0.06)}
.feed-action-btn.cheer-btn.cheered{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,0.08)}
.cheer-count{font-family:'Orbitron',monospace;font-size:9px;margin-left:4px;opacity:0.8}
.feed-action-btn svg{flex-shrink:0}
.feed-tag{display:inline-flex;align-items:center;gap:4px;font-family:'Orbitron',monospace;font-size:8px;padding:2px 7px;border-radius:0;margin-right:6px;margin-top:4px}
.feed-tag.quest{background:rgba(0,245,255,0.08);border:1px solid rgba(0,245,255,0.2);color:var(--cyan)}
.feed-tag.levelup{background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.3);color:var(--gold)}
.feed-tag.badge{background:rgba(176,68,255,0.08);border:1px solid rgba(176,68,255,0.3);color:var(--purple)}
.feed-tag.checkin{background:rgba(68,255,136,0.08);border:1px solid rgba(68,255,136,0.3);color:var(--green)}
.feed-tag.streak{background:rgba(255,149,0,0.08);border:1px solid rgba(255,149,0,0.3);color:var(--orange)}
.feed-tag.pioneer{background:rgba(255,215,0,0.12);border:1px solid var(--gold);color:var(--gold)}

/* level up special card */
.feed-card.levelup-card{background:linear-gradient(135deg,rgba(255,215,0,0.06),rgba(0,245,255,0.04))}
.feed-card.levelup-card::before{background:var(--gold)}
.levelup-num{font-family:'Orbitron',monospace;font-size:24px;font-weight:900;color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,0.5)}

/* ===== LOAD MORE ===== */
.load-more-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border:1px dashed var(--border);background:transparent;color:var(--text-dim);font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;cursor:pointer;width:100%;margin-top:8px;transition:all 0.2s}
.load-more-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.loading-spinner{width:14px;height:14px;border:1.5px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.8s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== RIGHT SIDEBAR WIDGETS ===== */
.widget{background:var(--panel);border:1px solid var(--border);padding:16px;margin-bottom:16px}
.widget-title{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;color:var(--cyan);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.widget-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* City Project Widget */
.project-progress-wrap{margin-bottom:12px}
.project-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
.project-track{height:8px;background:rgba(0,245,255,0.08);position:relative;overflow:hidden}
.project-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--purple));transition:width 1s ease;box-shadow:0 0 8px var(--cyan)}
.project-stats{display:flex;justify-content:space-between;margin-top:5px;font-size:10px;color:var(--text-dim);font-family:'Orbitron',monospace}
.project-reward{display:flex;align-items:center;gap:8px;padding:8px;background:rgba(255,215,0,0.04);border:1px solid rgba(255,215,0,0.1);font-size:11px;color:var(--gold)}
.project-ends{font-size:10px;color:var(--text-dim);margin-top:8px;text-align:center;font-family:'Orbitron',monospace;letter-spacing:1px}

/* Active Players Widget */
.active-list{display:flex;flex-direction:column;gap:8px}
.active-item{display:flex;align-items:center;gap:10px}
.active-avatar{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--cls,var(--cyan));background:rgba(0,245,255,0.1);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;overflow:hidden}
.active-avatar img{width:100%;height:100%;object-fit:cover}
.active-name{font-size:12px;font-weight:600;color:var(--text);flex:1}
.active-xp{font-family:'Orbitron',monospace;font-size:10px;color:var(--green)}
.active-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);flex-shrink:0}

/* City Stats Widget */
.city-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.city-stat-box{background:rgba(0,245,255,0.03);border:1px solid var(--border);padding:10px;text-align:center}
.city-stat-val{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;color:var(--cyan)}
.city-stat-lbl{font-size:10px;color:var(--text-dim);margin-top:2px;font-family:'Orbitron',monospace;letter-spacing:1px}

/* Trending Hashtags */
.tag-list{display:flex;flex-direction:column;gap:6px}
.tag-item{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(0,245,255,0.06)}
.tag-item:last-child{border-bottom:none}
.tag-name{font-size:12px;color:var(--cyan);font-weight:600}
.tag-count{font-family:'Orbitron',monospace;font-size:10px;color:var(--text-dim)}

/* ===== EMPTY / LOADING STATES ===== */
.empty-state{text-align:center;padding:40px 20px}
.empty-icon{font-size:32px;margin-bottom:12px}
.empty-txt{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;color:var(--text-dim)}
.skeleton{background:linear-gradient(90deg,rgba(0,245,255,0.04) 25%,rgba(0,245,255,0.08) 50%,rgba(0,245,255,0.04) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{to{background-position:-200% 0}}
.skel-card{height:100px;border:1px solid var(--border);margin-bottom:10px}

/* ===== COMMENT AREA ===== */
.comment-area{margin-top:10px;display:none}
.comment-area.open{display:block}
.comment-input-wrap{display:flex;gap:8px;margin-top:8px}
.comment-input{flex:1;background:rgba(0,245,255,0.04);border:1px solid var(--border);color:var(--text);font-family:'Sarabun',sans-serif;font-size:12px;padding:8px 12px;outline:none;transition:border-color 0.2s}
.comment-input:focus{border-color:var(--cyan)}
.comment-send{background:var(--cyan);border:none;color:var(--bg);padding:8px 14px;cursor:pointer;font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;transition:opacity 0.2s}
.comment-send:hover{opacity:0.85}
.comment-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.comment-item{display:flex;gap:8px;font-size:12px}
.comment-user{font-weight:700;color:var(--cyan);white-space:nowrap}
.comment-text{color:var(--text-dim)}

/* ===== REALTIME BADGE ===== */
.live-badge{display:inline-flex;align-items:center;gap:5px;font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1.5px;color:var(--green);padding:3px 8px;border:1px solid rgba(68,255,136,0.3);background:rgba(68,255,136,0.05)}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}

@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.feed-card{animation:fadeInUp 0.3s ease both}
</style>
</head>
<body>
<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">NEXUS LIFE</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
  <div class="loading-txt">LOADING FEED...</div>
</div>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="grid-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>


<div id="sidebar-root"></div>
<!-- ===== MAIN ===== -->
<main class="main">

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div>
      <div class="page-title">// <span>SOCIAL FEED</span></div>
      <div class="page-sub" id="cityLabel">กำลังโหลด...</div>
    </div>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  </div>

  <!-- CITY BUFF BANNER -->
  <div class="city-buff" id="cityBuff">
    <div class="city-buff-left">
      <div class="city-buff-icon" id="cityBuffIcon"></div>
      <div>
        <div class="city-buff-name" id="buffCityName">—</div>
        <div class="city-buff-sub" id="buffLevel">Prosperity Lv.— · Loading...</div>
      </div>
    </div>
    <div class="city-buff-bar-wrap">
      <div class="city-buff-bar-track">
        <div class="city-buff-bar-fill" id="buffBar" style="width:0%"></div>
      </div>
      <div class="city-buff-bar-label" id="buffBarLabel">— XP / — XP สู่ Lv.ถัดไป</div>
    </div>
    <div class="city-buff-xp">
      <div class="city-buff-bonus" id="buffBonus">+0%</div>
      <div class="city-buff-label">XP BONUS</div>
    </div>
  </div>

  <!-- LAYOUT -->
  <div class="feed-layout">

    <!-- LEFT: FEED -->
    <div>
      <!-- FILTER TABS -->
      <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('city',this)"><span class="icon-wrap" data-icon="city"></span> เมืองของฉัน</button>
        <button class="filter-btn" onclick="setFilter('following',this)"><span class="icon-wrap" data-icon="group"></span> ที่ติดตาม</button>
        <button class="filter-btn" onclick="setFilter('guild',this)"><span class="icon-wrap" data-icon="sword"></span> Guild</button>
        <button class="filter-btn" onclick="setFilter('all',this)"><span class="icon-wrap" data-icon="globe"></span> ทั้งหมด</button>
      </div>

      <!-- FEED LIST -->
      <div class="feed-list" id="feedList">
        <!-- skeleton loading -->
        <div class="skel-card skeleton"></div>
        <div class="skel-card skeleton" style="height:80px"></div>
        <div class="skel-card skeleton" style="height:120px"></div>
      </div>

      <!-- LOAD MORE -->
      <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()">
        <div class="loading-spinner" id="loadSpinner"></div>
        <span id="loadMoreText">โหลดเพิ่มเติม</span>
      </button>
    </div>

    <!-- RIGHT: WIDGETS -->
    <div id="rightWidgets">

      <!-- CITY PROJECT -->
      <div class="widget">
        <div class="widget-title"><span class="icon-wrap" data-icon="hammer"></span> CITY PROJECT</div>
        <div id="cityProjectWidget">
          <div class="empty-state" style="padding:16px">
            <div class="empty-txt">กำลังโหลด...</div>
          </div>
        </div>
      </div>

      <!-- ACTIVE NOW -->
      <div class="widget">
        <div class="widget-title"><span class="icon-wrap" data-icon="lightning"></span> ACTIVE NOW</div>
        <div class="active-list" id="activeList">
          <div class="empty-state" style="padding:16px">
            <div class="empty-txt">กำลังโหลด...</div>
          </div>
        </div>
      </div>

      <!-- CITY STATS -->
      <div class="widget">
        <div class="widget-title"><span class="icon-wrap" data-icon="stats"></span> CITY STATS</div>
        <div class="city-stats-grid">
          <div class="city-stat-box">
            <div class="city-stat-val" id="statMembers">—</div>
            <div class="city-stat-lbl">ผู้เล่น</div>
          </div>
          <div class="city-stat-box">
            <div class="city-stat-val" id="statWeekXP">—</div>
            <div class="city-stat-lbl">XP/สัปดาห์</div>
          </div>
          <div class="city-stat-box">
            <div class="city-stat-val" id="statProsperity">—</div>
            <div class="city-stat-lbl">PROSPERITY</div>
          </div>
          <div class="city-stat-box">
            <div class="city-stat-val" id="statCityStreak">—</div>
            <div class="city-stat-lbl">STREAK</div>
          </div>
        </div>
        <a href="./city.html" style="display:block;text-align:center;margin-top:12px;font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:var(--cyan);text-decoration:none;border:1px solid rgba(0,245,255,0.2);padding:8px;transition:background 0.2s" onmouseover="this.style.background='rgba(0,245,255,0.06)'" onmouseout="this.style.background='transparent'">CITY DASHBOARD →</a>
      </div>

      <!-- TRENDING -->
      <div class="widget">
        <div class="widget-title"><span class="icon-wrap" data-icon="fire"></span> TRENDING</div>
        <div class="tag-list" id="trendingList">
          <div class="empty-txt" style="font-size:10px;color:var(--text-dim);padding:8px 0">กำลังโหลด...</div>
        </div>
      </div>

    </div><!-- /rightWidgets -->
  </div>
</main>

<script type="module">
import { supabase } from './supabase.js'
import { initSidebar } from './sidebar.js'
import { getIcon } from './icons.js'
import { renderTitleBadge, injectTitleStyles } from './titles.js'

// ===== AUTH CHECK =====
const { user } = await initSidebar('feed')
if (!user) { window.location.href = './login.html'; throw new Error('no session') }

injectTitleStyles()

// inject static icon-wrap elements
document.querySelectorAll('.icon-wrap[data-icon]').forEach(el => {
  el.innerHTML = getIcon(el.dataset.icon, 14)
})
// city buff icon
const cityBuffIcon = document.getElementById('cityBuffIcon')
if (cityBuffIcon) cityBuffIcon.innerHTML = getIcon('city', 22)

const userId = user.id
let myCity = 'กรุงเทพมหานคร'
let myClass = 'warrior'
let myUsername = ''
let currentFilter = 'city'
let feedOffset = 0
const PAGE_SIZE = 15
let isLoading = false

// ===== AVATAR URL HELPER =====
function getAvatarUrl(avatarSeed, size = 80) {
  if (!avatarSeed) return `https://api.dicebear.com/9.x/pixel-art/svg?seed=nexus&size=${size}`
  const parts = avatarSeed.split(':')
  if (parts.length === 3) {
    const [style, seed, bg] = parts
    return `https://api.dicebear.com/9.x/${style}/svg?seed=${encodeURIComponent(seed)}&backgroundColor=${bg}&size=${size}`
  }
  return `https://api.dicebear.com/9.x/pixel-art/svg?seed=${encodeURIComponent(avatarSeed)}&size=${size}`
}

// ===== LOAD USER PROFILE =====
async function loadProfile() {
  const { data: u } = await supabase.from('users').select('*').eq('id', userId).single()
  if (!u) return

  myCity = u.city || 'กรุงเทพมหานคร'
  myClass = u.class || 'warrior'
  myUsername = u.username || u.display_name || 'คุณ'

  const clsClass = 'cls-' + (u.class || 'warrior')

  document.getElementById('cityLabel').innerHTML = `${getIcon('city', 13)} ${myCity} — Feed สด`

  // ✅ BUG FIX: navVerifyBadge ต้องกรองเฉพาะเมืองเดียวกัน
  // เดิมไม่ได้ filter city ทำให้นับ pending_review ของทั้งประเทศ
  const { data: feedPending } = await supabase
    .from('user_quests')
    .select('id, users!inner(city)')
    .eq('status', 'pending_review')
    .eq('users.city', myCity || 'กรุงเทพมหานคร')
    .neq('user_id', userId)
  const { data: myVotes } = await supabase
    .from('quest_verifications').select('user_quest_id').eq('voter_id', userId)
  const votedIds = new Set((myVotes || []).map(v => v.user_quest_id))
  const verifyCount = (feedPending || []).filter(p => !votedIds.has(p.id)).length
  if (verifyCount > 0) {
    const vb = document.getElementById('navVerifyBadge')
    vb.style.display = 'inline'
    vb.textContent = verifyCount > 99 ? '99+' : verifyCount
  }

  // navQuestBadge
  const { count: questCount } = await supabase
    .from('user_quests')
    .select('*', { count: 'exact', head: true })
    .eq('user_id', userId)
    .eq('status', 'in_progress')
  if (questCount > 0) {
    const qb = document.getElementById('navQuestBadge')
    qb.textContent = questCount > 99 ? '99+' : questCount
    qb.style.display = 'inline'
  }

  loadCityBuff()
  loadCityProject()
  loadActivePlayers()
  loadCityStats()
  loadTrending()
  loadFeed()
}

// ===== CITY BUFF =====
async function loadCityBuff() {
  const { data: cs } = await supabase.from('city_stats').select('*').eq('city_name', myCity).maybeSingle()
  if (!cs) return

  const lvl = cs.prosperity_level || 1

  // อ่าน bonus จาก active_buffs JSON เป็น source of truth
  // fallback: prosperity_level * 5 ถ้า active_buffs ยังไม่มีค่า
  let bonusPct = lvl * 5
  try {
    const buffs = typeof cs.active_buffs === 'string' ? JSON.parse(cs.active_buffs) : (cs.active_buffs || {})
    if (buffs.xp_bonus != null) bonusPct = Math.round(buffs.xp_bonus * 100)
  } catch(e) {}

  const xpContrib = cs.xp_contributed_weekly || 0
  const xpNext    = cs.xp_threshold_next || 1000
  const pct       = Math.min(100, Math.round(xpContrib / xpNext * 100))

  document.getElementById('buffCityName').textContent = `${cs.city_name} — PROSPERITY LV.${lvl}`
  document.getElementById('buffLevel').textContent = `XP Bonus ทุกคนในเมือง +${bonusPct}% · อีก ${(xpNext - xpContrib).toLocaleString()} XP → Lv.${lvl + 1}`
  document.getElementById('buffBar').style.width = pct + '%'
  document.getElementById('buffBarLabel').textContent = `${xpContrib.toLocaleString()} / ${xpNext.toLocaleString()} XP`
  document.getElementById('buffBonus').textContent = `+${bonusPct}%`
}

// ===== CITY PROJECT =====
async function loadCityProject() {
  const { data: proj } = await supabase
    .from('city_projects')
    .select('*')
    .eq('city_name', myCity)
    .eq('status', 'active')
    .order('created_at', { ascending: false })
    .limit(1)
    .maybeSingle()

  const wrap = document.getElementById('cityProjectWidget')
  if (!proj) {
    wrap.innerHTML = `<div class="empty-state" style="padding:16px"><div class="empty-icon" id="projEmptyIcon"></div><div class="empty-txt">ไม่มีโครงการในขณะนี้</div></div>`
    const el = document.getElementById('projEmptyIcon')
    if (el) el.innerHTML = getIcon('hammer', 24)
    return
  }

  const pct = Math.min(100, Math.round((proj.current_value / proj.target_value) * 100))
  const endsAt = new Date(proj.ends_at)
  const diffH = Math.max(0, Math.round((endsAt - Date.now()) / 3600000))

  wrap.innerHTML = `
    <div class="project-progress-wrap">
      <div class="project-name">${proj.title}</div>
      <div style="font-size:11px;color:var(--text-dim);margin-bottom:8px">${proj.description || ''}</div>
      <div class="project-track"><div class="project-fill" style="width:${pct}%"></div></div>
      <div class="project-stats"><span>${pct}% สำเร็จ</span><span>${(proj.current_value || 0).toLocaleString()} / ${proj.target_value.toLocaleString()}</span></div>
    </div>
    <div class="project-reward">${getIcon('diamond',12)} รางวัล: ${proj.reward_crystal} Crystal สำหรับทุกคน</div>
    <div class="project-ends">${getIcon('refresh',12)} เหลืออีก ${diffH} ชั่วโมง</div>
  `
}

// ===== ACTIVE PLAYERS =====
async function loadActivePlayers() {
  const { data: players } = await supabase
    .from('users')
    .select('id, username, avatar_seed, avatar_url, class, level, xp_this_month')
    .eq('city', myCity)
    .order('xp_this_month', { ascending: false })
    .limit(6)

  const list = document.getElementById('activeList')
  if (!players || players.length === 0) {
    list.innerHTML = `<div class="empty-state" style="padding:12px"><div class="empty-txt">ไม่มีผู้เล่นออนไลน์</div></div>`
    return
  }

  list.innerHTML = players.map(p => `
    <div class="active-item cls-${p.class || 'warrior'}">
      <div class="active-dot"></div>
      <div class="active-avatar">
        <img src="${p.avatar_url || getAvatarUrl(p.avatar_seed || p.username, 28)}" alt="">
      </div>
      <div class="active-name">${p.username || '—'}</div>
      <div class="active-xp">${(p.xp_this_month || 0).toLocaleString()} XP</div>
    </div>
  `).join('')
}

// ===== CITY STATS =====
async function loadCityStats() {
  const [{ count: members }, { data: cs }] = await Promise.all([
    supabase.from('users').select('*', { count: 'exact', head: true }).eq('city', myCity),
    supabase.from('city_stats').select('*').eq('city_name', myCity).maybeSingle()
  ])

  document.getElementById('statMembers').textContent = (members || 0).toLocaleString()
  if (cs) {
    document.getElementById('statWeekXP').textContent = (cs.xp_contributed_weekly || 0).toLocaleString()
    document.getElementById('statProsperity').textContent = `LV.${cs.prosperity_level || 1}`
    document.getElementById('statCityStreak').textContent = `${cs.city_streak_days || 0}d`
  }
}

// ===== TRENDING =====
async function loadTrending() {
  const trendList = document.getElementById('trendingList')
  try {
    // นับจาก activity_feed จริง — group by type แล้ว map เป็น label
    const { data } = await supabase
      .from('activity_feed')
      .select('type')
      .order('created_at', { ascending: false })
      .limit(500)

    if (!data || data.length === 0) {
      trendList.innerHTML = `<div class="empty-txt" style="font-size:10px;color:var(--text-dim);padding:8px 0">ยังไม่มีข้อมูล</div>`
      return
    }

    // นับ count ต่อ type
    const counts = {}
    data.forEach(r => { counts[r.type] = (counts[r.type] || 0) + 1 })

    // map type → hashtag label
    const labelMap = {
      checkin:          '#checkin',
      quest_complete:   '#questcomplete',
      level_up:         '#levelup',
      streak_milestone: '#streak',
      badge_unlock:     '#badge',
      title_unlock:     '#title',
      guild_join:       '#guild',
      pvp_win:          '#pvp',
    }

    const sorted = Object.entries(counts)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 5)

    trendList.innerHTML = sorted.map(([type, count]) => `
      <div class="tag-item">
        <span class="tag-name">${labelMap[type] || '#' + type}</span>
        <span class="tag-count">${count} posts</span>
      </div>
    `).join('')
  } catch(e) {
    trendList.innerHTML = `<div class="empty-txt" style="font-size:10px;color:var(--text-dim);padding:8px 0">โหลดไม่ได้</div>`
  }
}

// ===== FEED =====
window.currentFilter = 'city'
window.feedOffset = 0

async function loadFeed(reset = true) {
  if (isLoading) return
  isLoading = true

  if (reset) {
    feedOffset = 0
    document.getElementById('feedList').innerHTML = `
      <div class="skel-card skeleton"></div>
      <div class="skel-card skeleton" style="height:80px"></div>
      <div class="skel-card skeleton" style="height:120px"></div>
    `
  }

  let query = supabase
    .from('social_feed_view')
    .select('*')
    .order('created_at', { ascending: false })
    .range(feedOffset, feedOffset + PAGE_SIZE - 1)

  if (currentFilter === 'city') {
    query = query.eq('city', myCity)
  } else if (currentFilter === 'following') {
    const { data: follows } = await supabase.from('social_follows').select('following_id').eq('follower_id', userId)
    const ids = (follows || []).map(f => f.following_id)
    if (ids.length === 0) {
      renderEmptyFeed('ยังไม่ได้ติดตามใคร — ไปหาเพื่อนในเมืองก่อนนะ!')
      isLoading = false
      return
    }
    query = query.in('user_id', ids)
  } else if (currentFilter === 'guild') {
    const { data: gm } = await supabase.from('guild_members').select('guild_id').eq('user_id', userId).maybeSingle()
    if (!gm) {
      renderEmptyFeed('ยังไม่ได้อยู่ Guild — ลองเข้าร่วม Guild ก่อน!')
      isLoading = false
      return
    }
    const { data: members } = await supabase.from('guild_members').select('user_id').eq('guild_id', gm.guild_id)
    const ids = (members || []).map(m => m.user_id)
    query = query.in('user_id', ids)
  }
  // 'all' = no filter

  const { data: feed } = await query
  isLoading = false

  if (!feed || feed.length === 0) {
    if (reset) renderEmptyFeed('ยังไม่มี Activity ใน Feed นี้')
    document.getElementById('loadMoreBtn').style.display = 'none'
    return
  }

  // ดึง likes/comments/cheers จาก DB พร้อมกัน
  const feedIds = feed.map(f => f.id)
  const [likesRes, commentsRes, cheersRes, myLikesRes, myCheersRes] = await Promise.all([
    supabase.from('activity_feed_likes').select('feed_id').in('feed_id', feedIds),
    supabase.from('activity_feed_comments').select('feed_id').in('feed_id', feedIds),
    supabase.from('activity_feed_cheers').select('feed_id').in('feed_id', feedIds),
    supabase.from('activity_feed_likes').select('feed_id').in('feed_id', feedIds).eq('user_id', userId),
    supabase.from('activity_feed_cheers').select('feed_id').in('feed_id', feedIds).eq('user_id', userId),
  ])

  const likeCounts   = {}
  const commentCounts = {}
  const cheerCounts  = {}
  const myLikedSet   = new Set((myLikesRes.data || []).map(r => r.feed_id))
  const myCheeredSet = new Set((myCheersRes.data || []).map(r => r.feed_id))

  ;(likesRes.data || []).forEach(r => { likeCounts[r.feed_id] = (likeCounts[r.feed_id] || 0) + 1 })
  ;(commentsRes.data || []).forEach(r => { commentCounts[r.feed_id] = (commentCounts[r.feed_id] || 0) + 1 })
  ;(cheersRes.data || []).forEach(r => { cheerCounts[r.feed_id] = (cheerCounts[r.feed_id] || 0) + 1 })

  // batch-fetch avatar_url (social_feed_view อาจไม่มี column นี้)
  const uids = [...new Set(feed.map(f => f.user_id).filter(Boolean))]
  const avMap = {}
  if (uids.length > 0) {
    const { data: avRows } = await supabase.from('users').select('id,avatar_url').in('id', uids)
    ;(avRows || []).forEach(u => { if (u.avatar_url) avMap[u.id] = u.avatar_url })
  }

  // เพิ่ม count ลงใน item ก่อน render
  const enriched = feed.map(item => ({
    ...item,
    avatar_url:    avMap[item.user_id] || item.avatar_url || null,
    like_count:    likeCounts[item.id] || 0,
    comment_count: commentCounts[item.id] || 0,
    cheer_count:   cheerCounts[item.id] || 0,
    user_liked:    myLikedSet.has(item.id),
    user_cheered:  myCheeredSet.has(item.id),
  }))

  document.getElementById('loadMoreBtn').style.display = 'flex'
  if (feed.length < PAGE_SIZE) document.getElementById('loadMoreBtn').style.display = 'none'

  const html = enriched.map(item => renderFeedCard(item)).join('')

  if (reset) {
    document.getElementById('feedList').innerHTML = html
  } else {
    document.getElementById('feedList').insertAdjacentHTML('beforeend', html)
  }

  feedOffset += feed.length
  attachCardListeners()
}

function renderEmptyFeed(msg) {
  document.getElementById('feedList').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon" id="emptyFeedIcon"></div>
      <div class="empty-txt">${msg}</div>
    </div>
  `
  const el = document.getElementById('emptyFeedIcon')
  if (el) el.innerHTML = getIcon('signal', 32)
}

function renderFeedCard(item) {
  const avatarSrc = item.avatar_url || getAvatarUrl(item.avatar_seed || item.username, 38)

  const avatarHtml = `<img src="${avatarSrc}" alt="">`

  const timeAgo = getTimeAgo(item.created_at)
  const data = item.data || {}

  let tag = ''
  let content = ''
  let extraClass = ''

  switch (item.type) {
    case 'quest_complete':
      tag = `<span class="feed-tag quest">${getIcon('check_circle',10)} QUEST</span>`
      content = `<strong>${escHtml(item.display_name || item.username)}</strong> สำเร็จ Quest <span class="highlight">"${escHtml(data.quest_title || 'Quest')}"</span> <span class="xp-gain">+${data.xp || 0} XP</span>`
      break
    case 'level_up':
      tag = `<span class="feed-tag levelup">${getIcon('levelup',10)} LEVEL UP</span>`
      extraClass = 'levelup-card'
      content = `<strong>${escHtml(item.display_name || item.username)}</strong> Level Up! <span class="levelup-num">LV.${data.new_level || '?'}</span>`
      break
    case 'badge_unlock':
      tag = `<span class="feed-tag badge">${getIcon('medal',10)} BADGE</span>`
      content = `<strong>${escHtml(item.display_name || item.username)}</strong> ปลดล็อค Badge ${
        data.badge_rarity
          ? renderTitleBadge({ name: data.badge_name || '', rarity: data.badge_rarity, icon: data.badge_icon || '' })
          : `<span class="highlight">${data.badge_name || ''} ${data.badge_icon || ''}</span>`
      }`
      break
    case 'title_unlock':
      tag = `<span class="feed-tag badge">${getIcon('title_badge',10)} TITLE</span>`
      content = `<strong>${escHtml(item.display_name || item.username)}</strong> ได้รับฉายา ${
        data.title_rarity
          ? renderTitleBadge({ name: data.title_name || '', rarity: data.title_rarity, icon: data.title_icon || '' })
          : `<span class="highlight">"${data.title_name || ''}"</span>`
      }`
      break
    case 'checkin':
      tag = `<span class="feed-tag checkin">${getIcon('checkin',10)} CHECK-IN</span>`
      if (data.pioneer) tag += `<span class="feed-tag pioneer">${getIcon('star_filled',10)} PIONEER</span>`
      content = `<strong>${escHtml(item.display_name || item.username)}</strong> Check-in ที่ <span class="highlight">${escHtml(data.place || data.place_name || data.city || '—')}</span>${data.pioneer ? ` <span class="xp-gain">PIONEER! +${data.xp || 100} XP</span>` : ''}`
      break
    case 'guild_join':
      tag = `<span class="feed-tag badge">${getIcon('sword',10)} GUILD</span>`
      content = `<strong>${escHtml(item.display_name || item.username)}</strong> เข้าร่วม Guild <span class="highlight">${escHtml(data.guild_name || '—')}</span>`
      break
    case 'streak_milestone':
      tag = `<span class="feed-tag streak">${getIcon('fire',10)} STREAK</span>`
      content = `<strong>${escHtml(item.display_name || item.username)}</strong> Streak <span class="highlight">${data.streak_days || 0} วัน</span> ติดต่อกัน!`
      break
    case 'pvp_win':
      tag = `<span class="feed-tag levelup">${getIcon('sword',10)} PVP WIN</span>`
      content = `<strong>${escHtml(item.display_name || item.username)}</strong> ชนะ PvP กับ <span class="highlight">${escHtml(data.opponent_name || '—')}</span> <span class="xp-gain">+${data.xp || 0} XP</span>`
      break
    default:
      tag = `<span class="feed-tag quest">${getIcon('signal',10)} ACTIVITY</span>`
      content = `<strong>${escHtml(item.display_name || item.username)}</strong> มี activity ใหม่`
  }

  const likeCount = item.like_count || 0
  const commentCount = item.comment_count || 0
  const cheerCount = item.cheer_count || 0
  const userLiked = item.user_liked || false
  const userCheered = item.user_cheered || false

  return `
    <div class="feed-card cls-${item.class || 'warrior'} ${extraClass}" data-id="${item.id}">
      <div class="feed-top">
        <div class="feed-avatar cls-${item.class || 'warrior'}">
          ${avatarHtml}
        </div>
        <div class="feed-body">
          <div class="feed-user-row">
            <span class="feed-username">${escHtml(item.username || '—')}</span>
            <span class="feed-class-badge cls-${item.class || 'warrior'}">${(item.class || '').toUpperCase()}</span>
            <span class="feed-rank">LV.${item.level || 1}</span>
            <span class="feed-time">${timeAgo}</span>
          </div>
          <div>${tag}</div>
          <div class="feed-content" style="margin-top:6px">${content}</div>
        </div>
      </div>
      ${data.proof_url ? `<div class="feed-proof"><img src="${escHtml(data.proof_url)}" alt="proof" loading="lazy"></div>` : ''}
      <div class="feed-actions">
        <button class="feed-action-btn like-btn${userLiked ? ' liked' : ''}" data-id="${item.id}" data-likes="${likeCount}" data-liked="${userLiked}">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 12s-5-3.5-5-6.5C2 3.57 3.57 2 5.5 2c.9 0 1.7.37 2.5 1 .8-.63 1.6-1 2.5-1C12.43 2 14 3.57 14 5.5c0 3-5 6.5-5 6.5" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
          <span class="like-count">${likeCount}</span>
        </button>
        <button class="feed-action-btn comment-toggle-btn" data-id="${item.id}">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2h10v8H7l-3 2V10H2z" stroke="currentColor" stroke-width="1.2"/></svg>
          <span class="comment-count">${commentCount > 0 ? commentCount : 'ความคิดเห็น'}</span>
        </button>
        <button class="feed-action-btn cheer-btn${userCheered ? ' cheered' : ''}" data-id="${item.id}" data-cheered="${userCheered}" style="margin-left:auto${userCheered ? ';color:var(--gold)' : ''}">
          <span id="cheer-icon-${item.id}"></span> <span class="cheer-label">${userCheered ? 'Cheered!' : 'Cheer'}</span>${cheerCount > 0 ? ` <span class="cheer-count">${cheerCount}</span>` : ''}
        </button>
      </div>
      <div class="comment-area" id="comments-${item.id}">
        <div class="comment-list" id="comment-list-${item.id}"></div>
        <div class="comment-input-wrap">
          <input class="comment-input" placeholder="เขียนความคิดเห็น..." id="comment-input-${item.id}">
          <button class="comment-send" onclick="sendComment('${item.id}')">ส่ง</button>
        </div>
      </div>
    </div>
  `
}

function attachCardListeners() {
  // Like buttons — real DB
  document.querySelectorAll('.like-btn').forEach(btn => {
    if (btn.dataset.bound) return
    btn.dataset.bound = '1'
    btn.addEventListener('click', async () => {
      const feedId = parseInt(btn.dataset.id)
      const liked = btn.dataset.liked === 'true'
      const countEl = btn.querySelector('.like-count')
      const cur = parseInt(btn.dataset.likes || 0)

      if (liked) {
        // Unlike
        await supabase.from('activity_feed_likes')
          .delete().eq('feed_id', feedId).eq('user_id', userId)
        btn.classList.remove('liked')
        btn.dataset.liked = 'false'
        btn.dataset.likes = cur - 1
        countEl.textContent = cur - 1
      } else {
        // Like
        await supabase.from('activity_feed_likes')
          .insert({ feed_id: feedId, user_id: userId })
        btn.classList.add('liked')
        btn.dataset.liked = 'true'
        btn.dataset.likes = cur + 1
        countEl.textContent = cur + 1
      }
    })
  })

  // Comment toggles — load comments from DB on open
  document.querySelectorAll('.comment-toggle-btn').forEach(btn => {
    if (btn.dataset.bound) return
    btn.dataset.bound = '1'
    btn.addEventListener('click', async () => {
      const feedId = btn.dataset.id
      const area = document.getElementById(`comments-${feedId}`)
      area.classList.toggle('open')
      if (area.classList.contains('open')) {
        await loadComments(feedId)
        area.querySelector('.comment-input').focus()
      }
    })
  })

  // Cheer buttons — real DB
  document.querySelectorAll('.cheer-btn').forEach(btn => {
    if (btn.dataset.bound) return
    btn.dataset.bound = '1'
    const id = btn.dataset.id
    const iconEl = btn.querySelector(`#cheer-icon-${id}`)
    if (iconEl) iconEl.innerHTML = getIcon('lightning', 14)
    if (btn.dataset.cheered === 'true') {
      if (iconEl) iconEl.innerHTML = getIcon('check_circle', 14)
      btn.disabled = true
    }
    btn.addEventListener('click', async () => {
      if (btn.dataset.cheered === 'true') return
      const feedId = parseInt(btn.dataset.id)
      const { error } = await supabase.from('activity_feed_cheers')
        .insert({ feed_id: feedId, user_id: userId })
      if (!error) {
        if (iconEl) iconEl.innerHTML = getIcon('check_circle', 14)
        btn.querySelector('.cheer-label').textContent = 'Cheered!'
        btn.style.color = 'var(--gold)'
        btn.dataset.cheered = 'true'
        btn.disabled = true
      }
    })
  })
}

async function loadComments(feedId) {
  const list = document.getElementById(`comment-list-${feedId}`)
  if (!list) return
  const { data: comments } = await supabase
    .from('activity_feed_comments')
    .select('id, content, user_id, created_at, reply_to_id, users(username, avatar_seed, avatar_url)')
    .eq('feed_id', feedId)
    .order('created_at', { ascending: true })
  if (!comments || comments.length === 0) return

  const topLevel = comments.filter(c => !c.reply_to_id)
  const replyMap = {}
  comments.filter(c => c.reply_to_id).forEach(r => {
    if (!replyMap[r.reply_to_id]) replyMap[r.reply_to_id] = []
    replyMap[r.reply_to_id].push(r)
  })

  function cHTML(c, isReply) {
    const u = c.users || {}
    const av = u.avatar_url || getAvatarUrl(u.avatar_seed || u.username, 24)
    const indent = isReply ? 'margin-left:32px;padding-left:8px;border-left:1px solid var(--border);' : ''
    const replyBtn = !isReply ? `<button onclick="toggleReply('${feedId}','${c.id}')" style="background:none;border:none;color:var(--text-dim);font-size:9px;font-family:'Orbitron',monospace;cursor:pointer;padding:2px 0;letter-spacing:1px">↩ ตอบ</button>` : ''
    const sub = !isReply && replyMap[c.id] ? replyMap[c.id].map(r => cHTML(r, true)).join('') : ''
    const replyInput = !isReply ? `<div id="ri-${c.id}" style="display:none;margin-left:32px;margin-top:4px;display:none;gap:6px">
      <input id="rinput-${c.id}" placeholder="ตอบกลับ..." style="flex:1;background:rgba(0,245,255,0.04);border:1px solid var(--border);color:var(--text);font-size:11px;padding:5px 8px;font-family:'Sarabun',sans-serif">
      <button onclick="sendReply('${feedId}','${c.id}')" style="background:rgba(0,245,255,0.15);border:1px solid var(--cyan);color:var(--cyan);padding:5px 10px;font-size:8px;font-family:'Orbitron',monospace;cursor:pointer">ส่ง</button>
    </div>` : ''
    return `<div style="${indent}display:flex;gap:8px;font-size:12px;margin-bottom:6px">
      <img src="${av}" style="width:${isReply?'20':'26'}px;height:${isReply?'20':'26'}px;border-radius:50%;object-fit:cover;border:1px solid var(--border);flex-shrink:0">
      <div style="flex:1">
        <span style="font-weight:700;color:var(--cyan);font-size:11px">${escHtml(u.username || '—')}</span>
        <span style="color:var(--text-dim)"> ${escHtml(c.content)}</span>
        ${replyBtn}
      </div>
    </div>${sub}${replyInput}`
  }

  list.innerHTML = topLevel.map(c => cHTML(c, false)).join('')
}

window.toggleReply = function(feedId, commentId) {
  const wrap = document.getElementById(`ri-${commentId}`)
  if (!wrap) return
  const isHidden = wrap.style.display === 'none' || wrap.style.display === ''
  wrap.style.display = isHidden ? 'flex' : 'none'
  if (isHidden) document.getElementById(`rinput-${commentId}`)?.focus()
}

window.sendReply = async function(feedId, replyToId) {
  const input = document.getElementById(`rinput-${replyToId}`)
  if (!input) return
  const val = input.value.trim()
  if (!val) return
  const { error } = await supabase.from('activity_feed_comments')
    .insert({ feed_id: parseInt(feedId), user_id: userId, content: val, reply_to_id: parseInt(replyToId) })
  if (error) return
  input.value = ''
  document.getElementById(`ri-${replyToId}`).style.display = 'none'
  await loadComments(feedId)
}

window.sendComment = async function(feedId) {
  const input = document.getElementById(`comment-input-${feedId}`)
  const val = input.value.trim()
  if (!val) return
  const btn = input.nextElementSibling
  btn.disabled = true
  btn.textContent = '...'

  const { error } = await supabase.from('activity_feed_comments')
    .insert({ feed_id: parseInt(feedId), user_id: userId, content: val })

  btn.disabled = false
  btn.textContent = 'ส่ง'
  if (error) return

  input.value = ''
  const list = document.getElementById(`comment-list-${feedId}`)
  list.insertAdjacentHTML('beforeend', `
    <div class="comment-item">
      <span class="comment-user">${escHtml(myUsername || 'คุณ')}</span>
      <span class="comment-text">${escHtml(val)}</span>
    </div>
  `)
  // update comment count badge
  const toggleBtn = document.querySelector(`.comment-toggle-btn[data-id="${feedId}"]`)
  if (toggleBtn) {
    const countEl = toggleBtn.querySelector('.comment-count')
    if (countEl) {
      const cur = parseInt(countEl.textContent) || 0
      countEl.textContent = cur + 1
    }
  }
}

// ===== FILTER =====
window.setFilter = function(filter, btn) {
  currentFilter = filter
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  loadFeed(true)
}

// ===== LOAD MORE =====
window.loadMore = async function() {
  const spinner = document.getElementById('loadSpinner')
  const text = document.getElementById('loadMoreText')
  spinner.style.display = 'block'
  text.textContent = 'กำลังโหลด...'
  await loadFeed(false)
  spinner.style.display = 'none'
  text.textContent = 'โหลดเพิ่มเติม'
}

// ===== REALTIME =====
function subscribeRealtime() {
  supabase
    .channel('feed-realtime')
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'activity_feed'
    }, async (payload) => {
      // fetch full data with user info
      const { data: item } = await supabase
        .from('social_feed_view')
        .select('*')
        .eq('id', payload.new.id)
        .single()

      if (!item) return

      // FIX: filter check ครบทุก mode
      if (currentFilter === 'city' && item.city !== myCity) return

      if (currentFilter === 'following') {
        const { data: follows } = await supabase
          .from('social_follows').select('following_id').eq('follower_id', userId)
        const ids = (follows || []).map(f => f.following_id)
        if (!ids.includes(item.user_id)) return
      }

      if (currentFilter === 'guild') {
        const { data: gm } = await supabase
          .from('guild_members').select('guild_id').eq('user_id', userId).maybeSingle()
        if (!gm) return
        const { data: gmembers } = await supabase
          .from('guild_members').select('user_id').eq('guild_id', gm.guild_id)
        const ids = (gmembers || []).map(m => m.user_id)
        if (!ids.includes(item.user_id)) return
      }

      // new items จาก realtime ยังไม่มี like/cheer — ใส่ค่า default
      const enrichedItem = { ...item, like_count: 0, comment_count: 0, cheer_count: 0, user_liked: false, user_cheered: false }
      const html = renderFeedCard(enrichedItem)
      document.getElementById('feedList').insertAdjacentHTML('afterbegin', html)
      attachCardListeners()
    })
    .subscribe()
}

// ===== HELPERS =====
function getTimeAgo(ts) {
  const diff = (Date.now() - new Date(ts)) / 1000
  if (diff < 60) return 'เมื่อกี้'
  if (diff < 3600) return `${Math.floor(diff / 60)} นาทีที่แล้ว`
  if (diff < 86400) return `${Math.floor(diff / 3600)} ชม.ที่แล้ว`
  return `${Math.floor(diff / 86400)} วันที่แล้ว`
}

function getClassEmoji(cls) {
  const map = { warrior:'sword', mage:'xp', explorer:'compass', merchant:'gold', artist:'diamond', diplomat:'diplo_stat' }
  return getIcon(map[cls] || 'person', 14)
}

function escHtml(str) {
  if (!str) return ''
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

<script>
// CURSOR
const cursor = document.getElementById('cursor')
const ring = document.getElementById('cursorRing')
let mx=0, my=0, rx=0, ry=0
document.addEventListener('mousemove', e => {
  mx=e.clientX; my=e.clientY
  cursor.style.left=mx+'px'; cursor.style.top=my+'px'
})
function animRing() {
  rx += (mx-rx)*0.12; ry += (my-ry)*0.12
  ring.style.left=rx+'px'; ring.style.top=ry+'px'
  requestAnimationFrame(animRing)
}
animRing()
</script>
