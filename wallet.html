<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEXUS LIFE — Wallet</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--cyan:#00f5ff;--cyan-dim:#00a8b5;--gold:#ffd700;--red:#ff003c;--green:#44ff88;--purple:#b044ff;--bg:#010a0f;--bg2:#020d14;--panel:rgba(0,245,255,0.04);--border:rgba(0,245,255,0.12);--text:#c8f0f5;--text-dim:#5a8a90}
.cls-warrior{--cls:#ff4444}.cls-mage{--cls:#aa44ff}.cls-explorer{--cls:#44ff88}.cls-merchant{--cls:#ffaa00}.cls-artist{--cls:#ff66aa}.cls-diplomat{--cls:#00ccff}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;overflow-x:hidden;cursor:none;min-height:100vh}
.cursor{position:fixed;width:10px;height:10px;background:var(--cyan);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--cyan)}
.cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(0,245,255,0.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all 0.12s ease}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:1000}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.025) 1px,transparent 1px);background-size:60px 60px;z-index:0}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.orb-1{width:500px;height:500px;background:rgba(0,245,255,0.04);top:-150px;right:-100px}
.orb-2{width:300px;height:300px;background:rgba(176,68,255,0.04);bottom:100px;left:-50px}
/* MAIN */
.main{margin-left:220px;min-height:100vh;position:relative;z-index:1;padding:32px 28px 60px}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;animation:fadeInDown 0.5s ease both;flex-wrap:wrap;gap:12px}
.page-title{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#fff;display:flex;align-items:center;gap:12px}
.page-title span{color:var(--cyan)}
.page-date{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:var(--text-dim);margin-top:4px}
/* BALANCE CARDS */
.balance-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:28px;animation:fadeInDown 0.4s ease both}
.balance-card{background:var(--panel);border:1px solid var(--border);padding:24px;position:relative;overflow:hidden;transition:all 0.3s}
.balance-card:hover{transform:translateY(-2px)}
.balance-card.gold{border-color:rgba(255,215,0,0.25);background:rgba(255,215,0,0.03)}
.balance-card.crystal{border-color:rgba(0,245,255,0.25);background:rgba(0,245,255,0.03)}
.balance-card.spent{border-color:rgba(255,0,60,0.2);background:rgba(255,0,60,0.02)}
.balance-card.earned{border-color:rgba(68,255,136,0.2);background:rgba(68,255,136,0.02)}
.balance-label{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:3px;color:var(--text-dim);margin-bottom:10px}
.balance-amount{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;line-height:1}
.balance-card.gold .balance-amount{color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,0.3)}
.balance-card.crystal .balance-amount{color:var(--cyan);text-shadow:0 0 20px rgba(0,245,255,0.3)}
.balance-card.spent .balance-amount{color:var(--red)}
.balance-card.earned .balance-amount{color:var(--green)}
.balance-sub{font-family:'Orbitron',monospace;font-size:9px;color:var(--text-dim);margin-top:6px}
.balance-card-icon{position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:36px;opacity:0.12}
/* TOPUP BTN */
.btn-topup{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:linear-gradient(135deg,rgba(0,245,255,0.15),rgba(176,68,255,0.1));border:1px solid var(--cyan);color:var(--cyan);font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;cursor:pointer;transition:all 0.3s;text-decoration:none;margin-bottom:28px}
.btn-topup:hover{background:rgba(0,245,255,0.2);box-shadow:0 0 20px rgba(0,245,255,0.2)}
/* FILTER TABS */
.filter-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-tab{padding:8px 16px;background:var(--panel);border:1px solid var(--border);color:var(--text-dim);font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;cursor:pointer;transition:all 0.25s}
.filter-tab:hover{border-color:var(--cyan);color:var(--cyan)}
.filter-tab.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,245,255,0.08)}
/* TX LIST */
.tx-panel{background:var(--panel);border:1px solid var(--border);animation:fadeInUp 0.5s ease both}
.tx-panel-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.tx-panel-title{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:#fff;letter-spacing:2px}
.tx-count{font-family:'Orbitron',monospace;font-size:9px;color:var(--text-dim)}
.tx-row{display:flex;align-items:center;gap:16px;padding:16px 20px;border-bottom:1px solid rgba(0,245,255,0.05);transition:background 0.2s}
.tx-row:last-child{border-bottom:none}
.tx-row:hover{background:rgba(0,245,255,0.03)}
.tx-icon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid var(--border);flex-shrink:0;background:var(--panel)}
.tx-icon.topup{border-color:rgba(68,255,136,0.3);background:rgba(68,255,136,0.05)}
.tx-icon.spend{border-color:rgba(255,0,60,0.3);background:rgba(255,0,60,0.05)}
.tx-icon.bonus{border-color:rgba(255,215,0,0.3);background:rgba(255,215,0,0.05)}
.tx-icon.refund{border-color:rgba(176,68,255,0.3);background:rgba(176,68,255,0.05)}
.tx-info{flex:1;min-width:0}
.tx-title{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:#fff;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:11px;color:var(--text-dim)}
.tx-date{font-family:'Orbitron',monospace;font-size:8px;color:var(--text-dim);flex-shrink:0;text-align:right}
.tx-amount{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;flex-shrink:0;text-align:right;min-width:80px}
.tx-amount.plus{color:var(--green)}
.tx-amount.minus{color:var(--red)}
.tx-status{font-family:'Orbitron',monospace;font-size:7px;letter-spacing:1px;padding:3px 8px;border:1px solid currentColor;margin-top:3px;display:inline-block}
.tx-status.pending{color:#ffaa00;border-color:rgba(255,170,0,0.4)}
.tx-status.completed{color:var(--green);border-color:rgba(68,255,136,0.4)}
.tx-status.failed{color:var(--red);border-color:rgba(255,0,60,0.4)}
.tx-status.refunded{color:var(--purple);border-color:rgba(176,68,255,0.4)}
/* PURCHASES */
.purchase-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-top:0}
.purchase-card{background:var(--panel);border:1px solid var(--border);padding:16px;display:flex;gap:12px;align-items:flex-start;transition:all 0.3s}
.purchase-card:hover{border-color:rgba(0,245,255,0.25)}
.purchase-card-icon{font-size:28px;flex-shrink:0}
.purchase-card-name{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;color:#fff;margin-bottom:4px;line-height:1.3}
.purchase-card-cost{font-family:'Orbitron',monospace;font-size:9px;color:var(--cyan)}
.purchase-card-date{font-size:10px;color:var(--text-dim);margin-top:2px}
.purchase-card-exp{font-family:'Orbitron',monospace;font-size:8px;color:var(--gold);margin-top:4px}
.purchase-card-expired{font-family:'Orbitron',monospace;font-size:8px;color:var(--red);margin-top:4px}
/* SECTION */
.section-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.section-hdr-title{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:#fff;letter-spacing:2px}
.section-hdr-line{flex:1;height:1px;background:var(--border)}
/* EMPTY */
.empty-state{text-align:center;padding:48px 20px;color:var(--text-dim)}
.empty-icon{font-size:32px;margin-bottom:10px;opacity:0.4}
.empty-text{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px}
/* DAILY LIMIT */
.daily-limit-bar{background:var(--panel);border:1px solid var(--border);padding:16px 20px;margin-bottom:28px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.daily-limit-label{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:var(--text-dim);flex-shrink:0}
.daily-limit-track{flex:1;min-width:120px;height:6px;background:rgba(0,245,255,0.08);position:relative}
.daily-limit-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--purple));transition:width 0.5s}
.daily-limit-text{font-family:'Orbitron',monospace;font-size:9px;color:var(--cyan);flex-shrink:0}
@media(max-width:768px){
  .main{margin-left:0;padding:80px 16px 60px}
  .balance-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="grid-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>


  <button class="burger" onclick="openSidebar()"><span></span><span></span><span></span></button>
</div>

<!-- MAIN -->
<div id="sidebar-root"></div>
<main class="main">
  <div class="page-header">
    <div>
      <div class="page-title">💎 <span>WALLET</span></div>
      <div class="page-date" id="pageDate">—</div>
    </div>
    <a class="btn-topup" href="./topup.html">+ เติม Crystal</a>
  </div>

  <!-- BALANCE CARDS -->
  <div class="balance-grid">
    <div class="balance-card crystal">
      <div class="balance-label">// CRYSTAL BALANCE</div>
      <div class="balance-amount" id="crystalBalance">0</div>
      <div class="balance-sub">Crystal คงเหลือ</div>
      <div class="balance-card-icon">💎</div>
    </div>
    <div class="balance-card gold">
      <div class="balance-label">// GOLD BALANCE</div>
      <div class="balance-amount" id="goldBalance">0</div>
      <div class="balance-sub">Gold จาก Gameplay</div>
      <div class="balance-card-icon">⭐</div>
    </div>
    <div class="balance-card earned">
      <div class="balance-label">// CRYSTAL PURCHASED</div>
      <div class="balance-amount" id="crystalPurchased">0</div>
      <div class="balance-sub">ซื้อด้วยเงินจริงทั้งหมด</div>
      <div class="balance-card-icon">💰</div>
    </div>
    <div class="balance-card spent">
      <div class="balance-label">// CRYSTAL SPENT</div>
      <div class="balance-amount" id="crystalSpent">0</div>
      <div class="balance-sub">ใช้ไปในร้านค้า</div>
      <div class="balance-card-icon">🛒</div>
    </div>
  </div>

  <!-- DAILY LIMIT -->
  <div class="daily-limit-bar">
    <div class="daily-limit-label">// วงเงินเติมวันนี้</div>
    <div class="daily-limit-track"><div class="daily-limit-fill" id="dailyLimitFill" style="width:0%"></div></div>
    <div class="daily-limit-text"><span id="dailyUsed">0</span> / 3,000 ฿</div>
  </div>

  <!-- FILTER TABS -->
  <div class="filter-tabs">
    <button class="filter-tab active" onclick="filterTx('all',this)">ALL</button>
    <button class="filter-tab" onclick="filterTx('topup',this)">💚 เติมเงิน</button>
    <button class="filter-tab" onclick="filterTx('spend',this)">🔴 ใช้จ่าย</button>
    <button class="filter-tab" onclick="filterTx('bonus',this)">⭐ โบนัส</button>
    <button class="filter-tab" onclick="filterTx('refund',this)">🔄 คืนเงิน</button>
  </div>

  <!-- TRANSACTION LIST -->
  <div class="section-hdr" style="margin-bottom:12px">
    <div class="section-hdr-title">TRANSACTION HISTORY</div>
    <div class="section-hdr-line"></div>
    <div style="font-family:'Orbitron',monospace;font-size:9px;color:var(--text-dim)" id="txCountLabel">—</div>
  </div>
  <div class="tx-panel">
    <div id="txList"><div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">ยังไม่มีรายการ</div></div></div>
  </div>

  <!-- PURCHASES -->
  <div style="margin-top:32px">
    <div class="section-hdr">
      <div class="section-hdr-title">MY PURCHASES</div>
      <div class="section-hdr-line"></div>
      <div style="font-family:'Orbitron',monospace;font-size:9px;color:var(--text-dim)" id="purchaseCountLabel">—</div>
    </div>
    <div class="purchase-grid" id="purchaseGrid">
      <div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🛒</div><div class="empty-text">ยังไม่ได้ซื้ออะไร</div></div>
    </div>
  </div>
</main>

<script type="module">
import { supabase } from './supabase.js'
import { initSidebar } from './sidebar.js'
import { getIcon } from './icons.js'

let currentUser = null
let allTx = []
let currentFilter = 'all'

function getAvatarUrl(avatarSeed, size = 80) {
  if (!avatarSeed) return `https://api.dicebear.com/9.x/pixel-art/svg?seed=nexus&size=${size}`
  const parts = avatarSeed.split(':')
  if (parts.length === 3) {
    const [style, seed, bg] = parts
    return `https://api.dicebear.com/9.x/${style}/svg?seed=${encodeURIComponent(seed)}&backgroundColor=${bg}&size=${size}`
  }
  return `https://api.dicebear.com/9.x/pixel-art/svg?seed=${encodeURIComponent(avatarSeed)}&size=${size}`
}

function initCursor() {
  const c = document.getElementById('cursor'), r = document.getElementById('cursorRing')
  document.addEventListener('mousemove', e => {
    c.style.left = e.clientX+'px'; c.style.top = e.clientY+'px'
    r.style.left = e.clientX+'px'; r.style.top = e.clientY+'px'
  })
}

function updateDate() {
  const d = new Date()
  document.getElementById('pageDate').textContent =
    `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`
}



function fmtDate(iso) {
  if (!iso) return '—'
  const d = new Date(iso)
  return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`
}

const txIcon = { topup: getIcon('crystal',20), spend: getIcon('cart',20), bonus: getIcon('gift',20), refund: getIcon('refresh',20), gift: getIcon('gift',20) }
const txLabel = { topup:'เติม Crystal', spend:'ซื้อของ', bonus:'โบนัส', refund:'คืนเงิน', gift:'ของขวัญ' }

function renderTxList() {
  const list = document.getElementById('txList')
  const filtered = currentFilter === 'all' ? allTx : allTx.filter(t => t.type === currentFilter)
  document.getElementById('txCountLabel').textContent = `${filtered.length} รายการ`

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">ไม่มีรายการ</div></div>`
    return
  }

  list.innerHTML = filtered.map(tx => {
    const isPlus = tx.type === 'topup' || tx.type === 'bonus' || tx.type === 'refund'
    const amountSign = isPlus ? '+' : '-'
    const amountClass = isPlus ? 'plus' : 'minus'
    return `
      <div class="tx-row">
        <div class="tx-icon ${tx.type}">${txIcon[tx.type] || getIcon('diamond',20)}</div>
        <div class="tx-info">
          <div class="tx-title">${txLabel[tx.type] || tx.type}</div>
          <div class="tx-meta">
            ${tx.amount_thb ? `฿${tx.amount_thb.toLocaleString()} → ` : ''}
            <span class="tx-status ${tx.status}">${tx.status.toUpperCase()}</span>
          </div>
        </div>
        <div>
          <div class="tx-amount ${amountClass}">${amountSign}${tx.crystal_amount} 💎</div>
          <div class="tx-date">${fmtDate(tx.created_at)}</div>
        </div>
      </div>`
  }).join('')
}

window.filterTx = function(type, btn) {
  currentFilter = type
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  renderTxList()
}

function getItemIcon(item) {
  if (!item) return getIcon('package', 20)
  const meta = item.metadata || {}
  if (item.category === 'pet') return meta.emoji || getIcon('paw', 20)
  if (item.category === 'booster') return getIcon('quest_challenge', 20)
  if (item.category === 'season_pass') return meta.tier === 'premium' ? getIcon('crown', 20) : getIcon('star', 20)
  if (item.category === 'frame') return getIcon('frame', 20)
  if (item.category === 'utility') return getIcon('wrench', 20)
  return getIcon('camera', 20)
}

function renderPurchases(purchases, items) {
  const grid = document.getElementById('purchaseGrid')
  const now = new Date()

  // FIX: แยก active vs expired
  const active  = purchases.filter(p => !p.expires_at || new Date(p.expires_at) > now)
  const expired = purchases.filter(p => p.expires_at && new Date(p.expires_at) <= now)
  const display = [...active, ...expired]

  document.getElementById('purchaseCountLabel').textContent = `${active.length} รายการ (active)`

  if (!display.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🛒</div><div class="empty-text">ยังไม่ได้ซื้ออะไร</div></div>`
    return
  }

  grid.innerHTML = display.map(p => {
    const item = items.find(i => i.id === p.item_id)
    const icon = getItemIcon(item)
    const isExpired = p.expires_at && new Date(p.expires_at) <= now
    return `
      <div class="purchase-card" style="${isExpired ? 'opacity:0.45;filter:grayscale(0.7)' : ''}">
        <div class="purchase-card-icon">${icon}</div>
        <div>
          <div class="purchase-card-name">${item?.name || 'Unknown Item'}</div>
          <div class="purchase-card-cost">${getIcon('crystal',13)} ${p.crystal_spent}</div>
          <div class="purchase-card-date">${fmtDate(p.purchased_at)}</div>
          ${p.expires_at
            ? isExpired
              ? `<div class="purchase-card-expired">หมดอายุแล้ว</div>`
              : `<div class="purchase-card-exp">หมดอายุ: ${fmtDate(p.expires_at)}</div>`
            : ''
          }
        </div>
      </div>`
  }).join('')
}

async function init() {
  initCursor()
  updateDate()

  try {
    const { user } = await initSidebar('wallet')
    if (!user) return
    currentUser = user

    const [profileRes, walletRes, txRes, purchasesRes, itemsRes] = await Promise.all([
      supabase.from('users').select('*').eq('id', currentUser.id).single(),
      supabase.from('wallet').select('*').eq('user_id', currentUser.id).maybeSingle(),
      supabase.from('transactions').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false }).limit(200),
      supabase.from('user_purchases').select('*').eq('user_id', currentUser.id).eq('is_active', true).order('purchased_at', { ascending: false }),
      supabase.from('shop_items').select('*')
    ])

    const profile = profileRes.data
    const wallet = walletRes.data
    allTx = txRes.data || []
    const purchases = purchasesRes.data || []
    const items = itemsRes.data || []

    if (profile)

    // ✅ BUG FIX: fallback city ป้องกัน null ทำให้ query คืนผลผิด
    const userCity = profile?.city || 'กรุงเทพมหานคร'
    // navVerifyBadge — นับ quest ของคนอื่นในเมืองเดียวกัน ที่รอ verify และยังไม่เคย vote
    const { data: pendingInCity } = await supabase
      .from('user_quests')
      .select('id, users!inner(city)')
      .eq('status', 'pending_review')
      .eq('users.city', userCity)
      .neq('user_id', currentUser.id)
    const { data: alreadyVoted } = await supabase
      .from('quest_verifications')
      .select('user_quest_id')
      .eq('voter_id', currentUser.id)
    const votedSet = new Set((alreadyVoted || []).map(v => v.user_quest_id))
    const verifyCount = (pendingInCity || []).filter(p => !votedSet.has(p.id)).length
    if (verifyCount > 0) {
      const badge = document.getElementById('navVerifyBadge')
      badge.style.display = 'inline'
      badge.textContent = verifyCount > 99 ? '99+' : verifyCount
    }

    // navQuestBadge — นับ quest ที่ยัง in_progress
    const { count: questCount } = await supabase
      .from('user_quests')
      .select('*', { count: 'exact', head: true })
      .eq('user_id', currentUser.id)
      .eq('status', 'in_progress')
    if (questCount > 0) {
      const qb = document.getElementById('navQuestBadge')
      qb.textContent = questCount > 99 ? '99+' : questCount
      qb.style.display = 'inline'
    }

    document.getElementById('crystalBalance').textContent = (profile?.crystal || 0).toLocaleString()
    document.getElementById('goldBalance').textContent = (profile?.gold || 0).toLocaleString()
    document.getElementById('crystalPurchased').textContent = (wallet?.crystal_purchased || 0).toLocaleString()
    document.getElementById('crystalSpent').textContent = (wallet?.crystal_spent || 0).toLocaleString()

    // daily limit — ยอดเติมวันนี้
    const today = new Date().toISOString().slice(0, 10)
    const todayTotal = allTx
      .filter(t => t.type === 'topup' && t.status === 'completed' && t.created_at?.startsWith(today))
      .reduce((s, t) => s + (t.amount_thb || 0), 0)
    const limitPct = Math.min(100, (todayTotal / 3000) * 100)
    document.getElementById('dailyUsed').textContent = todayTotal.toLocaleString()
    document.getElementById('dailyLimitFill').style.width = limitPct + '%'

    renderTxList()
    renderPurchases(purchases, items)
  } catch (err) {
    console.error('Wallet init error:', err)
    const txList = document.getElementById('txList')
    if (txList) txList.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">ไม่สามารถโหลดข้อมูลได้ในขณะนี้</div></div>'
  }
}

init()
</script>
</body>
</html>
