<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEXUS LIFE — Quests</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --cyan:#00f5ff; --cyan-dim:#00a8b5; --gold:#ffd700; --red:#ff003c;
  --green:#44ff88; --purple:#b044ff; --orange:#ff9500;
  --bg:#010a0f; --bg2:#020d14;
  --panel:rgba(0,245,255,0.04); --border:rgba(0,245,255,0.12);
  --text:#c8f0f5; --text-dim:#5a8a90;
}
.cls-warrior{--cls:#ff4444} .cls-mage{--cls:#aa44ff} .cls-explorer{--cls:#44ff88}
.cls-merchant{--cls:#ffaa00} .cls-artist{--cls:#ff66aa} .cls-diplomat{--cls:#00ccff}

*{margin:0;padding:0;box-sizing:border-box} html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;overflow-x:hidden;cursor:none;min-height:100vh}
.cursor{position:fixed;width:10px;height:10px;background:var(--cyan);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--cyan)}
.cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(0,245,255,0.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all 0.12s ease}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:1000}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.025) 1px,transparent 1px);background-size:60px 60px;z-index:0}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.orb-1{width:500px;height:500px;background:rgba(0,245,255,0.04);top:-150px;right:-100px}
.orb-2{width:300px;height:300px;background:rgba(176,68,255,0.04);bottom:100px;left:-50px}



/* MAIN */
.main{margin-left:220px;min-height:100vh;position:relative;z-index:1;padding:32px 28px 80px}

/* PAGE HEADER */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;animation:fadeInDown 0.5s ease both;flex-wrap:wrap;gap:12px}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.page-title{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#fff;display:flex;align-items:center;gap:12px}
.page-title span{color:var(--cyan)}
.page-sub{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:var(--text-dim);margin-top:4px}
.reset-badge{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;padding:8px 16px;border:1px solid var(--border);color:var(--text-dim);background:var(--panel)}

/* TABS */
.tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--border);animation:fadeInUp 0.5s 0.05s ease both}
.tab-btn{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;padding:12px 20px;background:transparent;border:none;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.25s;display:flex;align-items:center;gap:8px}
.tab-btn:hover{color:var(--cyan)}
.tab-btn.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab-count{font-size:8px;padding:2px 7px;background:rgba(0,245,255,0.1);border:1px solid rgba(0,245,255,0.2);border-radius:10px}
.tab-count.red{background:rgba(255,0,60,0.1);border-color:rgba(255,0,60,0.2);color:var(--red)}
.tab-count.gold{background:rgba(255,215,0,0.1);border-color:rgba(255,215,0,0.2);color:var(--gold)}
.tab-count.green{background:rgba(68,255,136,0.1);border-color:rgba(68,255,136,0.2);color:var(--green)}

/* PROGRESS BAR */
.progress-banner{background:rgba(0,245,255,0.02);border:1px solid var(--border);padding:16px 20px;margin-bottom:20px;animation:fadeInUp 0.5s 0.08s ease both}
.pb-left{flex-shrink:0;text-align:center}
.pb-circle{width:56px;height:56px;position:relative}
.pb-circle svg{transform:rotate(-90deg)}
.pb-circle-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:14px;font-weight:900;color:var(--cyan)}
.pb-info{width:100%}
.pb-label{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:var(--text-dim);margin-bottom:8px}
.pb-track{height:4px;background:rgba(0,245,255,0.08);margin-bottom:4px;overflow:hidden}
.pb-fill{height:100%;background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));transition:width 1s ease}
.pb-stats{display:flex;gap:0;margin-top:12px}
.pb-stat{font-family:'Orbitron',monospace;font-size:8px;color:var(--text-dim);display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;padding:8px 0;border:1px solid var(--border);border-right:none;background:rgba(0,245,255,0.02)}
.pb-stat:last-child{border-right:1px solid var(--border)}
.pb-stat span{color:var(--cyan);font-size:18px;font-weight:900;line-height:1}
.pb-xp{font-family:'Orbitron',monospace;font-size:13px;font-weight:900;color:var(--gold);text-align:right;margin-top:10px}

/* FILTER ROW */
.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;animation:fadeInUp 0.5s 0.1s ease both}
.filter-btn{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;padding:7px 14px;background:transparent;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;transition:all 0.2s}
.filter-btn.active,.filter-btn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,245,255,0.06)}
.filter-btn.cls-active{border-color:var(--cls);color:var(--cls);background:rgba(0,245,255,0.04)}

/* QUEST GRID */
.quest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;animation:fadeInUp 0.5s 0.12s ease both}

/* QUEST CARD */
.qcard{background:rgba(0,245,255,0.02);border:1px solid var(--border);padding:0;position:relative;overflow:hidden;transition:all 0.25s;cursor:pointer}
.qcard:hover{border-color:rgba(0,245,255,0.28);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,245,255,0.06)}
.qcard.done{opacity:0.55}
.qcard.pending{opacity:0.75}
.qcard-accent{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cls,var(--cyan))}
.qcard-body{padding:16px 16px 16px 20px;display:flex;align-items:flex-start;gap:14px}
.qcard-icon{width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:rgba(0,245,255,0.06);border:1px solid var(--border);font-size:22px;flex-shrink:0}
.qcard-info{flex:1;min-width:0}
.qcard-type-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.qcard-type{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:2px;padding:2px 8px;border:1px solid;opacity:0.8}
.qcard-type.daily{color:var(--cyan);border-color:rgba(0,245,255,0.3)}
.qcard-type.weekly{color:var(--orange);border-color:rgba(255,149,0,0.3)}
.qcard-type.challenge{color:var(--purple);border-color:rgba(176,68,255,0.3)}
.qcard-type.guild{color:var(--green);border-color:rgba(68,255,136,0.3)}
.qcard-cls-badge{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1px;color:var(--cls,var(--cyan))}
.qcard-title{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:#fff;margin-bottom:5px;line-height:1.4}
.qcard-desc{font-size:12px;color:var(--text-dim);line-height:1.6;margin-bottom:10px}
.qcard-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.qtag{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1px;padding:3px 8px;border:1px solid}
.qtag.xp{color:var(--gold);border-color:rgba(255,215,0,0.25);background:rgba(255,215,0,0.06)}
.qtag.gold{color:#ffaa00;border-color:rgba(255,170,0,0.25);background:rgba(255,170,0,0.06)}
.qtag.stat{color:var(--green);border-color:rgba(68,255,136,0.25);background:rgba(68,255,136,0.06)}
.qtag.proof{color:var(--text-dim);border-color:var(--border)}

.qcard-footer{border-top:1px solid var(--border);padding:10px 16px 10px 20px;display:flex;align-items:center;justify-content:space-between}
.qstatus{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px}
.qstatus.todo{color:var(--text-dim)}
.qstatus.pending{color:var(--gold)}
.qstatus.approved{color:var(--green)}
.qstatus.rejected{color:var(--red)}

.qbtn{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;padding:7px 16px;border:1px solid var(--cyan);color:var(--cyan);background:transparent;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.qbtn:hover{background:var(--cyan);color:var(--bg)}
.qbtn.done-btn{border-color:var(--green);color:var(--green);cursor:default}
.qbtn.done-btn:hover{background:transparent;color:var(--green)}
.qbtn.pending-btn{border-color:var(--gold);color:var(--gold);cursor:default}
.qbtn.pending-btn:hover{background:transparent;color:var(--gold)}

/* VOTE COUNT */
.vote-bar{display:flex;align-items:center;gap:8px;padding:6px 16px 10px 20px;border-top:1px solid var(--border)}
.vote-pips{display:flex;gap:4px}
.vote-pip{width:18px;height:18px;border-radius:50%;border:1px solid rgba(68,255,136,0.3);background:transparent;transition:all 0.3s;display:flex;align-items:center;justify-content:center;font-size:9px}
.vote-pip.filled{background:rgba(68,255,136,0.2);border-color:var(--green)}
.vote-label{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1px;color:var(--text-dim)}
.vote-label span{color:var(--green)}
.qbtn.rejected-btn{border-color:var(--red);color:var(--red)}
.qbtn.rejected-btn:hover{background:var(--red);color:#fff}

/* WEEKLY QUEST SPECIAL */
.qcard.weekly-card{background:rgba(255,149,0,0.03);border-color:rgba(255,149,0,0.2)}
.qcard.weekly-card:hover{border-color:rgba(255,149,0,0.4)}
.weekly-progress{padding:0 16px 12px 20px}
.weekly-track{height:3px;background:rgba(255,149,0,0.1);overflow:hidden}
.weekly-fill{height:100%;background:linear-gradient(90deg,#ff6600,var(--orange));transition:width 0.8s ease}
.weekly-label{font-family:'Orbitron',monospace;font-size:8px;color:var(--text-dim);margin-top:4px}

/* EMPTY */
.empty-state{grid-column:1/-1;text-align:center;padding:64px 20px}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.3}
.empty-txt{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;color:var(--text-dim);margin-bottom:8px}
.empty-sub{font-size:13px;color:var(--text-dim);opacity:0.6}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:var(--bg);z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loading-logo{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;letter-spacing:4px;color:var(--cyan);text-shadow:0 0 20px var(--cyan)}
.loading-bar-wrap{width:200px;height:2px;background:var(--border)}
.loading-bar{height:100%;background:var(--cyan);animation:loadAnim 1.2s ease-in-out infinite}
@keyframes loadAnim{0%{width:0}50%{width:70%}100%{width:100%}}
.loading-txt{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:3px;color:var(--text-dim)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:500;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);width:100%;max-width:500px;position:relative;animation:fadeInUp 0.3s ease both;max-height:90vh;overflow-y:auto}
.modal::before{content:'';position:absolute;top:-1px;left:-1px;width:16px;height:16px;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan)}
.modal::after{content:'';position:absolute;bottom:-1px;right:-1px;width:16px;height:16px;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:10}
.modal-title{font-family:'Orbitron',monospace;font-size:12px;letter-spacing:2px;color:var(--cyan)}
.modal-close{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:20px;line-height:1;transition:color 0.2s;padding:4px}
.modal-close:hover{color:var(--red)}
.modal-body{padding:24px}

.modal-cls-bar{height:3px;width:100%;margin-bottom:20px}
.modal-quest-title{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;color:#fff;margin-bottom:6px;line-height:1.3}
.modal-quest-desc{font-size:13px;color:var(--text-dim);line-height:1.7;margin-bottom:16px}
.modal-reward-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.mreward{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;padding:6px 14px;border:1px solid}
.mreward.xp{color:var(--gold);border-color:rgba(255,215,0,0.3);background:rgba(255,215,0,0.06)}
.mreward.gold{color:#ffaa00;border-color:rgba(255,170,0,0.3);background:rgba(255,170,0,0.06)}
.mreward.stat{color:var(--green);border-color:rgba(68,255,136,0.3);background:rgba(68,255,136,0.06)}

.proof-label{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:var(--text-dim);margin-bottom:10px;display:block}

.upload-zone{border:2px dashed rgba(0,245,255,0.18);padding:36px;text-align:center;cursor:pointer;transition:all 0.3s;margin-bottom:16px;position:relative;overflow:hidden}
.upload-zone:hover,.upload-zone.drag{border-color:var(--cyan);background:rgba(0,245,255,0.04)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-zone-icon{font-size:36px;margin-bottom:10px}
.upload-zone-txt{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;color:var(--text-dim)}
.upload-zone-sub{font-size:11px;color:var(--text-dim);opacity:0.6;margin-top:4px}
.preview-img{width:100%;max-height:220px;object-fit:cover;display:none;margin-bottom:12px;border:1px solid var(--border)}

.text-area{width:100%;background:rgba(0,245,255,0.03);border:1px solid var(--border);color:var(--text);font-family:'Sarabun',sans-serif;font-size:13px;padding:12px;outline:none;resize:vertical;min-height:100px;transition:border-color 0.3s;line-height:1.6}
.text-area:focus{border-color:var(--cyan)}
.text-area-count{font-family:'Orbitron',monospace;font-size:8px;color:var(--text-dim);text-align:right;margin-top:4px;margin-bottom:16px}

.modal-msg{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:1px;padding:10px 14px;margin-bottom:14px;border-left:3px solid;display:none;line-height:1.5}
.modal-msg.error{border-color:var(--red);color:#ff6680;background:rgba(255,0,60,0.08)}
.modal-msg.success{border-color:var(--green);color:var(--green);background:rgba(68,255,136,0.06)}
.modal-msg.show{display:block}

.submit-btn{width:100%;font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;padding:14px;background:var(--cyan);color:var(--bg);border:none;cursor:pointer;font-weight:700;transition:all 0.3s}
.submit-btn:hover{background:#00d4e0}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;z-index:2000;font-family:'Orbitron',monospace;font-size:10px;letter-spacing:1px;padding:14px 20px;border-left:3px solid var(--cyan);background:rgba(1,10,15,0.97);border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border);color:var(--cyan);transform:translateX(120%);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);max-width:300px;line-height:1.5}
.toast.show{transform:translateX(0)}
.toast.success{border-left-color:var(--green);color:var(--green)}
.toast.error{border-left-color:var(--red);color:#ff6680}
.toast.gold{border-left-color:var(--gold);color:var(--gold)}

/* BOX */
.box{background:rgba(0,245,255,0.02);border:1px solid var(--border);position:relative}
.box::before{content:'';position:absolute;top:-1px;left:-1px;width:14px;height:14px;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan)}
.box::after{content:'';position:absolute;bottom:-1px;right:-1px;width:14px;height:14px;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan)}

@media(max-width:768px){
  .main{margin-left:0;padding:80px 16px 80px}
  .quest-grid{grid-template-columns:1fr}
  .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tab-btn{white-space:nowrap}
}
@media(max-width:1100px){
  .quest-grid{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">NEXUS LIFE</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
  <div class="loading-txt">LOADING QUESTS...</div>
</div>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="grid-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div id="sidebar-root"></div>

<!-- MAIN -->
<main class="main">
  <div class="page-header">
    <div>
      <div class="page-title">// <span>QUESTS</span></div>
      <div class="page-sub" id="pageSub">—</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <div class="reset-badge" id="resetBadge">⏱ Daily รีเซ็ตใน —</div>
      <div class="reset-badge" id="weeklyResetBadge" style="border-color:rgba(255,149,0,0.3);color:var(--orange);display:inline-flex;align-items:center;gap:6px"><span id="weeklyResetIcon"></span><span id="weeklyResetText">Weekly รีเซ็ตใน —</span></div>
    </div>
  </div>

  <!-- PROGRESS BANNER -->
  <div class="progress-banner">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:10px">
      <div class="pb-circle">
        <svg width="52" height="52" viewBox="0 0 56 56">
          <circle cx="28" cy="28" r="22" stroke="rgba(0,245,255,0.08)" stroke-width="4" fill="none"/>
          <circle cx="28" cy="28" r="22" stroke="var(--cyan)" stroke-width="4" fill="none"
            stroke-dasharray="138.2" id="progressCircle" stroke-dashoffset="138.2"
            stroke-linecap="butt" style="transition:stroke-dashoffset 1s ease"/>
        </svg>
        <div class="pb-circle-num" id="progressPct">0%</div>
      </div>
      <div style="flex:1">
        <div class="pb-label">ความคืบหน้าวันนี้</div>
        <div class="pb-track"><div class="pb-fill" id="pbFill" style="width:0%"></div></div>
      </div>
      <div class="pb-xp" id="pbXP">+0 XP<br>วันนี้</div>
    </div>
    <div class="pb-stats">
      <div class="pb-stat"><span id="pbDone">0</span>สำเร็จ</div>
      <div class="pb-stat"><span id="pbPending">0</span>รอ Review</div>
      <div class="pb-stat"><span id="pbTotal">0</span>ทั้งหมด</div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('daily',this)">
      DAILY <span class="tab-count" id="tcDaily">0</span>
    </button>
    <button class="tab-btn" onclick="switchTab('weekly',this)">
      WEEKLY <span class="tab-count gold" id="tcWeekly">0</span>
    </button>
    <button class="tab-btn" onclick="switchTab('challenge',this)">
      CHALLENGE <span class="tab-count red" id="tcChallenge">0</span>
    </button>
    <button class="tab-btn" onclick="switchTab('history',this)">
      HISTORY <span class="tab-count green" id="tcHistory">0</span>
    </button>
  </div>

  <!-- CLASS FILTER -->
  <div class="filter-row" id="filterRow">
    <button class="filter-btn active" onclick="filterClass('all',this)">ทั้งหมด</button>
    <button class="filter-btn cls-warrior" onclick="filterClass('warrior',this)" id="filterWarrior">Warrior</button>
    <button class="filter-btn cls-mage" onclick="filterClass('mage',this)" id="filterMage">Mage</button>
    <button class="filter-btn cls-explorer" onclick="filterClass('explorer',this)" id="filterExplorer">Explorer</button>
    <button class="filter-btn cls-merchant" onclick="filterClass('merchant',this)" id="filterMerchant">Merchant</button>
    <button class="filter-btn cls-artist" onclick="filterClass('artist',this)" id="filterArtist">Artist</button>
    <button class="filter-btn cls-diplomat" onclick="filterClass('diplomat',this)" id="filterDiplomat">Diplomat</button>
  </div>

  <!-- QUEST GRID -->
  <div class="quest-grid" id="questGrid">
    <div class="empty-state">
      <div class="empty-icon" id="questsLoadingIcon"></div>
      <div class="empty-txt">กำลังโหลด Quest...</div>
    </div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="proofModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalType">ส่งหลักฐาน Quest</div>
      <button class="modal-close" id="closeQuestModalBtn" onclick="closeModal()"></button>
    </div>
    <div class="modal-body">
      <div class="modal-cls-bar" id="modalClsBar"></div>
      <div class="modal-quest-title" id="modalTitle">—</div>
      <div class="modal-quest-desc" id="modalDesc">—</div>
      <div class="modal-reward-row" id="modalRewards"></div>
      <div class="modal-msg" id="modalMsg"></div>
      <span class="proof-label" id="proofLabel">หลักฐาน</span>
      <!-- image -->
      <div id="imageProof">
        <img class="preview-img" id="previewImg">
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="proofFile" accept="image/*" capture="environment" onchange="handleFileChange(this)">
          <div class="upload-zone-icon" id="uploadZoneIcon"></div>
          <div class="upload-zone-txt">แตะเพื่อถ่ายรูปหลักฐาน</div>
          <div class="upload-zone-sub">ต้องถ่ายสด — ระบบจะประทับ timestamp อัตโนมัติ</div>
        </div>
      </div>
      <!-- text -->
      <div id="textProof" style="display:none">
        <textarea class="text-area" id="proofText" placeholder="เขียนรายละเอียดสิ่งที่ทำวันนี้..." maxlength="500" oninput="updateCount()"></textarea>
        <div class="text-area-count"><span id="charCount">0</span>/500</div>
      </div>
      <button class="submit-btn" id="submitBtn" onclick="submitProof()">ส่งหลักฐาน →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { supabase } from './supabase.js'
import { initSidebar } from './sidebar.js'
import { getIcon, CLASS_ICONS, CLASS_COLOR } from './icons.js'

// ── STATE ──
let currentUser = null
let userProfile  = null
let allQuests    = []   // { quest, userQuest|null }
let currentTab   = 'daily'
let currentClass = 'all'
let activeQuest  = null

function clsIcon(cls, size=16) { return getIcon(`class_${cls}`, size) || getIcon('sword', size) }

function getAvatarUrl(seed, size=40) {
  if (!seed) return `https://api.dicebear.com/9.x/pixel-art/svg?seed=nexus&size=${size}`
  const [style, s, bg] = seed.split(':')
  return `https://api.dicebear.com/9.x/${style||'pixel-art'}/svg?seed=${encodeURIComponent(s||'nexus')}&backgroundColor=${bg||'0a1628'}&size=${size}`
}

// ── INIT ──
async function init() {
  const { user } = await initSidebar('quests')
  if (!user) return
  currentUser = user

  // inject static icons
  const loadIcon = document.getElementById('questsLoadingIcon')
  if (loadIcon) loadIcon.innerHTML = getIcon('scroll', 28)
  const closeBtn = document.getElementById('closeQuestModalBtn')
  if (closeBtn) closeBtn.innerHTML = getIcon('close', 16)
  const uploadIcon = document.getElementById('uploadZoneIcon')
  if (uploadIcon) uploadIcon.innerHTML = getIcon('camera', 28)
  // inject weekly reset SVG icon (จาก QUEST_ICONS.weekly ผ่าน getIcon)
  const weeklyIconEl = document.getElementById('weeklyResetIcon')
  if (weeklyIconEl) weeklyIconEl.innerHTML = getIcon('quest_weekly', 13)
  // inject class filter btn icons
  const clsFilterMap = { filterWarrior:'warrior', filterMage:'mage', filterExplorer:'explorer', filterMerchant:'merchant', filterArtist:'artist', filterDiplomat:'diplomat' }
  const clsLabelMap = { filterWarrior:'Warrior', filterMage:'Mage', filterExplorer:'Explorer', filterMerchant:'Merchant', filterArtist:'Artist', filterDiplomat:'Diplomat' }
  Object.entries(clsFilterMap).forEach(([btnId, cls]) => {
    const btn = document.getElementById(btnId)
    if (btn && CLASS_ICONS[cls]) {
      btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 20 20" fill="none" style="vertical-align:middle;margin-right:4px">${CLASS_ICONS[cls]}</svg>${clsLabelMap[btnId]}`
    }
  })

  await loadProfile()
  await loadAllQuests()

  document.getElementById('loadingScreen').style.display = 'none'
  updateResetTimer()
  setInterval(updateResetTimer, 60000)
  initCursor()
}

// ── PROFILE ──
async function loadProfile() {
  const { data } = await supabase.from('users').select('*').eq('id', currentUser.id).single()
  userProfile = data
  if (!data) return

  const cls = data.class || 'warrior'
  const clsColor = CLASS_COLOR[cls] || '#00f5ff'
  document.getElementById('pageSub').innerHTML =
    `<span style="color:#fff"> ${(data.display_name||data.username).toUpperCase()}</span>` +
    `<span style="color:var(--text-dim)"> · LV.${data.level} · </span>` +
    `<span style="color:${clsColor};display:inline-flex;align-items:center;gap:4px;vertical-align:middle">${clsIcon(cls,14)} ${cls.toUpperCase()}</span>`

  // navQuestBadge
  const { count: questCount } = await supabase
    .from('user_quests')
    .select('*', { count: 'exact', head: true })
    .eq('user_id', currentUser.id)
    .eq('status', 'in_progress')
  if (questCount > 0) {
    const qb = document.getElementById('navQuestBadge')
    qb.textContent = questCount > 99 ? '99+' : questCount
    qb.style.display = 'inline'
  }

  // navVerifyBadge
  const { data: pending } = await supabase
    .from('user_quests')
    .select('id, users!inner(city)')
    .eq('status', 'pending_review')
    .eq('users.city', data.city)
    .neq('user_id', currentUser.id)
  const { data: myVotes } = await supabase
    .from('quest_verifications')
    .select('user_quest_id')
    .eq('voter_id', currentUser.id)
  const votedIds = new Set((myVotes||[]).map(v => v.user_quest_id))
  const notVotedCount = (pending||[]).filter(p => !votedIds.has(p.id)).length
  if (notVotedCount > 0) {
    const vb = document.getElementById('navVerifyBadge')
    vb.textContent = notVotedCount > 99 ? '99+' : notVotedCount
    vb.style.display = 'inline'
  }
}

// ── LOAD ALL QUESTS ──
async function loadAllQuests() {
  const { data: quests } = await supabase.from('quests').select('*').eq('is_active', true).order('type').order('id')

  // ใช้ timezone ไทย Asia/Bangkok (UTC+7) — ใช้ toLocaleDateString แทนการบวก offset เอง
  const TZ = 'Asia/Bangkok'
  const todayStr    = new Date().toLocaleDateString('sv-SE', { timeZone: TZ })
  const tomorrowDate = new Date(); tomorrowDate.setDate(tomorrowDate.getDate() + 1)
  const tomorrowStr = tomorrowDate.toLocaleDateString('sv-SE', { timeZone: TZ })

  // หา Monday ของสัปดาห์นี้ (ไทย)
  const nowThai = new Date(new Date().toLocaleString('en-US', { timeZone: TZ }))
  const dayOfWeek = nowThai.getDay() === 0 ? 7 : nowThai.getDay()
  const monday = new Date(nowThai.getTime() - (dayOfWeek - 1) * 86400000)
  const mondayStr = monday.toLocaleDateString('sv-SE', { timeZone: TZ })

  // ดึง user_quests ทั้งหมดของ user (ไม่กรอง date ใน query)
  // เพราะ upsert เก่าไม่อัปเดต created_at ทำให้กรองด้วย date พลาด record เก่า
  // แยก daily/weekly ด้วย JS แทน
  const { data: uqAllRaw } = await supabase
    .from('user_quests').select('*,quests(*)')
    .eq('user_id', currentUser.id)
    .order('submitted_at', { ascending: false })
    .limit(100)

  const uqAll = uqAllRaw || []
  window._historyQuests = uqAll

  // helper: แปลง timestamp DB → วันที่ไทย (Asia/Bangkok)
  const toThaiDate = (ts) => {
    if (!ts) return ''
    return new Date(ts).toLocaleDateString('sv-SE', { timeZone: TZ })
  }

  // แยก daily = submitted วันนี้ (เวลาไทย)
  const uqToday = uqAll.filter(uq => toThaiDate(uq.submitted_at || uq.created_at) === todayStr)

  // weekly = เฉพาะ quest type=weekly ที่ submitted ตั้งแต่ monday จนถึงพรุ่งนี้ (เวลาไทย)
  // *** ไม่รวม daily quest *** ไม่งั้น daily ที่ทำเมื่อวานจะยังโชว์สำเร็จวันนี้
  const uqWeek = uqAll.filter(uq => {
    if (uq.quests?.type !== 'weekly') return false
    const d = toThaiDate(uq.submitted_at || uq.created_at)
    if (d >= mondayStr && d < tomorrowStr) return true
    if (uq.status === 'pending_review') return true
    return false
  })

  const uqMap = {}
  // ใส่ weekly ก่อน แล้ว overwrite ด้วย today (daily)
  ;(uqWeek || []).forEach(uq => { uqMap[uq.quest_id] = uq })
  ;(uqToday || []).forEach(uq => { uqMap[uq.quest_id] = uq })

  allQuests = (quests || []).map(q => ({ quest: q, userQuest: uqMap[q.id] || null }))
  // window._historyQuests set above

  // ดึง vote counts สำหรับ quest ที่ pending_review (ครอบทั้ง daily + weekly)
  const allUQIds = [...new Set([
    ...(uqToday || []).map(uq => uq.id),
    ...(uqWeek  || []).map(uq => uq.id)
  ])]
  const pendingUQIds = allUQIds.filter(id => {
    const uq = [...(uqToday||[]), ...(uqWeek||[])].find(u => u.id === id)
    return uq?.status === 'pending_review'
  })

  window._voteCounts = {}
  if (pendingUQIds.length > 0) {
    const { data: votes } = await supabase
      .from('quest_verifications')
      .select('user_quest_id, vote')
      .in('user_quest_id', pendingUQIds)

    ;(votes || []).forEach(v => {
      if (!window._voteCounts[v.user_quest_id]) {
        window._voteCounts[v.user_quest_id] = { approve: 0, reject: 0 }
      }
      if (v.vote === 'approve') window._voteCounts[v.user_quest_id].approve++
      else window._voteCounts[v.user_quest_id].reject++
    })
  }

  updateTabCounts()
  updateProgressBanner()
  renderQuests()
}

// ── TAB COUNTS ──
function updateTabCounts() {
  const daily     = allQuests.filter(q => q.quest.type === 'daily')
  const weekly    = allQuests.filter(q => q.quest.type === 'weekly')
  const challenge = allQuests.filter(q => q.quest.type === 'challenge' || q.quest.type === 'story')

  document.getElementById('tcDaily').textContent     = daily.length
  document.getElementById('tcWeekly').textContent    = weekly.length
  document.getElementById('tcChallenge').textContent = challenge.length
  document.getElementById('tcHistory').textContent   = (window._historyQuests||[]).filter(h => h.status === 'approved').length
}

// ── PROGRESS BANNER ──
function updateProgressBanner() {
  const daily  = allQuests.filter(q => q.quest.type === 'daily')
  const done   = daily.filter(q => q.userQuest?.status === 'approved').length
  const pend   = daily.filter(q => q.userQuest?.status === 'pending_review').length
  const total  = daily.length
  const pct    = total > 0 ? Math.round((done / total) * 100) : 0
  const todayXP = daily
    .filter(q => q.userQuest?.status === 'approved' && q.userQuest?.xp_granted)
    .reduce((s, q) => s + (q.quest.xp_reward || 0), 0)

  document.getElementById('pbDone').textContent    = done
  document.getElementById('pbPending').textContent = pend
  document.getElementById('pbTotal').textContent   = total
  document.getElementById('pbXP').textContent      = `+${todayXP} XP วันนี้`
  document.getElementById('progressPct').textContent = pct + '%'

  setTimeout(() => {
    document.getElementById('pbFill').style.width = pct + '%'
    const circumference = 138.2
    document.getElementById('progressCircle').style.strokeDashoffset = circumference - (circumference * pct / 100)
  }, 300)
}

// ── RENDER ──
function renderQuests() {
  const grid = document.getElementById('questGrid')

  if (currentTab === 'history') {
    renderHistory(grid); return
  }

  let filtered = allQuests.filter(q => {
    if (currentTab === 'daily') return q.quest.type === 'daily'
    if (currentTab === 'weekly') return q.quest.type === 'weekly'
    if (currentTab === 'challenge') return q.quest.type === 'challenge' || q.quest.type === 'story'
    return true
  })

  if (currentClass !== 'all') {
    filtered = filtered.filter(q => !q.quest.class_target || q.quest.class_target === currentClass)
  }

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon" style="opacity:0.4;margin-bottom:8px"></div><div class="empty-txt">ไม่มี Quest ในหมวดนี้</div><div class="empty-sub">ลองเปลี่ยน Class Filter ดู</div></div>`
    return
  }

  grid.innerHTML = filtered.map(({quest: q, userQuest: uq}) => renderQuestCard(q, uq)).join('')
}

function renderQuestCard(q, uq) {
  const st = uq?.status || 'in_progress'
  const isDone = st === 'approved'
  const isPend = st === 'pending_review'
  const isRej  = st === 'rejected'
  const cls    = q.class_target || 'warrior'
  const isWeekly = q.type === 'weekly'

  // Vote count สำหรับ pending
  let voteBarHtml = ''
  if (isPend && uq?.id) {
    const vc = (window._voteCounts || {})[uq.id] || { approve: 0, reject: 0 }
    const approveCount = vc.approve
    const pips = [0,1,2].map(i =>
      `<div class="vote-pip ${i < approveCount ? 'filled' : ''}">
        ${i < approveCount ? getIcon('check',8) : ''}
      </div>`
    ).join('')
    voteBarHtml = `
    <div class="vote-bar">
      <div class="vote-pips">${pips}</div>
      <div class="vote-label"><span>${approveCount}/3</span> votes — รอชุมชนตรวจสอบ</div>
    </div>`
  }

  let btnHtml = ''
  if (isDone)    btnHtml = `<button class="qbtn done-btn">${getIcon('check',12)} สำเร็จ</button>`
  else if (isPend) btnHtml = `<button class="qbtn pending-btn">${getIcon('refresh',12)} รอ Vote</button>`
  else if (isRej)  btnHtml = `<button class="qbtn rejected-btn" onclick="openModal(${q.id})">↩ ส่งใหม่</button>`
  else             btnHtml = `<button class="qbtn" onclick="openModal(${q.id})">ส่งหลักฐาน →</button>`

  const statusLabel = isDone ? 'สำเร็จแล้ว' : isPend ? 'รอชุมชนตรวจสอบ' : isRej ? 'ถูกปฏิเสธ' : 'รอดำเนินการ'
  const statusCls   = isDone ? 'approved' : isPend ? 'pending' : isRej ? 'rejected' : 'todo'

  const weeklyProgress = isWeekly ? `
    <div class="weekly-progress">
      <div class="weekly-track"><div class="weekly-fill" style="width:${isDone?100:isPend?60:0}%"></div></div>
      <div class="weekly-label">${isDone ? 'ครบแล้ว' : '0 / 1 สัปดาห์'}</div>
    </div>` : ''

  return `
  <div class="qcard cls-${cls} ${isDone?'done':''} ${isPend?'pending':''} ${isWeekly?'weekly-card':''}">
    <div class="qcard-accent"></div>
    <div class="qcard-body">
      <div class="qcard-icon">${clsIcon(cls,20)}</div>
      <div class="qcard-info">
        <div class="qcard-type-row">
          <span class="qcard-type ${q.type}">${q.type.toUpperCase()}</span>
          ${q.class_target ? `<span class="qcard-cls-badge" style="color:${getCssColor(cls)};display:inline-flex;align-items:center;gap:3px"><svg width="13" height="13" viewBox="0 0 20 20" fill="none" style="color:${getCssColor(cls)};flex-shrink:0">${CLASS_ICONS[cls]||''}</svg>${cls.toUpperCase()}</span>` : ''}
        </div>
        <div class="qcard-title">${q.title}</div>
        <div class="qcard-desc">${q.description||''}</div>
        <div class="qcard-tags">
          <span class="qtag xp">+${q.xp_reward} XP</span>
          ${q.gold_reward ? `<span class="qtag gold">+${q.gold_reward} Gold</span>` : ''}
          ${q.stat_type ? `<span class="qtag stat">+${q.stat_points} ${q.stat_type.toUpperCase()}</span>` : ''}
          <span class="qtag proof">${(q.proof_type||'TEXT').toUpperCase()}</span>
        </div>
      </div>
    </div>
    ${weeklyProgress}
    ${voteBarHtml}
    <div class="qcard-footer">
      <div class="qstatus ${statusCls}">${statusLabel}</div>
      ${btnHtml}
    </div>
  </div>`
}

function renderHistory(grid) {
  const history = window._historyQuests || []
  if (!history.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon" style="opacity:0.4;margin-bottom:8px"></div><div class="empty-txt">ยังไม่มีประวัติ</div><div class="empty-sub">ทำ Quest สำเร็จแล้วจะปรากฏที่นี่</div></div>`
    return
  }

  grid.innerHTML = history.map(uq => {
    const q = uq.quests
    if (!q) return ''
    const dateStr = new Date(uq.created_at).toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'2-digit' })
    const statusColor = uq.status === 'approved' ? 'var(--green)' : uq.status === 'pending_review' ? 'var(--gold)' : 'var(--red)'
    return `
    <div class="qcard cls-${q.class_target||'warrior'}">
      <div class="qcard-accent"></div>
      <div class="qcard-body">
        <div class="qcard-icon">${clsIcon(q.class_target||'warrior',20)}</div>
        <div class="qcard-info">
          <div class="qcard-type-row">
            <span class="qcard-type ${q.type}">${q.type.toUpperCase()}</span>
          </div>
          <div class="qcard-title">${q.title}</div>
          <div class="qcard-tags">
            <span class="qtag xp">+${q.xp_reward} XP</span>
            ${q.gold_reward ? `<span class="qtag gold">+${q.gold_reward} Gold</span>` : ''}
          </div>
        </div>
      </div>
      <div class="qcard-footer">
        <span style="font-family:'Orbitron',monospace;font-size:8px;color:var(--text-dim)">${dateStr}</span>
        <span style="font-family:'Orbitron',monospace;font-size:9px;color:${statusColor}">${uq.status === 'approved' ? 'สำเร็จ' : uq.status === 'pending_review' ? 'รอ Review' : 'ปฏิเสธ'}</span>
      </div>
    </div>`
  }).join('')
}

// ── MODAL ──
window.openModal = function(questId) {
  const found = allQuests.find(q => q.quest.id === questId)
  if (!found) return
  activeQuest = found.quest
  const q = activeQuest

  document.getElementById('modalTitle').textContent = q.title
  document.getElementById('modalDesc').textContent  = q.description || ''
  document.getElementById('modalClsBar').style.background = getCssColor(q.class_target)

  document.getElementById('modalRewards').innerHTML = `
    <span class="mreward xp">+${q.xp_reward} XP</span>
    ${q.gold_reward ? `<span class="mreward gold">+${q.gold_reward} Gold</span>` : ''}
    ${q.stat_type ? `<span class="mreward stat">+${q.stat_points} ${q.stat_type.toUpperCase()}</span>` : ''}
  `

  const isImage = q.proof_type === 'image' || q.proof_type === 'screenshot' || q.proof_type === 'url'
  document.getElementById('imageProof').style.display = isImage ? '' : 'none'
  document.getElementById('textProof').style.display  = isImage ? 'none' : ''
  document.getElementById('proofLabel').textContent   = isImage ? 'รูปหลักฐาน' : 'บันทึกสิ่งที่ทำ'

  // reset
  document.getElementById('previewImg').style.display = 'none'
  document.getElementById('previewImg').src = ''
  document.getElementById('uploadZone').style.display = ''
  document.getElementById('proofFile').value = ''
  document.getElementById('proofText').value = ''
  document.getElementById('charCount').textContent = '0'
  window._stampedCanvas = null
  clearModalMsg()

  document.getElementById('proofModal').classList.add('open')
}

window.closeModal = function() {
  document.getElementById('proofModal').classList.remove('open')
  activeQuest = null
}

window.handleFileChange = function(input) {
  const file = input.files[0]
  if (!file) return

  const reader = new FileReader()
  reader.onload = e => {
    const image = new Image()
    image.onload = () => {
      // วาด timestamp + username ลงบนรูปด้วย canvas
      const canvas = document.createElement('canvas')
      canvas.width  = image.width
      canvas.height = image.height
      const ctx = canvas.getContext('2d')
      ctx.drawImage(image, 0, 0)

      // เตรียม timestamp
      const now = new Date()
      const dateStr = now.toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'numeric' })
      const timeStr = now.toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' })
      const username = userProfile?.username || userProfile?.display_name || 'NEXUS'
      const stamp = `NEXUS LIFE · ${username.toUpperCase()} · ${dateStr} ${timeStr}`

      // วาด background แถบดำโปร่งแสง
      const fontSize = Math.max(16, Math.round(canvas.width * 0.028))
      const padY = fontSize * 1.8
      ctx.fillStyle = 'rgba(0,0,0,0.55)'
      ctx.fillRect(0, canvas.height - padY, canvas.width, padY)

      // วาดข้อความ
      ctx.fillStyle = '#00f5ff'
      ctx.font = `bold ${fontSize}px monospace`
      ctx.textAlign = 'left'
      ctx.textBaseline = 'middle'
      ctx.fillText(stamp, fontSize * 0.6, canvas.height - padY / 2)

      // แสดง preview
      const img = document.getElementById('previewImg')
      img.src = canvas.toDataURL('image/jpeg', 0.92)
      img.style.display = 'block'
      document.getElementById('uploadZone').style.display = 'none'

      // เก็บ canvas ไว้ใช้ตอน upload
      window._stampedCanvas = canvas
    }
    image.src = e.target.result
  }
  reader.readAsDataURL(file)
}

window.updateCount = function() {
  document.getElementById('charCount').textContent = document.getElementById('proofText').value.length
}

window.submitProof = async function() {
  if (!activeQuest) return
  const btn = document.getElementById('submitBtn')
  btn.disabled = true; btn.textContent = 'กำลังส่ง...'
  clearModalMsg()

  try {
    const q = activeQuest
    const isImage = q.proof_type === 'image' || q.proof_type === 'screenshot' || q.proof_type === 'url'
    let proofUrl = null, proofText = null

    if (isImage) {
      if (!window._stampedCanvas) { showModalMsg('error','กรุณาถ่ายรูปก่อน'); return }
      // แปลง canvas เป็น blob แล้ว upload
      const blob = await new Promise(res => window._stampedCanvas.toBlob(res, 'image/jpeg', 0.92))
      const path = `proofs/${currentUser.id}/${q.id}_${Date.now()}.jpg`
      const { error: upErr } = await supabase.storage.from('nexuslife').upload(path, blob, { upsert:true, contentType:'image/jpeg' })
      if (upErr) throw upErr
      const { data: { publicUrl } } = supabase.storage.from('nexuslife').getPublicUrl(path)
      proofUrl = publicUrl
    } else {
      proofText = document.getElementById('proofText').value.trim()
      if (proofText.length < 3) { showModalMsg('error','กรุณากรอกข้อความอย่างน้อย 3 ตัวอักษร'); return }
    }

    const { data: uqData, error } = await supabase.from('user_quests').insert({
      user_id:      currentUser.id,
      quest_id:     q.id,
      status:       isImage ? 'pending_review' : 'approved',
      proof_url:    proofUrl,
      proof_text:   proofText,
      submitted_at: new Date().toISOString(),
      xp_granted:   false
    }).select().single()

    if (error) throw error

    // text / gps → auto approve ผ่าน grant_quest_xp()
    // grant_quest_xp เป็น void — ไม่ return ค่าใดๆ
    if (!isImage) {
      const oldLevel = userProfile?.level || 1

      await supabase.rpc('grant_quest_xp', {
        p_user_id:       currentUser.id,
        p_user_quest_id: parseInt(uqData.id)  // cast integer — ป้องกัน ambiguous function error
      })

      await loadProfile()  // โหลด XP / level / gold ใหม่

      // เช็ค level up จาก userProfile ที่ loadProfile() อัปเดตแล้ว
      if (userProfile && userProfile.level > oldLevel) {
        showToast(`LEVEL UP! LV.${oldLevel} → LV.${userProfile.level}!`, 'gold')
        // level_up feed ถูก insert โดย grant_quest_xp ใน DB แล้ว ไม่ต้อง insert ซ้ำ
      }

      await supabase.rpc('update_user_rank', { p_user_id: currentUser.id }).catch(()=>{})
      showToast('Quest สำเร็จ! XP และ Gold เข้าแล้ว', 'gold')
    } else {
      showToast('ส่งหลักฐานแล้ว — รอชุมชน 3 votes ยืนยัน', 'success')
    }

    window.closeModal()
    await loadAllQuests()
    await loadProfile()
    await checkAndUnlockAchievements()

  } catch(e) {
    showModalMsg('error', e.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่')
  } finally {
    btn.disabled = false; btn.textContent = 'ส่งหลักฐาน →'
  }
}

// ── CHECK AND UNLOCK ACHIEVEMENTS ──
async function checkAndUnlockAchievements() {
  try {
    if (!currentUser || !userProfile) return

    const [
      { count: questDone },
      { data: existingBadges },
      { data: existingTitles },
      { data: allBadges },
      { data: allTitles }
    ] = await Promise.all([
      supabase.from('user_quests').select('*', { count:'exact', head:true })
        .eq('user_id', currentUser.id).eq('status', 'approved'),
      supabase.from('user_badges').select('badge_id').eq('user_id', currentUser.id),
      supabase.from('user_titles').select('title_id').eq('user_id', currentUser.id),
      supabase.from('badges').select('*'),
      supabase.from('titles').select('*')
    ])

    const myBadgeIds  = new Set((existingBadges || []).map(b => b.badge_id))
    const myTitleIds  = new Set((existingTitles || []).map(t => t.title_id))
    const streak      = userProfile.streak_current || 0
    const level       = userProfile.level || 1
    const totalQuests = questDone || 0

    // เงื่อนไข unlock badge — ปรับให้ตรงกับ badges ใน DB ของคุณ
    const badgeConditions = [
      { category: 'quest',  condition: totalQuests >= 1   },
      { category: 'quest',  condition: totalQuests >= 10  },
      { category: 'quest',  condition: totalQuests >= 50  },
      { category: 'quest',  condition: totalQuests >= 100 },
      { category: 'streak', condition: streak >= 3  },
      { category: 'streak', condition: streak >= 7  },
      { category: 'streak', condition: streak >= 30 },
      { category: 'level',  condition: level >= 5  },
      { category: 'level',  condition: level >= 10 },
      { category: 'level',  condition: level >= 20 },
    ]

    // ตรวจ badge แต่ละ category ตามลำดับ
    for (const badge of (allBadges || [])) {
      if (myBadgeIds.has(badge.id)) continue
      // หา condition ที่ตรง category เรียงจากง่ายไปยาก
      const eligible = badgeConditions
        .filter(c => c.category === badge.category)
        .some(c => c.condition)
      if (!eligible) continue

      const { error } = await supabase.from('user_badges').insert({
        user_id: currentUser.id,
        badge_id: badge.id,
        unlocked_at: new Date().toISOString()
      })
      if (!error) {
        myBadgeIds.add(badge.id)
        showToast(`🏅 ปลดล็อค Badge: ${badge.name}!`, 'gold')
        await supabase.from('activity_feed').insert({
          user_id: currentUser.id,
          type: 'badge_unlock',
          data: { badge_id: badge.id, name: badge.name }
        })
      }
    }

    // เงื่อนไข unlock title
    const titleConditions = [
      { category: 'quest',  condition: totalQuests >= 1   },
      { category: 'quest',  condition: totalQuests >= 10  },
      { category: 'quest',  condition: totalQuests >= 50  },
      { category: 'streak', condition: streak >= 7  },
      { category: 'streak', condition: streak >= 30 },
      { category: 'level',  condition: level >= 10 },
      { category: 'level',  condition: level >= 20 },
    ]

    for (const title of (allTitles || [])) {
      if (myTitleIds.has(title.id)) continue
      const eligible = titleConditions
        .filter(c => c.category === title.category)
        .some(c => c.condition)
      if (!eligible) continue

      const { error } = await supabase.from('user_titles').insert({
        user_id: currentUser.id,
        title_id: title.id,
        unlocked_at: new Date().toISOString(),
        is_equipped: false
      })
      if (!error) {
        myTitleIds.add(title.id)
        showToast(`👑 ปลดล็อคฉายา: ${title.name}!`, 'gold')
        await supabase.from('activity_feed').insert({
          user_id: currentUser.id,
          type: 'title_unlock',
          data: { title_id: title.id, name: title.name }
        })
        await supabase.from('notifications').insert({
          user_id: currentUser.id,
          title: `👑 ได้รับฉายา: ${title.name}!`,
          body: title.description || 'ฉายาใหม่ของคุณรอใช้งานที่หน้า Achievements'
        })
      }
    }
  } catch(e) {
    console.warn('[checkAndUnlockAchievements]', e)
  }
}

// ── TAB + FILTER ──
window.switchTab = function(tab, btn) {
  currentTab = tab
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  // ซ่อน class filter ใน history
  document.getElementById('filterRow').style.display = tab === 'history' ? 'none' : ''
  renderQuests()
}

window.filterClass = function(cls, btn) {
  currentClass = cls
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active','cls-active'))
  btn.classList.add(cls === 'all' ? 'active' : 'cls-active')
  renderQuests()
}

// ── HELPERS ──
function getCssColor(cls) {
  const map = { warrior:'#ff4444', mage:'#aa44ff', explorer:'#44ff88', merchant:'#ffaa00', artist:'#ff66aa', diplomat:'#00ccff' }
  return map[cls] || 'var(--cyan)'
}

function updateResetTimer() {
  const nowUtc = Date.now()
  const TZ_OFFSET_MS = 7 * 3600000

  // ── Daily reset: เที่ยงคืนไทย ──
  const nowThai = new Date(nowUtc + TZ_OFFSET_MS)
  const nextMidnightThai = new Date(
    Date.UTC(nowThai.getUTCFullYear(), nowThai.getUTCMonth(), nowThai.getUTCDate() + 1, 0, 0, 0)
    - TZ_OFFSET_MS
  )
  const diffDay = nextMidnightThai.getTime() - nowUtc
  const dh = Math.floor(diffDay / 3600000)
  const dm = Math.floor((diffDay % 3600000) / 60000)
  document.getElementById('resetBadge').textContent = `⏱ Daily รีเซ็ตใน ${dh} ชม. ${dm} น.`

  // ── Weekly reset: วันจันทร์ถัดไป 00:00 ไทย ──
  const dowThai = nowThai.getUTCDay() === 0 ? 7 : nowThai.getUTCDay()
  const daysToMonday = dowThai === 1 ? 7 : (8 - dowThai)
  const nextMondayThai = new Date(
    Date.UTC(nowThai.getUTCFullYear(), nowThai.getUTCMonth(), nowThai.getUTCDate() + daysToMonday, 0, 0, 0)
    - TZ_OFFSET_MS
  )
  const diffWeek = nextMondayThai.getTime() - nowUtc
  const wd = Math.floor(diffWeek / 86400000)
  const wh = Math.floor((diffWeek % 86400000) / 3600000)
  const wm = Math.floor((diffWeek % 3600000) / 60000)
  const weeklyTextEl = document.getElementById('weeklyResetText')
  if (weeklyTextEl) {
    weeklyTextEl.textContent = wd > 0
      ? `Weekly รีเซ็ตใน ${wd} วัน ${wh} ชม.`
      : `Weekly รีเซ็ตใน ${wh} ชม. ${wm} น.`
  }
}

function showModalMsg(type, msg) {
  const el = document.getElementById('modalMsg')
  el.className = `modal-msg ${type} show`
  el.textContent = msg
  document.getElementById('submitBtn').disabled = false
  document.getElementById('submitBtn').textContent = 'ส่งหลักฐาน →'
}
function clearModalMsg() {
  const el = document.getElementById('modalMsg')
  el.className = 'modal-msg'; el.textContent = ''
}

window.showToast = function(msg, type='success') {
  const t = document.getElementById('toast')
  t.textContent = msg; t.className = `toast ${type} show`
  setTimeout(() => { t.className = `toast ${type}` }, 3500)
}


function initCursor() {
  const cur = document.getElementById('cursor'), ring = document.getElementById('cursorRing')
  let mx=0,my=0,rx=0,ry=0
  document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; cur.style.left=mx+'px'; cur.style.top=my+'px' })
  ;(function loop(){ rx+=(mx-rx)*.12; ry+=(my-ry)*.12; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(loop) })()
  document.querySelectorAll('button,a,.qcard').forEach(el => {
    el.addEventListener('mouseenter', () => { ring.style.width='44px'; ring.style.height='44px' })
    el.addEventListener('mouseleave', () => { ring.style.width='32px'; ring.style.height='32px' })
  })
}

document.getElementById('proofModal').addEventListener('click', e => { if (e.target === document.getElementById('proofModal')) closeModal() })

init()
